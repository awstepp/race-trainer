      const [comfortPaceSec,    setComfortPaceSec]     = useState(fa.comfortPaceSec    || 0);
      const [currentWeeklyMiles,setCurrentWeeklyMiles] = useState(fa.currentWeeklyMiles || 15);
      // Schedule preferences
      const sp = ic.schedulePrefs || {};
      const [daysPerWeek,    setDaysPerWeek]    = useState(sp.daysPerWeek    || 4);
      const [preferredDays,  setPreferredDays]  = useState(sp.preferredDays  || [1, 3, 5, 6]); // Mon Wed Fri Sat
      const [longRunDay,     setLongRunDay]      = useState(sp.longRunDay     ?? 6); // Saturday default
      // Week start: 0 = this Sunday (may be partial), 7 = next Sunday (fresh full week)
      const _todayDow = new Date().getDay();
      const [weekStartOffset, setWeekStartOffset] = useState(ic.weekStartOffset ?? (_todayDow === 0 ? 0 : 7));

      const toggleDay = (d) => {
        setPreferredDays(prev => {
          if (prev.includes(d)) {
            // Don't allow fewer days than daysPerWeek minimum (2)
            if (prev.length <= 2) return prev;
            const next = prev.filter(x => x !== d);
            // If we removed the long run day, reassign it to first remaining day
            if (d === longRunDay && next.length > 0) setLongRunDay(next[next.length - 1]);
            return next;
          }
          return [...prev, d].sort((a,b) => a-b);
        });
      };

      const canAdvance = [
        raceType,
        !!raceDate,
        !!goalTime && parseFloat(goalTime) > 0,
        true, // fitness assessment always valid
        fitnessLevel,
        preferredDays.length >= 2 && preferredDays.includes(longRunDay), // schedule valid
      ];

      const handleNext = () => {
        if (step < TOTAL_STEPS) { setStep(s => s + 1); return; }
        onComplete({
          raceType, raceDate,
          goalTime: parseFloat(goalTime),
          fitnessLevel,
          includeStrength,
          fitnessAssessment: { longestRunIdx, comfortPaceMin: parseInt(comfortPaceMin), comfortPaceSec: parseInt(comfortPaceSec), currentWeeklyMiles: parseInt(currentWeeklyMiles) },
          schedulePrefs: { daysPerWeek, preferredDays, longRunDay },
          weekStartOffset
        });
      };

      const stepLabels = ['Race', 'Date', 'Goal', 'Fitness', 'Schedule', 'Prefs'];

      return (
        <div className="min-h-screen bg-gradient-to-br from-slate-900 to-slate-800 flex items-center justify-center p-4">
          <div className="bg-slate-800 rounded-xl shadow-2xl max-w-md w-full p-8 border border-orange-500 animate-slideUp">

            {/* Progress dots */}
            <div className="flex justify-center gap-2 mb-6">
              {stepLabels.map((lbl, i) => (
                <button key={i} onClick={() => i < step && setStep(i)}
                  className={`flex flex-col items-center gap-1 ${i > step ? 'opacity-30' : ''}`}>
                  <div className={`w-2.5 h-2.5 rounded-full transition-all ${i === step ? 'bg-orange-500 scale-125' : i < step ? 'bg-orange-400' : 'bg-slate-600'}`} />
                  <span className="text-xs text-gray-500">{lbl}</span>
                </button>
              ))}
            </div>

            <h1 className="text-2xl font-bold text-white mb-6 text-center">🏃 RaceReady</h1>

            {/* Step 0 — Race type */}
            {step === 0 && (
              <div className="space-y-3">
                <h2 className="text-lg font-bold text-white mb-3">What are you training for?</h2>
                {Object.entries(RACE_TYPES).map(([key, val]) => (
                  <button key={key} onClick={() => setRaceType(key)}
                    className={`block w-full text-left px-4 py-3 rounded-lg font-semibold transition ${
                      raceType === key ? 'bg-orange-500 text-white' : 'bg-slate-700 text-gray-300 hover:bg-slate-600'
                    }`}>{val.label}</button>
                ))}
              </div>
            )}

            {/* Step 1 — Race date */}
            {step === 1 && (
              <div className="space-y-4">
                <h2 className="text-lg font-bold text-white">When is your race?</h2>
                <input type="date" value={raceDate} onChange={e => setRaceDate(e.target.value)}
                  className="w-full px-4 py-3 bg-slate-700 text-white rounded-lg border border-slate-600 focus:outline-none focus:border-orange-500 text-lg" />
                {raceDate && (() => {
                  const today = new Date(); today.setHours(0,0,0,0);
                  const race  = new Date(raceDate); race.setHours(0,0,0,0);
                  const weeks = Math.floor((race - today) / 604800000);
                  const max   = RACE_TYPES[raceType].weeks;
                  return weeks > 0 ? (
                    <div className={`text-sm rounded-lg p-3 ${weeks < 4 ? 'bg-red-900 text-red-200' : weeks < max ? 'bg-yellow-900 text-yellow-200' : 'bg-green-900 text-green-200'}`}>
                      {weeks < 4  && `⚠️ Only ${weeks} week${weeks!==1?'s':''} until race day — this will be an abbreviated plan.`}
                      {weeks >= 4 && weeks < max && `📅 ${weeks} weeks away — your plan will be ${weeks} weeks (full program is ${max}).`}
                      {weeks >= max && `✅ ${weeks} weeks away — full ${max}-week program!`}
                    </div>
                  ) : <div className="text-sm bg-red-900 text-red-200 rounded-lg p-3">⚠️ Race date must be in the future.</div>;
                })()}
              </div>
            )}

            {/* Step 2 — Goal time */}
            {step === 2 && (
              <div className="space-y-4">
                <h2 className="text-lg font-bold text-white">Goal Time — {RACE_TYPES[raceType].label}</h2>
                <p className="text-gray-400 text-sm">Enter your target finishing time in total minutes (e.g. 120 for 2:00:00).</p>
                <div className="flex items-center gap-3">
                  <input type="number" value={goalTime} onChange={e => setGoalTime(e.target.value)}
                    placeholder="e.g. 120" min="5" max="600"
                    className="flex-1 px-4 py-3 bg-slate-700 text-white rounded-lg border border-slate-600 focus:outline-none focus:border-orange-500 text-lg" />
                  <span className="text-gray-400">min</span>
                </div>
                {goalTime && parseFloat(goalTime) > 0 && (() => {
                  const dist = { '5k':3.107,'10k':6.214,'half':13.109,'marathon':26.219 }[raceType];
                  const secPerMi = (parseFloat(goalTime)*60)/dist;
                  const m = Math.floor(secPerMi/60), s = Math.round(secPerMi%60);
                  return <div className="text-sm text-orange-400 bg-slate-700 rounded-lg p-3">Target race pace: {m}:{String(s).padStart(2,'0')} /mile</div>;
                })()}
              </div>
            )}

            {/* Step 3 — Fitness assessment */}
            {step === 3 && (
              <div className="space-y-5">
                <div>
                  <h2 className="text-lg font-bold text-white mb-1">Your Current Fitness</h2>
                  <p className="text-gray-400 text-sm">This calibrates your starting paces so training feels right from day one.</p>
                </div>

                <div>
                  <label className="text-gray-300 text-sm font-semibold block mb-2">Longest run in the past month</label>
                  <div className="grid grid-cols-1 gap-2">
                    {LONG_RUN_OPTIONS.map((opt, i) => (
                      <button key={i} onClick={() => setLongestRunIdx(i)}
                        className={`text-left px-3 py-2 rounded-lg text-sm font-semibold transition ${
                          longestRunIdx === i ? 'bg-orange-500 text-white' : 'bg-slate-700 text-gray-300 hover:bg-slate-600'
                        }`}>{opt}</button>
                    ))}
                  </div>
                </div>

                <div>
                  <label className="text-gray-300 text-sm font-semibold block mb-2">Comfortable running pace (per mile)</label>
                  <div className="flex items-center gap-2">
                    <select value={comfortPaceMin} onChange={e => setComfortPaceMin(e.target.value)}
                      className="flex-1 px-3 py-2 bg-slate-700 text-white rounded-lg border border-slate-600 focus:outline-none">
                      {Array.from({length:16},(_,i)=>i+5).map(m=><option key={m} value={m}>{m}</option>)}
                    </select>
                    <span className="text-gray-400 font-bold">:</span>
                    <select value={comfortPaceSec} onChange={e => setComfortPaceSec(e.target.value)}
                      className="flex-1 px-3 py-2 bg-slate-700 text-white rounded-lg border border-slate-600 focus:outline-none">
                      {[0,15,30,45].map(s=><option key={s} value={s}>{String(s).padStart(2,'0')}</option>)}
                    </select>
                    <span className="text-gray-400 text-sm">min/mile</span>
                  </div>
                </div>

                <div>
                  <label className="text-gray-300 text-sm font-semibold block mb-2">
                    Current weekly mileage: <span className="text-orange-400 font-bold">{currentWeeklyMiles} mi</span>
                  </label>
                  <input type="range" min="0" max="70" step="5" value={currentWeeklyMiles}
                    onChange={e => setCurrentWeeklyMiles(e.target.value)}
                    className="w-full accent-orange-500" />
                  <div className="flex justify-between text-xs text-gray-500 mt-1"><span>0</span><span>70</span></div>
                </div>
              </div>
            )}

            {/* Step 4 — Training Schedule */}
            {step === 4 && (
              <div className="space-y-6">
                <div>
                  <h2 className="text-lg font-bold text-white mb-1">Your Training Schedule</h2>
                  <p className="text-gray-400 text-sm">Your plan will be built around the days you select.</p>
                </div>

                {/* Days per week */}
                <div>
                  <label className="text-gray-300 text-sm font-semibold block mb-3">
                    How many days per week do you want to train?
                  </label>
                  <div className="flex gap-2">
                    {[3,4,5,6].map(n => (
                      <button key={n} onClick={() => {
                        setDaysPerWeek(n);
                        // Trim preferred days to match if needed
                        if (preferredDays.length > n) {
                          const trimmed = preferredDays.slice(0, n);
                          setPreferredDays(trimmed);
                          if (!trimmed.includes(longRunDay)) setLongRunDay(trimmed[trimmed.length-1]);
                        }
                      }}
                        className={`flex-1 py-3 rounded-lg font-bold text-lg transition ${daysPerWeek === n ? 'bg-orange-500 text-white' : 'bg-slate-700 text-gray-300 hover:bg-slate-600'}`}>
                        {n}
                      </button>
                    ))}
                  </div>
                  <div className="text-xs text-gray-500 mt-2 text-center">{daysPerWeek} training days + {7 - daysPerWeek} rest/recovery days</div>
                </div>

                {/* Day picker */}
                <div>
                  <label className="text-gray-300 text-sm font-semibold block mb-3">
                    Which days? <span className="text-gray-500 font-normal">({preferredDays.length} selected)</span>
                  </label>
                  <div className="grid grid-cols-7 gap-1">
                    {DAY_LABELS.map((lbl, d) => {
                      const isSelected = preferredDays.includes(d);
                      const isLongRun  = d === longRunDay;
                      return (
                        <button key={d} onClick={() => toggleDay(d)}
                          className={`py-2.5 rounded-lg text-xs font-bold transition relative ${
                            isSelected
                              ? isLongRun ? 'bg-green-600 text-white ring-2 ring-green-400' : 'bg-orange-500 text-white'
                              : 'bg-slate-700 text-gray-400 hover:bg-slate-600'
                          }`}>
                          {lbl}
                          {isLongRun && <span className="absolute -top-1 -right-1 text-xs">🏃</span>}
                        </button>
                      );
                    })}
                  </div>
                  <div className="flex items-center gap-2 mt-2 text-xs text-gray-500">
                    <span className="w-3 h-3 rounded bg-orange-500 inline-block"></span> Training day
                    <span className="w-3 h-3 rounded bg-green-600 inline-block ml-2"></span> Long run day
                  </div>
                </div>

                {/* Long run day */}
                <div>
                  <label className="text-gray-300 text-sm font-semibold block mb-3">
                    Preferred long run day
                  </label>
                  <div className="grid grid-cols-7 gap-1">
                    {DAY_LABELS.map((lbl, d) => (
                      preferredDays.includes(d) && (
                        <button key={d} onClick={() => setLongRunDay(d)}
                          className={`py-2.5 rounded-lg text-xs font-bold transition ${
                            longRunDay === d ? 'bg-green-600 text-white ring-2 ring-green-400' : 'bg-slate-700 text-gray-300 hover:bg-slate-600'
                          }`}>
                          {lbl}
                        </button>
                      )
                    ))}
                  </div>
                  <div className="text-xs text-gray-500 mt-2">Your long run will be scheduled every {DAY_FULL[longRunDay]}.</div>
                </div>

                {/* Preview */}
                <div className="rounded-lg p-3 border border-slate-600" style={{background:'rgba(15,23,42,0.6)'}}>
                  <div className="text-xs font-semibold text-gray-400 mb-2 uppercase tracking-wide">Sample week preview</div>
                  <div className="grid grid-cols-7 gap-1">
                    {DAY_LABELS.map((lbl, d) => (
                      <div key={d} className="text-center">
                        <div className="text-xs text-gray-500 mb-1">{lbl}</div>
                        <div className={`text-lg ${
                          d === longRunDay ? 'text-green-400' :
                          preferredDays.includes(d) ? 'text-orange-400' : 'text-gray-700'
                        }`}>
                          {d === longRunDay ? '🚀' : preferredDays.includes(d) ? '🏃' : '😴'}
                        </div>
                      </div>
                    ))}
                  </div>
                </div>
              </div>
            )}

            {/* Step 5 — Preferences (experience + strength) */}
            {step === 5 && (
              <div className="space-y-5">
                <h2 className="text-lg font-bold text-white">Preferences</h2>

                <div>
                  <label className="text-gray-300 text-sm font-semibold block mb-2">Running experience</label>
                  <div className="space-y-2">
                    {Object.entries(FITNESS_LEVELS).map(([key, val]) => (
                      <button key={key} onClick={() => setFitnessLevel(key)}
                        className={`block w-full text-left px-4 py-3 rounded-lg font-semibold transition ${
                          fitnessLevel === key ? 'bg-orange-500 text-white' : 'bg-slate-700 text-gray-300 hover:bg-slate-600'
                        }`}>{val.label}</button>
                    ))}
                  </div>
                </div>

                <div className="border-t border-slate-700 pt-4">
                  <label className="text-gray-300 text-sm font-semibold block mb-2">Strength training sessions</label>
                  <div
                    onClick={() => setIncludeStrength(!includeStrength)}
                    className={`flex items-center justify-between px-4 py-3 rounded-lg cursor-pointer transition border ${
                      includeStrength ? 'bg-emerald-900 border-emerald-600' : 'bg-slate-700 border-slate-600'
                    }`}>
                    <div>
                      <div className="font-semibold text-white">{includeStrength ? '🦵 Included' : '🚫 Not included'}</div>
                      <div className="text-xs text-gray-400 mt-0.5">
                        {includeStrength ? 'Lower body, core & plyo sessions built into your week' : 'Running-only plan — no strength days'}
                      </div>
                    </div>
                    <div className={`w-10 h-6 rounded-full transition-colors relative ${includeStrength ? 'bg-emerald-500' : 'bg-slate-500'}`}>
                      <div className={`absolute top-0.5 w-5 h-5 bg-white rounded-full shadow transition-all ${includeStrength ? 'left-4' : 'left-0.5'}`} />
                    </div>
                  </div>
                </div>

                {/* Week start — only shown when today is not Sunday */}
                {_todayDow !== 0 && (() => {
                  const fmt = d => d.toLocaleDateString(undefined, { month: 'short', day: 'numeric' });
                  const thisSun = new Date(); thisSun.setHours(0,0,0,0); thisSun.setDate(thisSun.getDate() - _todayDow);
                  const nextSun = new Date(thisSun); nextSun.setDate(nextSun.getDate() + 7);
                  return (
                    <div className="border-t border-slate-700 pt-4">
                      <label className="text-gray-300 text-sm font-semibold block mb-1">When do you want to start?</label>
                      <p className="text-gray-500 text-xs mb-3">Training weeks run Sun–Sat. Today is mid-week, so pick your start.</p>
                      <div className="space-y-2">
                        <button onClick={() => setWeekStartOffset(0)}
                          className={`w-full text-left px-4 py-3 rounded-lg border transition ${weekStartOffset === 0 ? 'bg-orange-500 border-orange-400 text-white' : 'bg-slate-700 border-slate-600 text-gray-300 hover:bg-slate-600'}`}>
                          <div className="font-semibold">This Sunday ({fmt(thisSun)})</div>
                          <div className="text-xs opacity-75 mt-0.5">Jump in now — days before today show as rest/skipped</div>
                        </button>
                        <button onClick={() => setWeekStartOffset(7)}
                          className={`w-full text-left px-4 py-3 rounded-lg border transition ${weekStartOffset === 7 ? 'bg-orange-500 border-orange-400 text-white' : 'bg-slate-700 border-slate-600 text-gray-300 hover:bg-slate-600'}`}>
                          <div className="font-semibold">Next Sunday ({fmt(nextSun)}) — Recommended</div>
                          <div className="text-xs opacity-75 mt-0.5">Begin with a complete first week, no skipped days</div>
                        </button>
                      </div>
                    </div>
                  );
                })()}
              </div>
            )}

            {/* Nav buttons */}
            <div className="flex gap-3 mt-8">
              {step > 0 && (
                <button onClick={() => setStep(s => s - 1)}
                  className="flex-1 px-4 py-2 bg-slate-700 text-white rounded-lg font-semibold hover:bg-slate-600">
                  Back
                </button>
              )}
              <button onClick={handleNext} disabled={!canAdvance[step]}
                className="flex-1 px-4 py-3 bg-orange-500 text-white rounded-lg font-bold hover:bg-orange-600 disabled:opacity-40 transition">
                {step === TOTAL_STEPS ? '🚀 Build My Plan' : 'Next →'}
              </button>
            </div>
          </div>
        </div>
      );
    }

    // Fitness Trend Chart
    function FitnessTrendChart({ plan, logs }) {
      if (!plan?.weeks || !plan?.weekWorkouts || !logs) return null;
      const currentWeekIdx = getCurrentWeekIdx(plan.raceDate, plan.totalWeeks, plan.weekStartOffset || 0);

      // Build per-week data from logs
      const weeklyData = plan.weeks.slice(0, currentWeekIdx + 1).map((week, weekIdx) => {
        const entries = Object.entries(logs)
          .filter(([k]) => k.startsWith(`${weekIdx}-`))
          .map(([k, log]) => {
            const dayIdx = parseInt(k.split('-')[1]);
            const wType  = plan.weekWorkouts?.[weekIdx]?.[dayIdx]?.type;
            return { ...log, wType };
          })
          .filter(l => l.milesVal > 0);

        const totalMiles = entries.reduce((s, l) => s + (l.milesVal || 0), 0);
        const easyPaces  = entries
          .filter(l => ['easy','long','recovery'].includes(l.wType) && l.paceMin > 0)
          .map(l => l.paceMin * 60 + (l.paceSec || 0));
        const avgEasyPace = easyPaces.length > 0 ? easyPaces.reduce((a,b)=>a+b,0)/easyPaces.length : null;
        return { weekNum: week.weekNum, planned: week.mileage, actual: totalMiles, avgEasyPace };
      });

      const hasData = weeklyData.some(w => w.actual > 0);
      if (!hasData) return null;

      // Target easy pace from plan config
      const targetEasyPace = (() => {
        try { return calcPaces(plan.raceType, plan.goalTime, plan.fitnessLevel, plan.fitnessAssessment).easy; }
        catch(e) { return 0; }
      })();

      // Trend direction badge
      const paceWeeks  = weeklyData.filter(w => w.avgEasyPace !== null);
      const firstPace  = paceWeeks.length > 0 ? paceWeeks[0].avgEasyPace : null;
      const latestPace = paceWeeks.length > 0 ? paceWeeks[paceWeeks.length - 1].avgEasyPace : null;
      const improvePct = firstPace && latestPace ? Math.round((firstPace - latestPace) / firstPace * 100) : 0;

      // Projected finish time: if recent easy pace beats target easy pace, scale goal time proportionally
      let projectedTime = null;
      if (latestPace && targetEasyPace > 0 && latestPace > 0) {
        const ratio = latestPace / targetEasyPace;
        if (ratio < 0.97) projectedTime = formatTime(Math.round(plan.goalTime * ratio));
      }

      // ── Mileage bar chart (SVG) ─────────────────────────────────────────────
      const W=400, H=110, PL=28, PR=8, PT=8, PB=28;
      const cW = W-PL-PR, cH = H-PT-PB;
      const maxM = Math.max(...weeklyData.map(w => Math.max(w.planned || 0, w.actual || 0)), 1);
      const bSlot = cW / weeklyData.length;
      const bW    = Math.max(2, bSlot * 0.6);

      // ── Pace line chart (SVG) ───────────────────────────────────────────────
      const PW2=400, PH2=90, PL2=40, PR2=8, PT2=8, PB2=20;
      const pCW = PW2-PL2-PR2, pCH = PH2-PT2-PB2;
      const allP = [...paceWeeks.map(w=>w.avgEasyPace), targetEasyPace > 0 ? targetEasyPace : null].filter(Boolean);
      const minP  = allP.length > 0 ? Math.min(...allP) * 0.97 : 480;
      const maxP  = allP.length > 0 ? Math.max(...allP) * 1.03 : 660;
      const pToY  = p => PT2 + ((p - minP) / (maxP - minP)) * pCH;
      const iToX  = (i, total) => PL2 + (total > 1 ? (i / (total - 1)) : 0.5) * pCW;
      const linePath = paceWeeks.map((w,i) => `${i===0?'M':'L'} ${iToX(i,paceWeeks.length).toFixed(1)} ${pToY(w.avgEasyPace).toFixed(1)}`).join(' ');
      const areaPath = paceWeeks.length >= 2
        ? linePath + ` L ${iToX(paceWeeks.length-1,paceWeeks.length).toFixed(1)} ${(PT2+pCH).toFixed(1)} L ${iToX(0,paceWeeks.length).toFixed(1)} ${(PT2+pCH).toFixed(1)} Z`
        : null;

      return (
        <div className="bg-slate-800 rounded-lg p-4 border border-slate-700">
          {/* Header */}
          <div className="flex items-center justify-between mb-4">
            <h2 className="text-white font-bold text-lg">📈 Fitness Trends</h2>
            {paceWeeks.length >= 2 && (
              <span className={`text-xs font-bold px-2 py-1 rounded-full ${improvePct > 1 ? 'bg-green-900 text-green-400' : improvePct < -1 ? 'bg-red-900 text-red-400' : 'bg-slate-700 text-gray-400'}`}>
                {improvePct > 1 ? `↑ ${improvePct}% faster` : improvePct < -1 ? `↓ ${Math.abs(improvePct)}% slower` : '→ Holding steady'}
              </span>
            )}
          </div>

          {/* ── Mileage bars ── */}
          <div className="mb-5">
            <div className="text-xs text-gray-500 mb-1.5 font-semibold uppercase tracking-wide">Weekly Mileage — Actual vs Planned</div>
            <svg viewBox={`0 0 ${W} ${H}`} className="w-full" style={{height:'90px'}}>
              {/* Grid lines + y labels */}
              {[0, 0.5, 1].map(f => {
                const miles = Math.round(maxM * f);
                const y = PT + cH - f * cH;
                return (
                  <g key={f}>
                    <line x1={PL} y1={y} x2={PL+cW} y2={y} stroke="rgba(100,116,139,0.25)" strokeWidth="0.5"/>
                    <text x={PL-3} y={y+3} textAnchor="end" fontSize="8" fill="#64748b">{miles}</text>
                  </g>
                );
              })}
              {/* Planned mileage dots */}
              {weeklyData.map((w, i) => {
                const cx = PL + i * bSlot + bSlot/2;
                const cy = PT + cH - (w.planned/maxM)*cH;
                return <circle key={i} cx={cx} cy={cy} r="2" fill="rgba(148,163,184,0.5)" />;
              })}
              {/* Actual mileage bars */}
              {weeklyData.map((w, i) => {
                if (w.actual <= 0) return null;
                const x = PL + i * bSlot + bSlot/2 - bW/2;
                const bH2 = (w.actual/maxM)*cH;
                const y = PT + cH - bH2;
                const fill = w.actual >= w.planned*1.05 ? '#4ade80' : w.actual < w.planned*0.8 ? '#f87171' : '#fb923c';
                return (
                  <g key={i}>
                    <rect x={x} y={y} width={bW} height={bH2} fill={fill} rx="1" opacity="0.85"/>
                    {weeklyData.length <= 16 && (
                      <text x={PL + i*bSlot + bSlot/2} y={H-PB+11} textAnchor="middle" fontSize="7.5" fill="#64748b">W{w.weekNum}</text>
                    )}
                  </g>
                );
              })}
              <line x1={PL} y1={PT+cH} x2={PL+cW} y2={PT+cH} stroke="#475569" strokeWidth="0.5"/>
            </svg>
            <div className="flex items-center gap-3 text-xs text-gray-600 mt-1">
              <span className="flex items-center gap-1"><span className="w-2.5 h-2.5 rounded-sm inline-block" style={{background:'#fb923c'}}/>On target</span>
              <span className="flex items-center gap-1"><span className="w-2.5 h-2.5 rounded-sm inline-block" style={{background:'#4ade80'}}/>Above</span>
              <span className="flex items-center gap-1"><span className="w-2.5 h-2.5 rounded-sm inline-block" style={{background:'#f87171'}}/>Below</span>
              <span className="flex items-center gap-1"><span className="w-2.5 h-2.5 rounded-full inline-block" style={{background:'rgba(148,163,184,0.5)'}}/>Planned</span>
            </div>
          </div>

          {/* ── Easy pace trend ── */}
          {paceWeeks.length >= 2 && (
            <div>
              <div className="flex items-center justify-between mb-1.5">
                <div className="text-xs text-gray-500 font-semibold uppercase tracking-wide">Easy / Long Run Pace Trend</div>
                {projectedTime && (
                  <div className="text-xs font-semibold text-green-400">🎯 Projected finish: {projectedTime}</div>
                )}
              </div>
              <svg viewBox={`0 0 ${PW2} ${PH2}`} className="w-full" style={{height:'75px'}}>
                {/* Grid */}
                {[0.25,0.5,0.75].map(f => (
                  <line key={f} x1={PL2} y1={PT2+f*pCH} x2={PL2+pCW} y2={PT2+f*pCH} stroke="rgba(100,116,139,0.15)" strokeWidth="0.5"/>
                ))}
                {/* Y labels */}
                {[minP, (minP+maxP)/2, maxP].map((p,i) => (
                  <text key={i} x={PL2-3} y={pToY(p)+3} textAnchor="end" fontSize="8" fill="#64748b">{formatPace(p)}</text>
                ))}
                {/* Target easy pace dashed line */}
                {targetEasyPace > 0 && targetEasyPace >= minP && targetEasyPace <= maxP && (
                  <line x1={PL2} y1={pToY(targetEasyPace)} x2={PL2+pCW} y2={pToY(targetEasyPace)}
                    stroke="rgba(251,146,60,0.5)" strokeWidth="1" strokeDasharray="4,3"/>
                )}
                {/* Area fill */}
                {areaPath && <path d={areaPath} fill="rgba(99,102,241,0.12)"/>}
                {/* Line */}
                {linePath && <path d={linePath} fill="none" stroke="#818cf8" strokeWidth="1.5" strokeLinejoin="round"/>}
                {/* Dots */}
                {paceWeeks.map((w,i) => (
                  <circle key={i} cx={iToX(i,paceWeeks.length)} cy={pToY(w.avgEasyPace)} r="2.5" fill="#818cf8" stroke="#1e293b" strokeWidth="1"/>
                ))}
                <line x1={PL2} y1={PT2+pCH} x2={PL2+pCW} y2={PT2+pCH} stroke="#475569" strokeWidth="0.5"/>
              </svg>
              <div className="flex items-center gap-3 text-xs text-gray-600 mt-1">
                <span className="flex items-center gap-1.5">
                  <span style={{display:'inline-block',width:14,borderTop:'1px dashed rgba(251,146,60,0.6)'}}/>
                  Target easy pace
                </span>
                <span>Line moving up = getting faster ✓</span>
              </div>
            </div>
          )}

          {paceWeeks.length === 1 && (
            <p className="text-xs text-gray-600 mt-2">Log easy runs in more weeks to see your pace trend.</p>
          )}
        </div>
      );
    }

    // ── Route Finder ───────────────────────────────────────────────────────
    // Generates loop running routes using the user's GPS location + OSRM routing.
    // No API key required — uses free OpenStreetMap tiles and OSRM public API.

    // Helper: convert miles to meters
    const milesToMeters = (mi) => mi * 1609.34;

    // Helper: generate N waypoints on a circle around (lat, lng).
    // radius = distanceMeters / (2π) so the total circumference ≈ target distance.
    // directionDeg rotates the entire pattern (0 = routes go North first, 90 = East, etc.)
    // variant shifts the starting angle slightly for route diversity.
    function generateLoopWaypoints(lat, lng, distMeters, directionDeg, variant) {
      const radius = distMeters / (2 * Math.PI);
      const latPerMeter  = 1 / 111320;
      const lngPerMeter  = 1 / (111320 * Math.cos(lat * Math.PI / 180));
      const numPts = 3; // 3 intermediate waypoints make a good loop shape
      const baseAngle = (directionDeg + variant * 30) * Math.PI / 180;
      const waypoints = [[lat, lng]]; // start
      for (let i = 0; i < numPts; i++) {
        const angle = baseAngle + (2 * Math.PI * i) / numPts;
        waypoints.push([
          lat + Math.cos(angle) * radius * latPerMeter,
          lng + Math.sin(angle) * radius * lngPerMeter,
        ]);
      }
      waypoints.push([lat, lng]); // end = start (close the loop)
      return waypoints;
    }

    function RouteFinder({ plan, onBack }) {
      const { useRef, useState, useEffect } = React;
      const mapRef        = useRef(null);
      const mapInstance   = useRef(null);
      const routeLayer    = useRef(null);
      const markerLayer   = useRef(null);

      const [locState,   setLocState]   = useState('idle');     // idle | locating | located | error
      const [location,   setLocation]   = useState(null);       // { lat, lng, address }
      const [routeState, setRouteState] = useState('idle');     // idle | loading | loaded | error
      const [routeInfo,  setRouteInfo]  = useState(null);       // { distanceMiles, durationMin, geometry }
      const [direction,  setDirection]  = useState(0);          // degrees: 0=N 45=NE 90=E …
      const [variant,    setVariant]    = useState(0);          // 0-2, different route shapes
      const [distance,   setDistance]   = useState(() => {
        // Pre-fill from today's workout distance if available
        if (!plan?.weekWorkouts) return 3;
        const today = new Date().getDay();
        const weekIdx = getCurrentWeekIdx(plan.raceDate, plan.totalWeeks, plan.weekStartOffset || 0);
        const todayWorkout = plan.weekWorkouts[weekIdx]?.[today];
        if (todayWorkout?.miles) return Math.round(todayWorkout.miles * 10) / 10;
        return 3;
      });

      const DIRECTIONS = [
        { label: 'N',  deg: 0   },
        { label: 'NE', deg: 45  },
        { label: 'E',  deg: 90  },
        { label: 'SE', deg: 135 },
        { label: 'S',  deg: 180 },
        { label: 'SW', deg: 225 },
        { label: 'W',  deg: 270 },
        { label: 'NW', deg: 315 },
      ];

      // ── Leaflet map init ──────────────────────────────────────────────────
      useEffect(() => {
        if (!mapRef.current || mapInstance.current) return;
        if (typeof L === 'undefined') return;
        mapInstance.current = L.map(mapRef.current, {
          center: [34.0522, -118.2437], // default: LA
          zoom: 13,
          zoomControl: true,
          attributionControl: true,
        });
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
          attribution: '© <a href="https://openstreetmap.org">OpenStreetMap</a> contributors',
          maxZoom: 19,
        }).addTo(mapInstance.current);
        return () => {
          if (mapInstance.current) {
            mapInstance.current.remove();
            mapInstance.current = null;
          }
        };
      }, []);

      // ── Re-generate route when inputs change (after location acquired) ──
      useEffect(() => {
        if (location && routeState !== 'idle') {
          buildRoute(location.lat, location.lng, distance, direction, variant);
        }
      }, [direction, variant, distance]);

      // ── Get GPS location ─────────────────────────────────────────────────
      const requestLocation = () => {
        if (!navigator.geolocation) {
          setLocState('error');
          return;
        }
        setLocState('locating');
        navigator.geolocation.getCurrentPosition(
          async (pos) => {
            const lat = pos.coords.latitude;
            const lng = pos.coords.longitude;
            // Reverse-geocode for a friendly neighborhood name
            let address = `${lat.toFixed(4)}, ${lng.toFixed(4)}`;
            try {
              const r = await fetch(
                `https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lng}&format=json`,
                { headers: { 'Accept-Language': 'en' } }
              );
              const d = await r.json();
              address = d.address?.suburb || d.address?.neighbourhood ||
                        d.address?.city_district || d.address?.city ||
                        d.address?.town || address;
            } catch (_) {}
            setLocation({ lat, lng, address });
            setLocState('located');
            // Pan map to user
            if (mapInstance.current) {
              mapInstance.current.setView([lat, lng], 14);
            }
            buildRoute(lat, lng, distance, direction, variant);
          },
          () => setLocState('error'),
          { enableHighAccuracy: true, timeout: 12000 }
        );
      };

      // ── Fetch route from OSRM ────────────────────────────────────────────
      const buildRoute = async (lat, lng, distMiles, dirDeg, vari) => {
        setRouteState('loading');
        try {
          const waypoints = generateLoopWaypoints(lat, lng, milesToMeters(distMiles), dirDeg, vari);
          // OSRM expects lon,lat order
          const coordStr = waypoints.map(([wLat, wLng]) => `${wLng},${wLat}`).join(';');
          const url = `https://router.project-osrm.org/route/v1/foot/${coordStr}?overview=full&geometries=geojson&steps=false`;
          const res = await fetch(url);
          const data = await res.json();

          if (data.code !== 'Ok' || !data.routes?.length) {
            setRouteState('error');
            return;
          }

          const route = data.routes[0];
          const actualMiles = route.distance / 1609.34;
          // Estimate duration: OSRM walking pace is ~5 km/h; runners are faster
          // Use plan pace if available, else 10 min/mile default
          const paceMinPerMile = 10;
          const estMinutes = actualMiles * paceMinPerMile;

          setRouteInfo({
            distanceMiles: actualMiles,
            durationMin: estMinutes,
            geometry: route.geometry,
          });

          // Draw on Leaflet map
          if (mapInstance.current) {
            if (routeLayer.current) mapInstance.current.removeLayer(routeLayer.current);
            if (markerLayer.current) mapInstance.current.removeLayer(markerLayer.current);

            routeLayer.current = L.geoJSON(route.geometry, {
              style: { color: '#f97316', weight: 5, opacity: 0.85, lineCap: 'round', lineJoin: 'round' }
            }).addTo(mapInstance.current);

            // Start/finish marker
            markerLayer.current = L.circleMarker([lat, lng], {
              radius: 9, fillColor: '#f97316', color: '#ffffff',
              weight: 3, fillOpacity: 1
            }).bindPopup('📍 Start / Finish').addTo(mapInstance.current);

            mapInstance.current.fitBounds(routeLayer.current.getBounds(), { padding: [30, 30] });
          }

          setRouteState('loaded');
        } catch (err) {
          setRouteState('error');
        }
      };

      const formatDuration = (min) => {
        const h = Math.floor(min / 60);
        const m = Math.round(min % 60);
        return h > 0 ? `${h}h ${m}m` : `${m} min`;
      };

      // ── Render ────────────────────────────────────────────────────────────
      return (
        <div className="text-white animate-fadeIn">

          {/* Header */}
          <div className="px-4 pt-4 pb-3 flex items-center gap-3">
            <button onClick={onBack} className="text-gray-400 hover:text-white transition text-lg leading-none">←</button>
            <div>
              <h2 className="text-xl font-bold text-white leading-tight">Route Finder</h2>
              {location && (
                <p className="text-gray-400 text-xs mt-0.5">📍 Near {location.address}</p>
              )}
            </div>
          </div>

          {/* Map */}
          <div
            ref={mapRef}
            style={{ height: '280px', width: '100%', zIndex: 0 }}
            className="bg-slate-800"
          />

          {/* Controls card */}
          <div className="mx-4 mt-4 bg-slate-800 border border-slate-700 rounded-xl p-4 space-y-4">

            {/* Distance slider */}
            <div>
              <div className="flex items-center justify-between mb-1">
                <span className="text-sm font-semibold text-gray-300">Target distance</span>
                <span className="text-orange-400 font-bold text-sm">{distance} mi</span>
              </div>
              <input
                type="range" min="0.5" max="26.2" step="0.5"
                value={distance}
                onChange={e => setDistance(parseFloat(e.target.value))}
                className="w-full accent-orange-500"
              />
              <div className="flex justify-between text-xs text-gray-600 mt-0.5">
                <span>0.5 mi</span><span>Half</span><span>Marathon</span>
              </div>
            </div>

            {/* Direction picker */}
            <div>
              <p className="text-sm font-semibold text-gray-300 mb-2">Head toward</p>
              <div className="grid grid-cols-8 gap-1">
                {DIRECTIONS.map(d => (
                  <button
                    key={d.deg}
                    onClick={() => setDirection(d.deg)}
                    className={`py-1.5 rounded text-xs font-bold transition ${
                      direction === d.deg
                        ? 'bg-orange-500 text-white'
                        : 'bg-slate-700 text-gray-400 hover:bg-slate-600 hover:text-white'
                    }`}
                  >
                    {d.label}
                  </button>
                ))}
              </div>
            </div>

            {/* Route variant */}
            <div>
              <p className="text-sm font-semibold text-gray-300 mb-2">Route shape</p>
              <div className="flex gap-2">
                {[0, 1, 2].map(v => (
                  <button
                    key={v}
                    onClick={() => setVariant(v)}
                    className={`flex-1 py-2 rounded-lg text-xs font-semibold transition ${
                      variant === v
                        ? 'bg-orange-500 text-white'
                        : 'bg-slate-700 text-gray-400 hover:bg-slate-600'
                    }`}
                  >
                    Option {v + 1}
                  </button>
                ))}
              </div>
            </div>

          </div>

          {/* Route info card */}
          {routeState === 'loaded' && routeInfo && (
            <div className="mx-4 mt-3 bg-slate-800 border border-slate-700 rounded-xl p-4">
              <div className="grid grid-cols-3 gap-3 text-center">
                <div>
                  <div className="text-xl font-bold text-orange-400">{routeInfo.distanceMiles.toFixed(2)}</div>
                  <div className="text-xs text-gray-400 mt-0.5">miles</div>
                </div>
                <div>
                  <div className="text-xl font-bold text-blue-400">{formatDuration(routeInfo.durationMin)}</div>
                  <div className="text-xs text-gray-400 mt-0.5">est. time</div>
                </div>
                <div>
                  <div className="text-xl font-bold text-green-400">{Math.round(routeInfo.durationMin / routeInfo.distanceMiles)}</div>
                  <div className="text-xs text-gray-400 mt-0.5">min/mile</div>
                </div>
              </div>
              <p className="text-xs text-gray-500 text-center mt-3">
                Route snapped to real roads via OpenStreetMap · Tap the map to explore
              </p>
            </div>
          )}

          {/* CTA — get location or show status */}
          <div className="px-4 mt-4 pb-6">
            {locState === 'idle' && (
              <button
                onClick={requestLocation}
                className="w-full py-4 bg-orange-500 hover:bg-orange-600 text-white font-bold rounded-xl transition text-sm flex items-center justify-center gap-2"
              >
                <span>📍</span> Use My Location &amp; Generate Route
              </button>
            )}

            {locState === 'locating' && (
              <div className="w-full py-4 bg-slate-700 rounded-xl flex items-center justify-center gap-3 text-gray-300 text-sm">
                <span className="w-5 h-5 border-2 border-orange-500 border-t-transparent rounded-full animate-spin" />
                Getting your location…
              </div>
            )}

            {locState === 'error' && (
              <div className="space-y-3">
                <div className="bg-red-900 bg-opacity-30 border border-red-800 rounded-xl p-3 text-red-400 text-sm text-center">
                  Could not access location. Please allow location access in your browser settings and try again.
                </div>
                <button onClick={requestLocation} className="w-full py-3 bg-slate-700 text-gray-300 rounded-xl text-sm hover:bg-slate-600 transition font-semibold">
                  Try Again
                </button>
              </div>
            )}

            {locState === 'located' && (
              <div className="space-y-3">
                {routeState === 'loading' && (
                  <div className="w-full py-3 bg-slate-700 rounded-xl flex items-center justify-center gap-3 text-gray-300 text-sm">
                    <span className="w-4 h-4 border-2 border-orange-500 border-t-transparent rounded-full animate-spin" />
                    Building route…
                  </div>
                )}
                {routeState === 'error' && (
                  <div className="bg-red-900 bg-opacity-30 border border-red-800 rounded-xl p-3 text-red-400 text-sm text-center">
                    Could not generate a route here. Try a different direction or distance.
                  </div>
                )}
                <button
                  onClick={() => buildRoute(location.lat, location.lng, distance, direction, variant)}
                  disabled={routeState === 'loading'}
                  className="w-full py-3 bg-slate-700 border border-slate-600 text-gray-200 rounded-xl text-sm hover:bg-slate-600 transition font-semibold disabled:opacity-50"
                >
                  🔄 Refresh Route
                </button>
              </div>
            )}
          </div>
        </div>
      );
    }

    // Dashboard
    function Dashboard({ plan, logs, injuries, onLogWorkout, onSwapWorkout, onGPSTrack, onModifyPlan, onLogInjury, onResetPlan, adaptationState, onNextWeek, viewedWeekIdx, onSetViewedWeek }) {
      const [showRouteFinder, setShowRouteFinder] = useState(false);

      if (!plan || !plan.weekWorkouts || plan.weekWorkouts.length === 0) {
        return (
          <div className="text-white p-8 text-center space-y-4">
            <div className="text-2xl">⚠️</div>
            <div className="text-lg font-semibold">Your training plan could not be loaded.</div>
            <div className="text-gray-400 text-sm">This can happen if your saved plan data is from an older version of the app.</div>
            <button onClick={onResetPlan} className="px-6 py-3 bg-orange-500 text-white rounded-lg font-bold hover:bg-orange-600">
              Set Up a New Plan
            </button>
          </div>
        );
      }

      // ── Route Finder overlay ───────────────────────────────────────────
      if (showRouteFinder) {
        return <RouteFinder plan={plan} onBack={() => setShowRouteFinder(false)} />;
      }

      const today = new Date();
      const calendarWeekIdx = getCurrentWeekIdx(plan.raceDate, plan.totalWeeks, plan.weekStartOffset || 0);
      // viewedWeek follows the calendar unless the user has manually navigated or wrapped up a week
      const currentWeekIdx = viewedWeekIdx != null
        ? Math.max(0, Math.min(viewedWeekIdx, plan.totalWeeks - 1))
        : calendarWeekIdx;
      const isViewingCurrentWeek = currentWeekIdx === calendarWeekIdx;
      const weekWorkouts = plan.weekWorkouts[currentWeekIdx] || [];
      const phase = plan.weeks[currentWeekIdx]?.phase;
      const currentDayIdx = today.getDay();
      const trainingStart = getTrainingStartDate(plan.raceDate, plan.totalWeeks, plan.weekStartOffset || 0);
      const daysToRace = Math.ceil((new Date(plan.raceDate) - today) / 86400000);

      return (
        <div className="space-y-6 animate-fadeIn">
          {/* Compressed Plan Notice */}
          {plan.isCompressedPlan && (
            <div className="bg-blue-900 border border-blue-600 rounded-xl p-4">
              <div className="flex items-start gap-3">
                <span className="text-2xl">📅</span>
                <div>
                  <p className="text-blue-200 font-bold text-sm">Compressed Training Window</p>
                  <p className="text-blue-300 text-sm mt-1">
                    Your {RACE_TYPES[plan.raceType]?.label} plan is <strong>{plan.totalWeeks} weeks</strong> — shorter than the standard {RACE_TYPES[plan.raceType]?.weeks}-week program.
                    Based on your current fitness, your <strong>peak long run will reach ~{plan.peakLongRunMiles} miles</strong> {plan.peakLongRunMiles < plan.standardLongRun ? `(standard plan reaches ${plan.standardLongRun} mi)` : ''}.
                  </p>
                  <p className="text-blue-400 text-xs mt-1">
                    The plan starts you at a higher base than usual to make the most of the available time. Taper and race week are preserved.
                  </p>
                </div>
              </div>
            </div>
          )}

          {/* Week navigation */}
          <div className="flex items-center justify-between bg-slate-800 border border-slate-700 rounded-lg px-4 py-2.5">
            <button
              onClick={() => onSetViewedWeek && onSetViewedWeek(Math.max(0, currentWeekIdx - 1))}
              disabled={currentWeekIdx === 0}
              className="p-1.5 rounded-lg text-gray-400 hover:text-white hover:bg-slate-700 disabled:opacity-25 disabled:cursor-not-allowed transition"
            >◀</button>

            <div className="text-center">
              <div className="text-white font-semibold text-sm">
                Week {plan.weeks[currentWeekIdx]?.weekNum} of {plan.totalWeeks}
                <span className="ml-2 text-xs text-gray-500 capitalize">{phase}</span>
              </div>
              {!isViewingCurrentWeek && (
                <button
                  onClick={() => onSetViewedWeek && onSetViewedWeek(calendarWeekIdx)}
                  className="text-xs text-orange-400 hover:text-orange-300 underline underline-offset-2 mt-0.5"
                >↩ Back to current week</button>
              )}
            </div>

            <button
              onClick={() => onSetViewedWeek && onSetViewedWeek(Math.min(plan.totalWeeks - 1, currentWeekIdx + 1))}
              disabled={currentWeekIdx === plan.totalWeeks - 1}
              className="p-1.5 rounded-lg text-gray-400 hover:text-white hover:bg-slate-700 disabled:opacity-25 disabled:cursor-not-allowed transition"
            >▶</button>
          </div>

          {/* Adaptation Banner */}
          <AdaptationBanner phase={phase} adaptationState={adaptationState} />

          {/* Missed Workouts */}
          <MissedWorkoutsBanner plan={plan} logs={logs} onLogWorkout={onLogWorkout} />

          {/* Injury Warning */}
          <InjuryWarningBanner injuries={injuries} onModifyPlan={onModifyPlan} />

          {/* Race Week Checklist */}
          {phase === 'raceWeek' && (() => {
            const checklistKey = `rr_raceweek_${plan.raceDate}`;
            const [checked, setChecked] = React.useState(() => {
              try { return JSON.parse(localStorage.getItem(checklistKey) || '[]'); } catch { return []; }
            });
            const toggleCheck = (i) => {
              const updated = checked.includes(i) ? checked.filter(x => x !== i) : [...checked, i];
              setChecked(updated);
              localStorage.setItem(checklistKey, JSON.stringify(updated));
            };
            const items = [
              { day: '3 days out', text: 'Begin carb-loading — add extra pasta, rice, or bread to meals', icon: '🍝' },
              { day: '3 days out', text: 'Confirm race registration, bib pickup, and start time', icon: '📋' },
              { day: '2 days out', text: 'Lay out all race gear: shoes, kit, watch, gels, bib', icon: '👟' },
              { day: '2 days out', text: 'Plan your race-day route and parking/transport', icon: '🗺️' },
              { day: '1 day out', text: 'Eat a familiar, carb-rich dinner — nothing new or heavy', icon: '🍽️' },
              { day: '1 day out', text: 'Hydrate well — urine should be pale yellow by evening', icon: '💧' },
              { day: '1 day out', text: 'Set two alarms and get to bed early', icon: '⏰' },
              { day: 'Race morning', text: 'Eat a familiar pre-race meal 2–3 hrs before start', icon: '🥐' },
              { day: 'Race morning', text: 'Arrive early — 45–60 min before gun for warm-up + bag drop', icon: '🏟️' },
              { day: 'Race morning', text: 'Warm up: 15 min easy jog + 6 strides at race pace', icon: '🏃' },
            ];
            const doneCount = checked.length;
            return (
              <div className="bg-slate-800 rounded-lg p-4 border border-yellow-600">
                <div className="flex items-center justify-between mb-3">
                  <h2 className="text-yellow-400 font-bold text-lg">🏁 Race Week Checklist</h2>
                  <span className="text-yellow-600 text-sm font-semibold">{doneCount}/{items.length}</span>
                </div>
                <div className="w-full bg-slate-700 rounded-full h-1.5 mb-4">
                  <div className="bg-yellow-500 h-1.5 rounded-full transition-all" style={{width: `${(doneCount/items.length)*100}%`}} />
                </div>
                <div className="space-y-2">
                  {items.map((item, i) => (
                    <button key={i} onClick={() => toggleCheck(i)}
                      className={`w-full flex items-start gap-3 p-2.5 rounded-lg text-left transition ${checked.includes(i) ? 'bg-green-900 bg-opacity-30 border border-green-800' : 'bg-slate-700 border border-slate-600 hover:border-slate-500'}`}>
                      <span className="text-base leading-tight mt-0.5 shrink-0">{checked.includes(i) ? '✅' : item.icon}</span>
                      <div>
                        <div className="text-gray-500 text-xs">{item.day}</div>
                        <div className={`text-sm ${checked.includes(i) ? 'text-green-400 line-through opacity-70' : 'text-gray-200'}`}>{item.text}</div>
                      </div>
                    </button>
                  ))}
                </div>
              </div>
            );
          })()}

          {/* This Week Overview */}
          {(() => {
            const DAY_NAMES = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
            const nonRestWorkouts = weekWorkouts.filter(w => w.type !== 'rest');
            const completedCount  = weekWorkouts.filter((w, i) => !!logs[`${currentWeekIdx}-${i}`] && w.type !== 'rest').length;
            const progressPct     = nonRestWorkouts.length > 0 ? (completedCount / nonRestWorkouts.length) * 100 : 0;
            return (
              <div className="bg-slate-800 rounded-lg p-4 border border-slate-700">
                {/* Header */}
                <div className="flex items-center justify-between mb-3">
                  <h2 className="text-white font-bold text-lg">📋 This Week's Workouts</h2>
                  <div className="text-right">
                    <div className="text-orange-400 font-semibold text-xs">🏁 {daysToRace > 0 ? `${daysToRace} days to race` : daysToRace === 0 ? 'Race day!' : 'Race passed'}</div>
                    <div className="text-gray-500 text-xs capitalize mt-0.5">Week {plan.weeks[currentWeekIdx].weekNum}/{plan.totalWeeks} · {plan.weeks[currentWeekIdx].mileage} mi · {phase}</div>
                  </div>
                </div>

                {/* Progress bar */}
                {nonRestWorkouts.length > 0 && (
                  <div className="mb-4">
                    <div className="flex justify-between text-xs text-gray-500 mb-1">
                      <span>{completedCount} of {nonRestWorkouts.length} workouts done</span>
                      <span>{Math.round(progressPct)}%</span>
                    </div>
                    <div className="w-full bg-slate-700 rounded-full h-1.5">
                      <div className="bg-orange-500 h-1.5 rounded-full transition-all" style={{width: `${progressPct}%`}} />
                    </div>
                  </div>
                )}

                {/* Workout rows */}
                <div className="space-y-1.5">
                  {weekWorkouts.map((w, i) => {
                    const logData    = logs[`${currentWeekIdx}-${i}`];
                    const isCompleted = !!logData;
                    const isToday    = isViewingCurrentWeek && i === currentDayIdx;
                    const isPast     = isViewingCurrentWeek && i < currentDayIdx;
                    const isRest     = w.type === 'rest';
                    const wt         = WORKOUT_TYPES[w.type];
                    const isMissed   = isPast && !isRest && !isCompleted;

                    return (
                      <div key={i} className={`flex items-center gap-3 px-3 py-2 rounded-lg border transition ${
                        isCompleted ? 'bg-green-900 bg-opacity-20 border-green-800' :
                        isMissed    ? 'border-yellow-800 bg-yellow-900 bg-opacity-10' :
                        isToday     ? 'border-orange-500 bg-orange-900 bg-opacity-10' :
                        isRest      ? 'border-slate-700 opacity-40' :
                                      'border-slate-700'
                      }`}>
                        {/* Day label */}
                        <div className={`text-xs font-bold w-7 shrink-0 ${
                          isToday ? 'text-orange-400' : isMissed ? 'text-yellow-600' : 'text-gray-600'
                        }`}>{DAY_NAMES[i]}</div>

                        {/* Workout icon */}
                        <span className="text-base leading-none shrink-0">{wt.icon}</span>

                        {/* Workout name + detail */}
                        <div className="flex-1 min-w-0">
                          <div className={`text-sm font-semibold leading-tight ${
                            isCompleted ? 'text-green-400 line-through opacity-60' : isRest ? 'text-gray-500' : wt.textColor
                          }`}>{wt.label}</div>
                          {!isRest && (w.miles > 0 || w.description) && (
                            <div className="text-xs text-gray-500 truncate mt-0.5">
                              {w.miles > 0 ? `${w.miles} mi` : ''}
                              {w.miles > 0 && w.description ? ' · ' : ''}
                              {w.description || ''}
                            </div>
                          )}
                          {isCompleted && logData.milesVal && (
                            <div className="text-xs text-green-600 mt-0.5">Logged {logData.milesVal} mi{logData.paceMin ? ` @ ${formatPace(logData.paceMin * 60 + logData.paceSec)}/mi` : ''}</div>
                          )}
                        </div>

                        {/* Status badge */}
                        <div className="shrink-0 text-xs font-semibold">
                          {isCompleted ? <span className="text-green-400">✓ done</span> :
                           isMissed    ? <span className="text-yellow-600">missed</span> :
                           isToday     ? <span className="text-orange-400">today</span> :
                           null}
                        </div>
                      </div>
                    );
                  })}
                </div>
              </div>
            );
          })()}

          {/* VDOT Training Zones Card */}
          {(() => {
            const paces = calcPaces(plan.raceType, plan.goalTime, plan.fitnessLevel, plan.fitnessAssessment);
            const zones = [
              { label: 'E  Easy',      pace: paces.easy,      color: 'text-blue-400',   style: {background:'rgba(30,58,138,0.35)', borderColor:'rgba(59,130,246,0.25)'}, desc: '~80% of training' },
              { label: 'L  Long',      pace: paces.long,      color: 'text-green-400',  style: {background:'rgba(20,83,45,0.35)',  borderColor:'rgba(74,222,128,0.25)'}, desc: 'Aerobic base' },
              { label: 'M  Marathon',  pace: paces.marathon || paces.tempo * 1.06, color: 'text-yellow-400', style: {background:'rgba(78,63,0,0.35)', borderColor:'rgba(251,191,36,0.25)'}, desc: 'Steady state' },
              { label: 'T  Tempo',     pace: paces.tempo,     color: 'text-purple-400', style: {background:'rgba(59,7,100,0.35)', borderColor:'rgba(167,139,250,0.25)'}, desc: 'Lactate threshold' },
              { label: 'I  Intervals', pace: paces.intervals, color: 'text-red-400',    style: {background:'rgba(69,10,10,0.45)', borderColor:'rgba(248,113,113,0.25)'}, desc: 'VO₂max effort' },
              { label: '🏁 Race Goal', pace: paces.race,      color: 'text-orange-400', style: {background:'rgba(67,20,7,0.45)',  borderColor:'rgba(251,146,60,0.30)'},  desc: 'Your target pace' },
            ];
            return (
              <div className="bg-slate-800 rounded-lg p-4 border border-slate-700">
                <div className="flex items-center justify-between mb-3">
                  <h2 className="text-white font-bold text-lg">🧬 VDOT Training Zones</h2>
                  <span style={{background:'rgba(249,115,22,0.15)', border:'1px solid rgba(249,115,22,0.35)'}} className="text-orange-400 text-xs font-bold px-2 py-1 rounded-full">
                    VDOT {paces.vdot}
                  </span>
                </div>
                <p className="text-gray-500 text-xs mb-3">Jack Daniels method · paces calibrated to your {RACE_TYPES[plan.raceType].label} goal</p>
                <div className="grid grid-cols-2 gap-2">
                  {zones.map(z => (
                    <div key={z.label} className="rounded-lg p-3 border" style={z.style}>
                      <div className={`${z.color} text-xs font-bold mb-1`}>{z.label}</div>
                      <div className="text-white text-lg font-mono font-bold">{formatPace(z.pace)}<span className="text-gray-500 text-xs font-normal">/mi</span></div>
                      <div className="text-gray-500 text-xs mt-1">{z.desc}</div>
                    </div>
                  ))}
                </div>
                <div className="mt-3 rounded p-2 text-xs text-gray-400" style={{background:'rgba(51,65,85,0.6)'}}>
                  <span className="text-blue-300 font-semibold">80/20 Rule</span> — ~80% of weekly miles at Easy/Long/Recovery pace. Only ~20% at Tempo or harder. This is how elite runners train.
                </div>
              </div>
            );
          })()}

          {/* Fitness Trends */}
          <FitnessTrendChart plan={plan} logs={logs} />

          {/* Today / All workouts */}
          {isViewingCurrentWeek ? (
            <div>
              <h2 className="text-white font-bold text-lg mb-3">📅 Today</h2>
              {currentDayIdx < weekWorkouts.length && (
                <WorkoutCard
                  workout={weekWorkouts[currentDayIdx]}
                  dateStr={today.toLocaleDateString()}
                  weekIdx={currentWeekIdx}
                  dayIdx={currentDayIdx}
                  onLog={onLogWorkout}
                  onSwap={onSwapWorkout}
                  logData={logs[`${currentWeekIdx}-${currentDayIdx}`]}
                  onGPSTrack={onGPSTrack}
                />
              )}
            </div>
          ) : null}

          {/* Upcoming (current week) / All workouts (other weeks) */}
          <div>
            <h2 className="text-white font-bold text-lg mb-3">
              {isViewingCurrentWeek ? '📋 Upcoming' : '📋 All Workouts'}
            </h2>
            <div className="space-y-3">
              {weekWorkouts.map((w, i) => {
                if (isViewingCurrentWeek && i <= currentDayIdx) return null;
                const weekStart = getWorkoutDate(plan.raceDate, plan.totalWeeks, currentWeekIdx, 0, plan.weekStartOffset || 0);
                const date = addDays(weekStart, i);
                return (
                  <WorkoutCard
                    key={i}
                    workout={w}
                    dateStr={date.toLocaleDateString()}
                    weekIdx={currentWeekIdx}
                    dayIdx={i}
                    onLog={onLogWorkout}
                    onSwap={onSwapWorkout}
                    logData={logs[`${currentWeekIdx}-${i}`]}
                    onGPSTrack={onGPSTrack}
                  />
                );
              })}
            </div>
          </div>

          {/* Wrap up this week — only show for the current calendar week */}
          {isViewingCurrentWeek && (() => {
            const nonRestIdxs = weekWorkouts.map((w,i)=>({w,i})).filter(({w})=>w.type!=='rest').map(({i})=>i);
            const unloggedCount = nonRestIdxs.filter(i => !logs[`${currentWeekIdx}-${i}`]).length;
            return (
              <div className="pt-2">
                {unloggedCount > 0 && (
                  <div className="mb-3 text-sm text-yellow-300 bg-yellow-900 bg-opacity-40 border border-yellow-700 rounded-lg px-4 py-2">
                    ⚠️ You still have {unloggedCount} workout{unloggedCount !== 1 ? 's' : ''} this week not logged — no worries if you skipped them, you can still move on.
                  </div>
                )}
                <button
                  onClick={() => onNextWeek && onNextWeek(currentWeekIdx, logs)}
                  className="w-full py-3 bg-slate-700 hover:bg-slate-600 border border-slate-500 text-gray-200 font-semibold rounded-lg transition text-sm"
                >
                  Wrap up this week →
                </button>
              </div>
            );
          })()}

          {/* Route Finder card */}
          <div className="bg-slate-800 border border-slate-700 rounded-xl overflow-hidden">
            <button
              onClick={() => setShowRouteFinder(true)}
              className="w-full flex items-center gap-4 px-4 py-4 hover:bg-slate-750 transition text-left group"
            >
              <div className="w-12 h-12 bg-blue-900 bg-opacity-60 border border-blue-800 rounded-xl flex items-center justify-center text-2xl shrink-0 group-hover:border-blue-600 transition">
                🗺️
              </div>
              <div className="flex-1 min-w-0">
                <div className="font-bold text-white text-sm">Route Finder</div>
                <div className="text-gray-400 text-xs mt-0.5">Generate a running route near you based on today's target distance</div>
              </div>
              <span className="text-gray-500 group-hover:text-gray-300 transition text-sm shrink-0">→</span>
            </button>
          </div>

        </div>
      );
    }

    // Plan View
    function PlanView({ plan, logs, onLogWorkout, onSwapWorkout, onGPSTrack, onResetPlan }) {
      if (!plan?.weekWorkouts || plan.weekWorkouts.length === 0) {
        return (
          <div className="text-white p-8 text-center space-y-4">
            <div className="text-2xl">⚠️</div>
            <div className="text-lg font-semibold">Your training plan could not be loaded.</div>
            <button onClick={onResetPlan} className="px-6 py-3 bg-orange-500 text-white rounded-lg font-bold hover:bg-orange-600">
              Set Up a New Plan
            </button>
          </div>
        );
      }
      return (
        <div className="space-y-6 animate-fadeIn">
          {plan.weeks.map((week, weekIdx) => {
            const weekWorkouts = plan.weekWorkouts[weekIdx] || [];
            return (
              <div key={weekIdx} className="bg-slate-800 rounded-lg p-4 border border-slate-700">
                <h3 className="text-white font-bold text-lg mb-1 flex items-center justify-between flex-wrap gap-2">
                  <span>Week {week.weekNum} of {plan.totalWeeks}</span>
                  <span className="text-sm font-normal text-gray-400 capitalize">{week.phase} phase</span>
                </h3>
                <div className="flex gap-3 text-xs mb-3 text-gray-500">
                  <span className="text-white font-semibold">{week.mileage} mi</span>
                  {(() => {
                    const ws = weekWorkouts;
                    const hardMi  = ws.filter(w => ['tempo','intervals','hills'].includes(w.type)).reduce((s,w)=>s+(w.miles||0),0);
                    const totalMi = ws.filter(w => w.miles > 0).reduce((s,w)=>s+(w.miles||0),0);
                    const easyPct = totalMi > 0 ? Math.round(((totalMi - hardMi)/totalMi)*100) : 80;
                    const hardPct = 100 - easyPct;
                    return (
                      <span>
                        <span className="text-blue-400">{easyPct}% easy</span>
                        <span className="text-gray-600"> · </span>
                        <span className="text-red-400">{hardPct}% hard</span>
                      </span>
                    );
                  })()}
                </div>
                <div className="space-y-2">
                  {weekWorkouts.map((w, dayIdx) => {
                    const date = getWorkoutDate(plan.raceDate, plan.totalWeeks, weekIdx, dayIdx, plan.weekStartOffset || 0);
                    return (
                      <WorkoutCard
                        key={dayIdx}
                        workout={w}
                        dateStr={date.toLocaleDateString()}
                        weekIdx={weekIdx}
                        dayIdx={dayIdx}
                        onLog={onLogWorkout}
                        onSwap={onSwapWorkout}
                        logData={logs[`${weekIdx}-${dayIdx}`]}
                        onGPSTrack={onGPSTrack}
                      />
                    );
                  })}
                </div>
              </div>
            );
          })}
        </div>
      );
    }

    // Treadmill speed helper
    function treadmillMph(secPerMile) {
      if (!secPerMile || secPerMile <= 0) return null;
      return (3600 / secPerMile).toFixed(1);
    }

    // Progress View
    function ProgressView({ logs, plan, injuries, onLogInjury }) {
      const [prInput, setPrInput]   = useState({ dist: '5k', mm: '', ss: '' });
      const [prs, setPrs]           = useState(() => {
        try { return JSON.parse(localStorage.getItem('rr_prs') || '{}'); } catch { return {}; }
      });
      const savePr = () => {
        const totalSec = parseInt(prInput.mm || 0) * 60 + parseInt(prInput.ss || 0);
        if (!totalSec) return;
        const updated = { ...prs, [prInput.dist]: { sec: totalSec, date: new Date().toISOString() } };
        setPrs(updated);
        localStorage.setItem('rr_prs', JSON.stringify(updated));
        setPrInput(p => ({ ...p, mm: '', ss: '' }));
      };

      const runLogs = Object.entries(logs)
        .filter(([, l]) => l.type === 'run' && l.milesVal > 0)
        .sort(([a], [b]) => {
          const [aw, ad] = a.split('-').map(Number);
          const [bw, bd] = b.split('-').map(Number);
          return aw !== bw ? aw - bw : ad - bd;
        });

      const totalMiles    = runLogs.reduce((s, [, l]) => s + (l.milesVal || 0), 0);
      const totalWorkouts = Object.keys(logs).length;
      const avgPaceSec    = (() => {
        const paced = runLogs.filter(([, l]) => l.paceMin);
        if (!paced.length) return 0;
        return paced.reduce((s, [, l]) => s + l.paceMin * 60 + (l.paceSec || 0), 0) / paced.length;
      })();

      // ── Streak (consecutive weeks with ≥1 logged workout) ──────────────
      const streak = (() => {
        if (!plan) return 0;
        let count = 0;
        const cwi = getCurrentWeekIdx(plan.raceDate, plan.totalWeeks, plan.weekStartOffset || 0);
        for (let w = cwi; w >= 0; w--) {
          const hasLog = Object.keys(logs).some(k => k.startsWith(`${w}-`));
          if (hasLog) count++; else break;
        }
        return count;
      })();

      // ── Completion rate ─────────────────────────────────────────────────
      const completionRate = (() => {
        if (!plan) return null;
        const cwi = getCurrentWeekIdx(plan.raceDate, plan.totalWeeks, plan.weekStartOffset || 0);
        let planned = 0, completed = 0;
        for (let w = 0; w <= cwi; w++) {
          (plan.weekWorkouts[w] || []).forEach((wo, d) => {
            if (wo.type === 'rest') return;
            planned++;
            if (logs[`${w}-${d}`]) completed++;
          });
        }
        return planned > 0 ? Math.round((completed / planned) * 100) : null;
      })();

      // ── Race time predictor (VDOT from recent easy runs) ────────────────
      const predictedTime = (() => {
        if (!plan || runLogs.length < 3) return null;
        const recent = runLogs.slice(-5).filter(([, l]) => l.paceMin);
        if (recent.length < 2) return null;
        const avgSec = recent.reduce((s, [, l]) => s + l.paceMin * 60 + (l.paceSec || 0), 0) / recent.length;
        // Back-calculate VDOT from current easy pace: easy ≈ 72% of vVO2max
        // mPerMin from sec/mile: 1609.34 / (avgSec/60) then × (1/0.72)
        const easyMperMin  = (1609.34 / (avgSec / 60));
        const vVO2maxMperMin = easyMperMin / 0.72;
        // Re-derive VDOT from vVO2max using quadratic
        const estVDOT = 0.000104 * vVO2maxMperMin * vVO2maxMperMin + 0.182258 * vVO2maxMperMin - 4.60;
        const clampedVDOT = Math.max(20, Math.min(85, estVDOT));
        // Predict finish time for the goal race type
        const raceDistKm = { '5k': 5, '10k': 10, 'half': 21.0975, 'marathon': 42.195 }[plan.raceType];
        // At race effort the runner uses ~97.5% of vVO2max for 5K, scaling down for longer races
        const racePctMap = { '5k': 0.975, '10k': 0.93, 'half': 0.88, 'marathon': 0.82 };
        const racePct = racePctMap[plan.raceType] || 0.88;
        const raceVelMperMin = vVO2maxMperMin * racePct;
        const predMinutes = (raceDistKm * 1000) / raceVelMperMin;
        return { predMinutes, clampedVDOT };
      })();

      // ── Weekly mileage by week (planned vs actual) ──────────────────────
      const weeklyData = (() => {
        if (!plan) return [];
        const cwi = getCurrentWeekIdx(plan.raceDate, plan.totalWeeks, plan.weekStartOffset || 0);
        return plan.weeks.slice(0, cwi + 1).map((wk, w) => {
          const actual = Object.entries(logs)
            .filter(([k, l]) => k.startsWith(`${w}-`) && l.type === 'run')
            .reduce((s, [, l]) => s + (l.milesVal || 0), 0);
          return { week: wk.weekNum, planned: wk.mileage, actual: Math.round(actual * 10) / 10 };
        });
      })();

      // ── Easy pace trend ─────────────────────────────────────────────────
      const paceTrend = runLogs
        .filter(([, l]) => l.paceMin && l.paceMin > 0)
        .slice(-10)
        .map(([k, l], i) => ({ i, sec: l.paceMin * 60 + (l.paceSec || 0) }));

      // SVG chart helpers
      const chartW = 280, chartH = 80;
      const barChart = (data, getVal, maxVal) => {
        if (!data.length) return null;
        const bw = Math.max(4, (chartW - 20) / data.length - 2);
        return data.map((d, i) => {
          const v = getVal(d);
          const h = maxVal > 0 ? (v / maxVal) * (chartH - 12) : 0;
          const x = 10 + i * ((chartW - 20) / data.length);
          return { x, h, v, d };
        });
      };

      const maxPlanned = Math.max(...weeklyData.map(d => d.planned), 1);
      const bars = barChart(weeklyData, d => d.planned, maxPlanned);
      const actBars = barChart(weeklyData, d => d.actual, maxPlanned);

      const paceMin = paceTrend.length > 1 ? Math.min(...paceTrend.map(p => p.sec)) : 0;
      const paceMax = paceTrend.length > 1 ? Math.max(...paceTrend.map(p => p.sec)) : 1;
      const pacePoints = paceTrend.map((p, i) => {
        const x = paceTrend.length > 1 ? 10 + (i / (paceTrend.length - 1)) * (chartW - 20) : chartW / 2;
        const y = chartH - 10 - ((p.sec - paceMin) / Math.max(paceMax - paceMin, 1)) * (chartH - 20);
        return `${x},${y}`;
      }).join(' ');

      return (
        <div className="space-y-6 animate-fadeIn">

          {/* ── Race Time Predictor ── */}
          {predictedTime && plan && (
            <div className="bg-slate-800 rounded-lg p-4 border border-slate-700">
              <div className="flex items-center justify-between mb-3">
                <h3 className="text-white font-bold text-lg">🔮 Race Time Predictor</h3>
                <span className="text-xs text-gray-500">based on recent runs</span>
              </div>
              <div className="grid grid-cols-2 gap-3">
                <div className="rounded-lg p-3 text-center" style={{background:'rgba(249,115,22,0.12)', border:'1px solid rgba(249,115,22,0.25)'}}>
                  <div className="text-gray-400 text-xs mb-1">Predicted Finish</div>
                  <div className="text-orange-400 text-2xl font-bold">{formatTime(predictedTime.predMinutes * 60)}</div>
                  <div className="text-gray-500 text-xs mt-1">{RACE_TYPES[plan.raceType]?.label}</div>
                </div>
                <div className="rounded-lg p-3 text-center" style={{background:'rgba(34,197,94,0.10)', border:'1px solid rgba(34,197,94,0.20)'}}>
                  <div className="text-gray-400 text-xs mb-1">Goal Time</div>
                  <div className="text-green-400 text-2xl font-bold">{formatTime(plan.goalTime * 60)}</div>
                  <div className="text-gray-500 text-xs mt-1">
                    {predictedTime.predMinutes < plan.goalTime
                      ? `🎯 ${Math.round(plan.goalTime - predictedTime.predMinutes)} min ahead of goal`
                      : `📈 ${Math.round(predictedTime.predMinutes - plan.goalTime)} min behind — keep training!`}
                  </div>
                </div>
              </div>
              <div className="mt-2 text-xs text-gray-600 text-center">VDOT est. {predictedTime.clampedVDOT.toFixed(1)} · updates as you log more runs</div>
            </div>
          )}

          {/* ── Key Stats ── */}
          <div className="grid grid-cols-2 gap-3">
            <div className="bg-slate-800 rounded-lg p-4 border border-slate-700 text-center">
              <div className="text-gray-400 text-xs mb-1">Workouts Logged</div>
              <div className="text-white text-2xl font-bold">{totalWorkouts}</div>
            </div>
            <div className="bg-slate-800 rounded-lg p-4 border border-slate-700 text-center">
              <div className="text-gray-400 text-xs mb-1">Total Miles</div>
              <div className="text-white text-2xl font-bold">{totalMiles.toFixed(1)}</div>
            </div>
            <div className="bg-slate-800 rounded-lg p-4 border border-slate-700 text-center">
              <div className="text-gray-400 text-xs mb-1">Avg Pace</div>
              <div className="text-white text-2xl font-bold">{avgPaceSec > 0 ? formatPace(avgPaceSec) : '--:--'}</div>
              {avgPaceSec > 0 && <div className="text-gray-600 text-xs mt-1">{treadmillMph(avgPaceSec)} mph treadmill</div>}
            </div>
            <div className="bg-slate-800 rounded-lg p-4 border border-slate-700 text-center">
              <div className="text-gray-400 text-xs mb-1">
                {streak > 0 ? `🔥 Week Streak` : 'Completion Rate'}
              </div>
              <div className="text-white text-2xl font-bold">
                {streak > 0 ? streak : (completionRate !== null ? `${completionRate}%` : '—')}
              </div>
              {completionRate !== null && streak > 0 && (
                <div className="text-gray-600 text-xs mt-1">{completionRate}% plan complete</div>
              )}
            </div>
          </div>

          {/* ── Weekly Mileage Chart ── */}
          {weeklyData.length > 1 && (
            <div className="bg-slate-800 rounded-lg p-4 border border-slate-700">
              <h3 className="text-white font-bold mb-3">📊 Weekly Mileage</h3>
              <svg width="100%" viewBox={`0 0 ${chartW} ${chartH + 16}`} className="overflow-visible">
                {bars && bars.map((b, i) => (
                  <g key={i}>
                    <rect x={b.x} y={chartH - b.h - 2} width={Math.max(4, (chartW-20)/bars.length - 3)} height={b.h + 2}
                      fill="rgba(71,85,105,0.7)" rx="2" />
                    {actBars && actBars[i] && (
                      <rect x={b.x} y={chartH - actBars[i].h - 2} width={Math.max(4,(chartW-20)/bars.length - 3)} height={actBars[i].h + 2}
                        fill={actBars[i].v >= b.v ? '#22c55e' : '#fb923c'} rx="2" opacity="0.85" />
                    )}
                    <text x={b.x + Math.max(2,(chartW-20)/bars.length/2 - 1)} y={chartH + 12} textAnchor="middle" fill="#4b5563" fontSize="8">{b.d.week}</text>
