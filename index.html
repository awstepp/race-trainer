                  </g>
                ))}
              </svg>
              <div className="flex gap-4 text-xs text-gray-500 mt-1">
                <span className="flex items-center gap-1"><span className="w-3 h-3 rounded bg-slate-500 inline-block opacity-70"></span> Planned</span>
                <span className="flex items-center gap-1"><span className="w-3 h-3 rounded bg-green-500 inline-block opacity-85"></span> Actual</span>
              </div>
            </div>
          )}

          {/* ── Pace Trend ── */}

    // ── Nutrition Tab Component ────────────────────────────────────────────
    function NutritionTab({ plan }) {
      const [sectionFilter, setSectionFilter] = React.useState('all');         // 'all' | 'meal-prep' | 'quick-meal'
      const [categoryFilter, setCategoryFilter] = React.useState('all');
      const [goalFilter, setGoalFilter] = React.useState('all');

      const [shoppingList, setShoppingList] = React.useState([]);             // array of recipe ids

      const [activeTab, setActiveTab] = React.useState('recipe');             // 'recipe' | 'shopping'

      const today = new Date();
      today.setHours(0, 0, 0, 0);
      const availableRecipes = ALL_RECIPES.filter(r => !r.releaseDate || new Date(r.releaseDate) <= today);

      // "New this week" = released within the past 7 days
      const oneWeekAgo = new Date(today);
      oneWeekAgo.setDate(oneWeekAgo.getDate() - 7);
      const newThisWeek = new Set(
        availableRecipes
          .filter(r => r.releaseDate && new Date(r.releaseDate) > oneWeekAgo)
          .map(r => r.id)
      );

      // Recipe of the Week — rotate by ISO week number, filtered to user's goal
      const userGoal = plan && plan.goal ? plan.goal : null;
      const recipeOfTheWeek = React.useMemo(() => {
        const d = new Date();
        const startOfYear = new Date(d.getFullYear(), 0, 1);
        const weekNum = Math.floor((d - startOfYear) / (7 * 24 * 60 * 60 * 1000));
        // Prefer recipes matching the user's goal; fall back to all available
        const pool = userGoal
          ? availableRecipes.filter(r => r.fitnessGoals && r.fitnessGoals.includes(userGoal))
          : availableRecipes;
        const candidates = pool.length > 0 ? pool : availableRecipes;
        return candidates.length > 0 ? candidates[weekNum % candidates.length] : null;
      }, [availableRecipes, userGoal]);

      );

        const inList = shoppingList.includes(recipe.id);
        const isNew = newThisWeek.has(recipe.id);
        const isPick = recipeOfTheWeek && recipeOfTheWeek.id === recipe.id;
        return (
          <div

    // Main App
    // ── Email Auth Flow ────────────────────────────────────────────────────
    // Handles sign-up, sign-in, and forgot-password screens for email/password auth.
    function EmailAuthFlow({ initialMode, onSignIn, onSignUp, onResetPassword, onBack }) {
      const [view, setView] = React.useState(initialMode || 'signup'); // 'signup' | 'signin' | 'forgot'
      const [email, setEmail] = React.useState('');
      const [password, setPassword] = React.useState('');
      const [confirmPassword, setConfirmPassword] = React.useState('');
      const [showPassword, setShowPassword] = React.useState(false);
      const [error, setError] = React.useState('');
      const [loading, setLoading] = React.useState(false);
      const [resetSent, setResetSent] = React.useState(false);

      const switchView = (v) => { setView(v); setError(''); setResetSent(false); };

      const handleSubmit = async () => {
        setError('');
        if (view === 'signup') {
          if (!email || !password || !confirmPassword) { setError('Please fill in all fields.'); return; }
          if (password.length < 6) { setError('Password must be at least 6 characters.'); return; }
          if (password !== confirmPassword) { setError('Passwords do not match.'); return; }
          setLoading(true);
          const err = await onSignUp(email.trim(), password);
          setLoading(false);
          if (err) setError(err);
        } else if (view === 'signin') {
          if (!email || !password) { setError('Please fill in all fields.'); return; }
          setLoading(true);
          const err = await onSignIn(email.trim(), password);
          setLoading(false);
          if (err) setError(err);
        } else if (view === 'forgot') {
          if (!email) { setError('Please enter your email address.'); return; }
          setLoading(true);
          const err = await onResetPassword(email.trim());
          setLoading(false);
          if (err) { setError(err); return; }
          setResetSent(true);
        }
      };

      const GoogleSVG = () => (
        <svg width="18" height="18" viewBox="0 0 48 48" className="shrink-0">
          <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
          <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
          <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
          <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.31-8.16 2.31-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
        </svg>
      );

      // ── Forgot Password Screen ──────────────────────────────────────────
      if (view === 'forgot') {
        return (
          <div className="min-h-screen bg-slate-900 flex items-center justify-center p-4">
            <div className="max-w-sm w-full">
              <button onClick={() => switchView('signin')}
                className="flex items-center gap-1.5 text-gray-400 hover:text-white text-sm mb-8 transition">
                ← Back to sign in
              </button>
              <h2 className="text-2xl font-bold text-white mb-1">Reset your password</h2>
              <p className="text-gray-400 text-sm mb-6">We'll send a reset link to your email address.</p>
              {resetSent ? (
                <div className="bg-green-900 bg-opacity-40 border border-green-700 rounded-xl p-4 text-green-300 text-sm text-center space-y-1">
                  <div className="text-2xl">✅</div>
                  <p className="font-semibold">Reset email sent!</p>
                  <p className="text-green-400">Check your inbox and follow the link to reset your password.</p>
                </div>
              ) : (
                <>
                  {error && (
                    <div className="bg-red-900 bg-opacity-30 border border-red-800 rounded-lg px-3 py-2 text-red-400 text-sm mb-3">{error}</div>
                  )}
                  <input
                    type="email" value={email} onChange={e => setEmail(e.target.value)}
                    placeholder="Email address"
                    className="w-full bg-slate-800 border border-slate-600 rounded-xl px-4 py-3.5 text-white placeholder-gray-500 focus:outline-none focus:border-orange-500 mb-3 text-sm"
                    onKeyDown={e => e.key === 'Enter' && handleSubmit()}
                  />
                  <button onClick={handleSubmit} disabled={loading}
                    className="w-full py-3.5 bg-orange-500 hover:bg-orange-600 text-white font-bold rounded-xl transition disabled:opacity-60 text-sm">
                    {loading
                      ? <span className="flex items-center justify-center gap-2"><span className="w-4 h-4 border-2 border-white border-t-transparent rounded-full animate-spin" /> Sending…</span>
                      : 'Send reset email'}
                  </button>
                </>
              )}
            </div>
          </div>
        );
      }

      // ── Sign Up / Sign In Screen ────────────────────────────────────────
      return (
        <div className="min-h-screen bg-slate-900 flex items-center justify-center p-4">
          <div className="max-w-sm w-full">
            {/* Back */}
            <button onClick={onBack}
              className="flex items-center gap-1.5 text-gray-400 hover:text-white text-sm mb-8 transition">
              ← Back
            </button>

            {/* Heading */}
            <h2 className="text-2xl font-bold text-white mb-1">

    // ── Landing Screen ─────────────────────────────────────────────────────

    // ── Week Complete Modal ───────────────────────────────────────────────────
    // Shown when the user logs the final workout of the current week.
    // Lets the user choose: adapt plan based on performance, or keep base plan.
    function WeekCompleteModal({ weekIdx, plan, completedLogs, onAdapt, onKeepBase }) {
      if (!plan) return null;

      const weekWorkouts = plan.weekWorkouts[weekIdx] || [];
      const weekData     = plan.weeks[weekIdx] || {};

      // Weekly stats from logs
      const activeDays = weekWorkouts
        .map((w, i) => ({ w, i, log: completedLogs[`${weekIdx}-${i}`] }))
        .filter(({ w }) => w.type !== 'rest');
      const totalMiles    = activeDays.reduce((s, { log }) => s + (parseFloat(log?.milesVal) || 0), 0);
      const completedCount = activeDays.filter(({ log }) => !!log).length;

      // Preview what adaptation would do — use weekIdx+1 as the cutoff so this week's logs are included
      let adaptPreview = { mileageMultiplier: 1.0, paceOffsetSec: 0, sampleCount: 0, summary: null };
      try { adaptPreview = computeAdaptationFromLogs(completedLogs || {}, plan, weekIdx + 1); } catch(e) {}
      const mileagePct    = Math.round((adaptPreview.mileageMultiplier - 1) * 100);
      const paceOff       = Math.round(adaptPreview.paceOffsetSec || 0);
      const hasChanges    = Math.abs(mileagePct) >= 3 || Math.abs(paceOff) > 5;
      const weeksLeft     = plan.totalWeeks - weekIdx - 1;

      return (
        <div className="fixed inset-0 bg-black bg-opacity-75 flex items-center justify-center z-50 p-4">
          <div className="bg-slate-800 rounded-xl max-w-sm w-full shadow-2xl border border-slate-600 overflow-hidden">

            {/* Header */}
            <div className="bg-gradient-to-r from-emerald-800 to-green-700 p-5 text-center">
              <div className="text-4xl mb-2">🎉</div>
              <h2 className="text-xl font-bold text-white">Week {weekData.weekNum} Complete!</h2>
              <p className="text-emerald-200 text-sm mt-1">
                {completedCount} workout{completedCount !== 1 ? 's' : ''} logged
                {totalMiles > 0 ? ` · ${totalMiles.toFixed(1)} mi total` : ''}
              </p>
            </div>

            {/* Body */}
            <div className="p-5 space-y-4">
              {/* Adaptation preview */}
              <div className="bg-slate-700 rounded-lg p-4 space-y-2">
                <p className="text-sm font-semibold text-gray-200">What adapting would change:</p>
                {hasChanges ? (
                  <div className="space-y-1.5 text-sm">
                    {Math.abs(mileagePct) >= 3 && (
                      <div className="flex items-start gap-2">
                        <span className={mileagePct > 0 ? 'text-green-400' : 'text-yellow-400'}>
                          {mileagePct > 0 ? '↑' : '↓'}
                        </span>
                        <span className="text-gray-300">
                          Mileage targets {mileagePct > 0
                            ? `increased ${mileagePct}% — you're trending ahead of schedule`
                            : `eased back ${Math.abs(mileagePct)}% — goal floor still protected`}
                        </span>
                      </div>
                    )}
                    {Math.abs(paceOff) > 5 && (
                      <div className="flex items-start gap-2">
                        <span className={paceOff < 0 ? 'text-green-400' : 'text-yellow-400'}>
                          {paceOff < 0 ? '⚡' : '🐢'}
                        </span>
                        <span className="text-gray-300">
                          Training paces adjusted {Math.abs(paceOff)}s/mi {paceOff < 0 ? 'faster' : 'slower'}
                        </span>
                      </div>
                    )}
                    {weeksLeft > 0 && (
                      <p className="text-gray-500 text-xs pt-1">
                        Applies to the next {weeksLeft} week{weeksLeft !== 1 ? 's' : ''} · Race pace is never changed
                      </p>
                    )}
                  </div>
                ) : (
                  <p className="text-sm text-gray-300">
                    ✅ Your performance was right on target — no adjustments needed.
                  </p>
                )}
              </div>

              {/* Action buttons */}
              <div className="space-y-2">
                <button
                  onClick={onAdapt}
                  className="w-full py-3 bg-emerald-600 hover:bg-emerald-500 text-white font-semibold rounded-lg transition text-sm"
                >
                  {hasChanges ? '🔄 Adapt my plan' : '✅ Got it, move to next week'}
                </button>
                {hasChanges && (
                  <button
                    onClick={onKeepBase}
                    className="w-full py-3 bg-slate-600 hover:bg-slate-500 text-gray-200 font-semibold rounded-lg transition text-sm"
                  >
                    📋 Keep the base plan as-is
                  </button>
                )}
              </div>
            </div>

          </div>
        </div>
      );
    }
    // ─────────────────────────────────────────────────────────────────────────

    function App({ profile, onSwitchProfile }) {
      const profileId = profile.id;
      const CK  = key => pKey(profileId, key); // config key helper

      const [config, setConfig] = useState(() => {
        try {
          const saved = localStorage.getItem(CK('config'));
          return saved && saved !== 'null' ? JSON.parse(saved) : null;
        } catch {
          return null;
        }
      });

      const [plan, setPlan] = useState(() => {
        const tryBuildFromPlan = (p) => {
          if (!p || !p.weeks || !p.totalWeeks || !p.raceType || !p.raceDate) return null;
          const goalTime          = p.goalTime || 120;
          const fitnessLevel      = FITNESS_LEVELS[p.fitnessLevel] ? p.fitnessLevel : 'intermediate';
          const includeStrength   = p.includeStrength !== false;
          const fitnessAssessment = p.fitnessAssessment || null;
          const adaptationState   = p.adaptationState  || null;
          const schedulePrefs     = p.schedulePrefs     || null;
          const weeks = [];
          for (let i = 0; i < p.totalWeeks; i++) {
            weeks.push(buildWeekWorkouts(p.weeks[i], p.raceType, goalTime, fitnessLevel, includeStrength, fitnessAssessment, adaptationState, schedulePrefs));
          }
          return { ...p, goalTime, fitnessLevel, includeStrength, fitnessAssessment, adaptationState, schedulePrefs, weekWorkouts: weeks };
        };

        const tryBuildFromConfig = (c) => {
          if (!c || !c.raceType || !c.raceDate || !c.goalTime || !c.fitnessLevel) return null;
          const schedulePrefs = c.schedulePrefs || null;
          const newPlan = generatePlan(c.raceType, c.raceDate, c.goalTime, c.fitnessLevel, c.includeStrength !== false, c.fitnessAssessment || null, schedulePrefs, c.weekStartOffset || 0);
          const weeks = [];
          for (let i = 0; i < newPlan.totalWeeks; i++) {
            weeks.push(buildWeekWorkouts(newPlan.weeks[i], newPlan.raceType, newPlan.goalTime, newPlan.fitnessLevel, newPlan.includeStrength, newPlan.fitnessAssessment, null, schedulePrefs));
          }
          return { ...newPlan, weekWorkouts: weeks };
        };

        try {
          // 1. Try loading saved plan
          const savedPlan = localStorage.getItem(CK('plan'));
          if (savedPlan && savedPlan !== 'null') {
            const p = JSON.parse(savedPlan);
            const result = tryBuildFromPlan(p);
            if (result) return result;
          }
          // 2. Fall back: regenerate plan from saved config
          const savedConfig = localStorage.getItem(CK('config'));
          if (savedConfig && savedConfig !== 'null') {
            const c = JSON.parse(savedConfig);
            const result = tryBuildFromConfig(c);
            if (result) return result;
          }
          return null;
        } catch {
          return null;
        }
      });

      const [logs, setLogs] = useState(() => {
        try {
          const saved = localStorage.getItem(CK('logs'));
          return saved && saved !== 'null' ? JSON.parse(saved) : {};
        } catch { return {}; }
      });

      const [substitutions, setSubstitutions] = useState(() => {
        try {
          const saved = localStorage.getItem(CK('subs'));
          return saved && saved !== 'null' ? JSON.parse(saved) : {};
        } catch { return {}; }
      });

      const [injuries, setInjuries] = useState(() => {
        try {
          const saved = localStorage.getItem(CK('injuries'));
          return saved && saved !== 'null' ? JSON.parse(saved) : [];
        } catch { return []; }
      });

      const [currentTab, setCurrentTab] = useState('dashboard');
      const [logModalOpen, setLogModalOpen] = useState(false);
      const [logModalData, setLogModalData] = useState(null);
      const [swapModalOpen, setSwapModalOpen] = useState(false);
      const [swapModalData, setSwapModalData] = useState(null);
      const [gpsOpen, setGpsOpen] = useState(false);
      const [gpsWorkoutCtx, setGpsWorkoutCtx] = useState(null);
      const [injuryModalOpen, setInjuryModalOpen] = useState(false);
      const [editPlanOpen, setEditPlanOpen] = useState(false);
      const [fbSetupOpen, setFbSetupOpen] = useState(false);
      const [authUser, setAuthUser] = useState(null);
      const [syncing, setSyncing] = useState(false);
      const [showSetup, setShowSetup] = useState(false);
      const [weekCompleteModal, setWeekCompleteModal] = useState(null); // { weekIdx, completedLogs }
      const [viewedWeekIdx, setViewedWeekIdx] = useState(null); // null = follow calendar

      useEffect(() => { localStorage.setItem(CK('config'),   JSON.stringify(config));   }, [config]);
      useEffect(() => { localStorage.setItem(CK('plan'),     JSON.stringify(plan));     }, [plan]);
      useEffect(() => { localStorage.setItem(CK('logs'),     JSON.stringify(logs));     }, [logs]);
      useEffect(() => { localStorage.setItem(CK('subs'),     JSON.stringify(substitutions)); }, [substitutions]);
      useEffect(() => { localStorage.setItem(CK('injuries'), JSON.stringify(injuries)); }, [injuries]);

      // ── Weekly adaptation: only fires when entering a new week ────────────
      // Adaptation runs at most once per week transition. It only looks at logs
      // from fully-completed weeks so mid-week logging never reshuffles targets.
      // A goal-floor inside buildWeekWorkouts (0.88) ensures the adapted plan
      // never drops too far below what the goal trajectory requires.
      useEffect(() => {
        if (!plan || !plan.weeks) return;

        const currentWeekIdx  = getCurrentWeekIdx(plan.raceDate, plan.totalWeeks, plan.weekStartOffset || 0);
        const lastAdaptedWeek = plan.lastAdaptedWeek ?? -1;

        // Not yet at a new week boundary — do nothing
        if (currentWeekIdx <= lastAdaptedWeek) return;

        // Compute adaptation using only logs from completed weeks
        const newAdaptation = computeAdaptationFromLogs(logs, plan, currentWeekIdx);

        // Rebuild current week + all future weeks with the new multipliers.
        // Past weeks are always preserved as-is.
        const newWeekWorkouts = plan.weekWorkouts.map((week, weekIdx) => {
          if (weekIdx < currentWeekIdx) return week;
          return buildWeekWorkouts(
            plan.weeks[weekIdx],
            plan.raceType,
            plan.goalTime,
            plan.fitnessLevel,
            plan.includeStrength,
            plan.fitnessAssessment,
            newAdaptation,
            plan.schedulePrefs || null
          );
        });

        setPlan(prev => ({
          ...prev,
          weekWorkouts: newWeekWorkouts,
          adaptationState: newAdaptation,
          lastAdaptedWeek: currentWeekIdx   // mark this week as adapted
        }));
      }, [plan?.lastAdaptedWeek]);
      // ──────────────────────────────────────────────────────────────────────

      // ── Firebase Auth listener ──────────────────────────────────────────
      useEffect(() => {
        if (!FIREBASE_ENABLED || !firebaseAuth) return;
        // Handle redirect sign-in result (fired after page reloads from signInWithRedirect)
        firebaseAuth.getRedirectResult().catch(() => {});
        const unsub = firebaseAuth.onAuthStateChanged(async (user) => {
          setAuthUser(user);
          if (user) {
            try {
              setSyncing(true);
              // Always use a fixed 'primary' key for cloud sync so all devices
              // signed into the same Google account share one Firestore path.
              const profileRef = firebaseDb.collection('users').doc(user.uid)
                                           .collection('profiles').doc('primary');
              const legacyRef  = firebaseDb.collection('users').doc(user.uid);

              let d = null;
              const profileDoc = await profileRef.get();
              if (profileDoc.exists) {
                d = profileDoc.data();
              } else {
                // Try legacy flat doc (backwards-compatible)
                const legacyDoc = await legacyRef.get();
                if (legacyDoc.exists) {
                  d = legacyDoc.data();
                } else {
                  // New device — profile ID won't match. Scan all saved profiles
                  // and load the most recently synced one.
                  const allProfiles = await firebaseDb.collection('users').doc(user.uid)
                                                      .collection('profiles').get();
                  if (!allProfiles.empty) {
                    let latestData = null, latestTime = '';
                    allProfiles.forEach(doc => {
                      const data = doc.data();
                      if (data.config && (data.lastSynced || '') > latestTime) {
                        latestTime = data.lastSynced || '';
                        latestData = data;
                      }
                    });
                    if (latestData) d = latestData;
                  }
                }
              }

              if (d && d.config) {
                const c = d.config;
                setConfig(c);

                // Always preserve logs and injuries — these are never regenerated
                if (d.logs)     setLogs(d.logs);
                if (d.injuries) setInjuries(d.injuries);

                // Rebuild plan from saved data, or regenerate if schema changed
                const cloudSchemaVersion = d.schemaVersion || 0;
                const schemaMatch = cloudSchemaVersion === APP_SCHEMA_VERSION;

                if (schemaMatch && d.plan && d.plan.weeks && d.plan.totalWeeks) {
                  // Schema matches — rebuild weekWorkouts client-side (they're derived, not stored)
                  const sp   = c.schedulePrefs    || d.plan.schedulePrefs    || null;
                  const incS = c.includeStrength  !== false;
                  const fa   = c.fitnessAssessment || d.plan.fitnessAssessment || null;
                  const weeks = [];
                  for (let i = 0; i < d.plan.totalWeeks; i++) {
                    weeks.push(buildWeekWorkouts(
                      d.plan.weeks[i], d.plan.raceType,
                      d.plan.goalTime || c.goalTime || 120,
                      d.plan.fitnessLevel || c.fitnessLevel || 'intermediate',
                      incS, fa, null, sp
                    ));
                  }
                  setPlan({ ...d.plan, weekWorkouts: weeks });
                } else {
                  // Schema mismatch or no plan — regenerate from config so latest algorithm is used
                  // This is safe: config is the source of truth, plan is always derivable from it
                  if (c.raceType && c.raceDate && c.goalTime) {
                    setPlan(buildPlanFromConfig(c));
                  }
                }
              }
            } catch(e) { console.warn('Cloud sync load error:', e); }
            finally { setSyncing(false); }
          }
        });
        return unsub;
      }, []);

      // If user signed in but has no cloud data, move them to setup
      useEffect(() => {
        if (!syncing && authUser && !config) setShowSetup(true);
      }, [syncing, authUser, config]);

      // ── Cloud sync when data changes (debounced 1.5s) ────────────────────
      useEffect(() => {
        if (!FIREBASE_ENABLED || !firebaseDb || !authUser || !config) return;
        const timer = setTimeout(async () => {
          try {
            setSyncing(true);
            const profileRef = firebaseDb.collection('users').doc(authUser.uid)
                                         .collection('profiles').doc('primary');
            // Strip derived/large fields before saving (weekWorkouts are rebuilt client-side)
            // Must use destructuring — Firestore rejects undefined values
            const planToSave = plan ? (() => {
              const { weekWorkouts, ...rest } = plan;
              return { ...rest, adaptationState: plan.adaptationState || null };
            })() : null;
            await profileRef.set(
              {
                config,
                plan: planToSave,
                logs,
                injuries,
                schemaVersion: APP_SCHEMA_VERSION,
                lastSynced: new Date().toISOString(),
                appVersion: document.title  // e.g. "RaceReady - Race Training App"
              },
              { merge: true }   // merge: never wipe fields added by future app versions
            );
          } catch(e) { console.warn('Cloud sync save error:', e); }
          finally { setSyncing(false); }
        }, 1500);
        return () => clearTimeout(timer);
      }, [authUser, config, plan, logs, injuries]);

      const handleGoogleSignIn = () => {
        if (!firebaseAuth) return;
        // If running from file:// (local disk), popup won't work — show a helpful message
        if (window.location.protocol === 'file:') {
          alert(
            '⚠️  Google Sign-In requires the app to be served from a web address.\n\n' +
            'Quick fix — open Terminal and run:\n\n' +
            '  python3 -m http.server 8080\n\n' +
            'Then visit:  http://localhost:8080/race-trainer.html\n\n' +
            'Also add "localhost" to Firebase Console → Authentication → Settings → Authorized domains.'
          );
          return;
        }
        const provider = new firebase.auth.GoogleAuthProvider();
        // Use popup — redirect flow breaks on GitHub Pages subdirectory paths.
        // Popup works now that the API key referrer restriction includes awstepp.github.io.
        firebaseAuth.signInWithPopup(provider).catch((err) => {
          // Only fall back to redirect if the popup was explicitly blocked by the browser
          if (err.code === 'auth/popup-blocked') {
            firebaseAuth.signInWithRedirect(provider);
          } else {
            console.error('Sign-in error:', err.code, err.message);
          }
        });
      };
      const handleGoogleSignOut = () => {
        if (firebaseAuth) firebaseAuth.signOut();
        setAuthUser(null);
      };

      // ── Email / password auth handlers ──────────────────────────────────
      const handleEmailSignUp = async (email, password) => {
        if (!firebaseAuth) return 'Authentication is not available right now.';
        try {
          await firebaseAuth.createUserWithEmailAndPassword(email, password);
          return null; // success — onAuthStateChanged takes over
        } catch (err) {
          const msgs = {
            'auth/email-already-in-use': 'An account with this email already exists. Try signing in instead.',
            'auth/invalid-email':         'Please enter a valid email address.',
            'auth/weak-password':         'Password is too weak — use at least 6 characters.',
            'auth/operation-not-allowed': 'Email sign-up is not enabled. Please contact support.',
          };
          return msgs[err.code] || `Sign-up failed: ${err.message}`;
        }
      };

      const handleEmailSignIn = async (email, password) => {
        if (!firebaseAuth) return 'Authentication is not available right now.';
        try {
          await firebaseAuth.signInWithEmailAndPassword(email, password);
          return null; // success
        } catch (err) {
          const msgs = {
            'auth/user-not-found':        'No account found with this email. Create one above.',
            'auth/wrong-password':        'Incorrect password. Try again or use "Forgot password".',
            'auth/invalid-credential':    'Incorrect email or password.',
            'auth/invalid-email':         'Please enter a valid email address.',
            'auth/user-disabled':         'This account has been disabled. Please contact support.',
            'auth/too-many-requests':     'Too many failed attempts — try again in a few minutes.',
          };
          return msgs[err.code] || `Sign-in failed: ${err.message}`;
        }
      };

      const handlePasswordReset = async (email) => {
        if (!firebaseAuth) return 'Authentication is not available right now.';
        try {
          await firebaseAuth.sendPasswordResetEmail(email);
          return null; // success
        } catch (err) {
          const msgs = {
            'auth/user-not-found': 'No account found with this email address.',
            'auth/invalid-email':  'Please enter a valid email address.',
          };
          return msgs[err.code] || `Could not send reset email: ${err.message}`;
        }
      };
      // ───────────────────────────────────────────────────────────────────

      const buildPlanFromConfig = (cfg) => {
        const schedulePrefs = cfg.schedulePrefs || null;
        const newPlan = generatePlan(cfg.raceType, cfg.raceDate, cfg.goalTime, cfg.fitnessLevel, cfg.includeStrength !== false, cfg.fitnessAssessment || null, schedulePrefs, cfg.weekStartOffset || 0);
        const weeks = [];
        for (let i = 0; i < newPlan.totalWeeks; i++) {
          weeks.push(buildWeekWorkouts(newPlan.weeks[i], newPlan.raceType, newPlan.goalTime, newPlan.fitnessLevel, newPlan.includeStrength, newPlan.fitnessAssessment, null, schedulePrefs));
        }
        return { ...newPlan, weekWorkouts: weeks };
      };

      const handleSetupComplete = (newConfig) => {
        setConfig(newConfig);
        setPlan(buildPlanFromConfig(newConfig));
        setLogs({});
      };

      const handleLogWorkout = (weekIdx, dayIdx) => {
        const workout = plan?.weekWorkouts?.[weekIdx]?.[dayIdx];
        if (!workout) return;
        setLogModalData({ weekIdx, dayIdx, workout, gpsResult: null });
        setLogModalOpen(true);
      };

      const handleLogWorkoutGPS = (weekIdx, dayIdx, gpsResult) => {
        const workout = plan?.weekWorkouts?.[weekIdx]?.[dayIdx];
        if (!workout) return;
        setLogModalData({ weekIdx, dayIdx, workout, gpsResult });
        setLogModalOpen(true);
      };

      const handleLogSave = (logData) => {
        const { weekIdx, dayIdx } = logModalData;
        const key = `${weekIdx}-${dayIdx}`;
        setLogs(prev => ({ ...prev, [key]: logData }));
      };

      // User chose "Adapt my plan" in the week-complete modal
      const handleWeekAdapt = () => {
        if (!weekCompleteModal) return;
        const { weekIdx, completedLogs } = weekCompleteModal;
        try {
          // Compute adaptation including this week's logs (cutoff = weekIdx+1)
          const newAdaptation = computeAdaptationFromLogs(completedLogs || logs, plan, weekIdx + 1);
          // Rebuild future weeks only — current and past weeks are frozen
          const newWeekWorkouts = (plan.weekWorkouts || []).map((week, wIdx) => {
            if (wIdx <= weekIdx) return week;
            if (!plan.weeks || !plan.weeks[wIdx]) return week; // safety: skip if week spec missing
            return buildWeekWorkouts(
              plan.weeks[wIdx], plan.raceType, plan.goalTime,
              plan.fitnessLevel, plan.includeStrength ?? true,
              plan.fitnessAssessment || null, newAdaptation, plan.schedulePrefs || null
            );
          });
          setPlan(prev => ({
            ...prev,
            weekWorkouts: newWeekWorkouts,
            adaptationState: newAdaptation,
            lastAdaptedWeek: weekIdx + 1  // advance past next boundary so auto-adapt doesn't re-run
          }));
        } catch (e) {
          // Even if rebuild fails, still mark the week as handled
          setPlan(prev => ({ ...prev, lastAdaptedWeek: weekIdx + 1 }));
        } finally {
          // Advance the dashboard view to the next week so user sees what's coming
          if (plan && weekIdx + 1 < plan.totalWeeks) setViewedWeekIdx(weekIdx + 1);
          setWeekCompleteModal(null);
        }
      };

      // User chose "Keep the base plan" in the week-complete modal
      const handleWeekKeepBase = () => {
        if (!weekCompleteModal) return;
        const { weekIdx } = weekCompleteModal;
        setPlan(prev => ({ ...prev, lastAdaptedWeek: weekIdx + 1 }));  // advance past next boundary so auto-adapt doesn't re-run
        // Advance the dashboard view to the next week
        if (plan && weekIdx + 1 < plan.totalWeeks) setViewedWeekIdx(weekIdx + 1);
        setWeekCompleteModal(null);
      };

      // "Wrap up this week" button in Dashboard
      const handleNextWeek = (weekIdx, currentLogs) => {
        setWeekCompleteModal({ weekIdx, completedLogs: currentLogs });
      };

      const handleSwapWorkout = (weekIdx, dayIdx) => {
        const currentType = plan?.weekWorkouts?.[weekIdx]?.[dayIdx]?.type;
        if (!currentType) return;
        setSwapModalData({ weekIdx, dayIdx, currentType });
        setSwapModalOpen(true);
      };

      const handleSubstitute = (weekIdx, dayIdx, newType) => {
        const key = `${weekIdx}-${dayIdx}`;
        setSubstitutions(prev => ({
          ...prev,
          [key]: newType
        }));

        const newWorkout = buildWeekWorkouts(plan.weeks[weekIdx], plan.raceType, plan.goalTime, plan.fitnessLevel, plan.includeStrength, plan.fitnessAssessment, null, plan.schedulePrefs || null)[dayIdx];
        const replacement = { ...newWorkout, type: newType };
        setPlan(prev => ({
          ...prev,
          weekWorkouts: prev.weekWorkouts.map((week, wIdx) =>
            wIdx === weekIdx ? week.map((w, dIdx) => (dIdx === dayIdx ? replacement : w)) : week
          )
        }));
      };

      const handleGPSTrack = (weekIdx, dayIdx) => {
        const workout = plan?.weekWorkouts?.[weekIdx]?.[dayIdx];
        if (!workout) return;
        setGpsWorkoutCtx({ weekIdx, dayIdx, workout });
        setGpsOpen(true);
      };

      const handleGPSComplete = (gpsResult) => {
        handleLogWorkoutGPS(gpsWorkoutCtx.weekIdx, gpsWorkoutCtx.dayIdx, gpsResult);
        setGpsOpen(false);
      };

      const handleGPSCancel = () => {
        setGpsOpen(false);
        setGpsWorkoutCtx(null);
      };

      const handleModifyPlan = () => {
        const today = new Date();
        const currentDayIdx = today.getDay();
        handleSwapWorkout(0, currentDayIdx);
      };

      const handleLogInjury = (injuryData) => {
        setInjuries(prev => [...prev, injuryData]);
      };

      const handleResetPlan = () => {
        ['plan','config','logs','subs','injuries'].forEach(k => localStorage.removeItem(CK(k)));
        setConfig(null); setPlan(null); setLogs({});
      };

      const handleEditPlanSave = (newConfig, keepLogs) => {
        setConfig(newConfig);
        setPlan(buildPlanFromConfig(newConfig));
        if (!keepLogs) setLogs({});
      };

      if (!config) {
        if (showSetup) {
          return (
            <>
              <SetupWizard onComplete={handleSetupComplete} initialConfig={null} />
              {fbSetupOpen && <FirebaseSetupModal isOpen={fbSetupOpen} onClose={() => setFbSetupOpen(false)} />}
            </>
          );
        }
        return (
          <>
            <LandingScreen
              onStartFresh={() => setShowSetup(true)}
              onSignIn={handleGoogleSignIn}
              onEmailSignIn={handleEmailSignIn}
              onEmailSignUp={handleEmailSignUp}
              onResetPassword={handlePasswordReset}
              onSetupFirebase={() => setFbSetupOpen(true)}
              syncing={syncing}
              firebaseEnabled={FIREBASE_ENABLED}
            />
            {fbSetupOpen && <FirebaseSetupModal isOpen={fbSetupOpen} onClose={() => setFbSetupOpen(false)} />}
          </>
        );
      }

      return (
        <div className="min-h-screen bg-slate-900 text-white pb-20">
          <div className="max-w-2xl mx-auto p-4">
            <div className="mb-8">
              <div className="flex items-center justify-between mb-1 gap-2 flex-wrap">
                <div className="flex items-center gap-3">
                  <h1 className="text-3xl font-bold">🏃 RaceReady</h1>
                  {/* Profile badge */}
                  <button onClick={onSwitchProfile} title="Switch profile"
                    className="flex items-center gap-1.5 px-2 py-1 rounded-full text-xs font-semibold text-white hover:opacity-80 transition"
                    style={{ backgroundColor: profile.color }}>
                    <span>{profile.name[0].toUpperCase()}</span>
                    <span className="hidden sm:inline">{profile.name}</span>
                  </button>
                </div>
                <div className="flex items-center gap-2">
                  <GoogleAuthBar user={authUser} onSignIn={handleGoogleSignIn} onSignOut={handleGoogleSignOut} syncing={syncing} onSetupSync={() => setFbSetupOpen(true)} />
                  <button onClick={() => setEditPlanOpen(true)}
                    className="flex items-center gap-1 px-3 py-1.5 bg-slate-700 text-gray-300 rounded-lg text-sm hover:bg-slate-600 hover:text-white transition">
                    ✏️ Edit Plan
                  </button>
                </div>
              </div>
              <div className="text-gray-400 text-sm">
                {RACE_TYPES[config.raceType].label} • {new Date(config.raceDate).toLocaleDateString()} • Goal: {config.goalTime} min
              </div>
            </div>

            {currentTab === 'dashboard' && <Dashboard plan={plan} logs={logs} injuries={injuries} onLogWorkout={handleLogWorkout} onSwapWorkout={handleSwapWorkout} onGPSTrack={handleGPSTrack} onModifyPlan={handleModifyPlan} onLogInjury={() => setInjuryModalOpen(true)} onResetPlan={handleResetPlan} adaptationState={plan?.adaptationState} onNextWeek={handleNextWeek} viewedWeekIdx={viewedWeekIdx} onSetViewedWeek={setViewedWeekIdx} />}
            {currentTab === 'plan' && <PlanView plan={plan} logs={logs} onLogWorkout={handleLogWorkout} onSwapWorkout={handleSwapWorkout} onGPSTrack={handleGPSTrack} onResetPlan={handleResetPlan} />}
            {currentTab === 'nutrition' && <NutritionTab plan={plan} />}
            {currentTab === 'progress' && <ProgressView logs={logs} plan={plan} injuries={injuries} onLogInjury={() => setInjuryModalOpen(true)} />}
          </div>

          <NavBar currentTab={currentTab} onTabChange={setCurrentTab} />

          {logModalOpen && <WorkoutLogModal isOpen={logModalOpen} weekIdx={logModalData?.weekIdx} dayIdx={logModalData?.dayIdx} workout={logModalData?.workout} gpsResult={logModalData?.gpsResult} onClose={() => setLogModalOpen(false)} onSave={handleLogSave} onGPSTrack={handleGPSTrack} />}
          {weekCompleteModal && <WeekCompleteModal weekIdx={weekCompleteModal.weekIdx} plan={plan} completedLogs={weekCompleteModal.completedLogs} onAdapt={handleWeekAdapt} onKeepBase={handleWeekKeepBase} />}
          {swapModalOpen && <SubstituteModal isOpen={swapModalOpen} weekIdx={swapModalData?.weekIdx} dayIdx={swapModalData?.dayIdx} currentType={swapModalData?.currentType} onClose={() => setSwapModalOpen(false)} onSubstitute={handleSubstitute} />}
          {gpsOpen && gpsWorkoutCtx && <GPSTracker workout={gpsWorkoutCtx.workout} paceOffset={0} onComplete={handleGPSComplete} onCancel={handleGPSCancel} />}
          {injuryModalOpen && <InjuryLogModal isOpen={injuryModalOpen} onClose={() => setInjuryModalOpen(false)} onSave={handleLogInjury} />}
          {editPlanOpen && <EditPlanModal isOpen={editPlanOpen} config={config} onClose={() => setEditPlanOpen(false)} onSave={handleEditPlanSave} />}
          {fbSetupOpen && <FirebaseSetupModal isOpen={fbSetupOpen} onClose={() => setFbSetupOpen(false)} />}
        </div>
      );
    }

    // Root: manages which profile is active
    function RaceReadyRoot() {
      const [activeProfile, setActiveProfile] = useState(() => {
        try {
          const id = localStorage.getItem('rr_active_profile');
          if (!id) return null;
          const profiles = loadProfiles();
          return profiles.find(p => p.id === id) || null;
        } catch { return null; }
      });

      const handleSelectProfile = (profile) => {
        localStorage.setItem('rr_active_profile', profile.id);
        setActiveProfile(profile);
      };

      const handleSwitchProfile = () => {
        localStorage.removeItem('rr_active_profile');
        setActiveProfile(null);
      };

      if (!activeProfile) {
        return <ProfilePicker onSelect={handleSelectProfile} />;
      }
      return <App key={activeProfile.id} profile={activeProfile} onSwitchProfile={handleSwitchProfile} />;
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<RaceReadyRoot />);
  </script>
</body>
</html>
