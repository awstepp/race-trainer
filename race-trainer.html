    };

    const FITNESS_LEVELS = {
      beginner: { label: 'Beginner (0–1 yr)', volumeFactor: 0.7 },
      intermediate: { label: 'Intermediate (1–3 yr)', volumeFactor: 0.85 },
      advanced: { label: 'Advanced (3+ yr)', volumeFactor: 1.0 }
    };

    const BODY_PARTS = [
      'Left Knee', 'Right Knee', 'Left Ankle', 'Right Ankle', 'Left Hip', 'Right Hip',
      'Lower Back', 'Left Calf', 'Right Calf', 'IT Band', 'Shin Splints', 'Plantar Fascia'
    ];

    // ============ TRAINING ENGINE ============
    // ── VDOT System (Jack Daniels' Running Formula) ──────────────────────────
    // VDOT is an "effective VO2max" value that maps a race performance to
    // training zones. We estimate VDOT from the user's goal race time, then
    // derive all five classic training zones (E/M/T/I/R) from that single number.
    //
    // Reference zone multipliers (expressed as fraction of vVO2max velocity):
    //   E  (Easy)      : ~65–79 % vVO2max  → approx 1.29–1.40× race pace
    //   M  (Marathon)  : ~80–85 % vVO2max  → approx 1.13–1.20× race pace
    //   T  (Threshold) : ~86–92 % vVO2max  → approx 1.05–1.10× race pace
    //   I  (Interval)  : ~95–100% vVO2max  → approx 0.97–1.02× race pace
    //   R  (Repetition): 105–110% vVO2max  → approx 0.90–0.95× race pace
    //
    // Pace is stored as seconds-per-mile throughout (lower = faster).

    function estimateVDOT(raceType, goalTimeMins) {
      // Riegel's formula equivalent: convert goal time to equivalent 5K time,
      // then map to a VDOT table (polynomial fit to Daniels' published values).
      const raceDistKm = { '5k': 5, '10k': 10, 'half': 21.0975, 'marathon': 42.195 }[raceType];
      const raceDistMi = { '5k': 3.107, '10k': 6.214, 'half': 13.109, 'marathon': 26.219 }[raceType];

      // Velocity in m/min
      const distMeters = raceDistKm * 1000;
      const velocity   = distMeters / goalTimeMins; // m/min

      // Percent of VO2max used at that pace (Daniels' oxygen cost equation)
      // %VO2max = (-4.60 + 0.182258*v + 0.000104*v^2) / (0.8 + 0.1894393*e^(-0.012778*t) + 0.2989558*e^(-0.1932605*t))
      // We approximate with the simpler polynomial used for VDOT estimation.
      const v = velocity;
      const VO2 = -4.60 + 0.182258 * v + 0.000104 * v * v;
      const pctVO2 = 0.8 + 0.1894393 * Math.exp(-0.012778 * goalTimeMins) + 0.2989558 * Math.exp(-0.1932605 * goalTimeMins);
      const VDOT = VO2 / pctVO2;
      return Math.max(20, Math.min(85, VDOT));
    }

    // Returns training zone paces (sec/mile) from VDOT.
    // Jack Daniels defines pace zones in terms of velocity at VO2max (vVO2max).
    // We back-calculate vVO2max from VDOT and then scale for each zone.
    function vdotToPaces(VDOT) {
      // vVO2max in m/min (Daniels' inverse of the VO2max equation)
      // Solved: VDOT = -4.60 + 0.182258*v + 0.000104*v^2  →  quadratic for v
      const a = 0.000104, b = 0.182258, c = -4.60 - VDOT;
      const vVO2maxMperMin = (-b + Math.sqrt(b * b - 4 * a * c)) / (2 * a);

      // Convert m/min to sec/mile for each zone
      // 1609.34m ÷ (m/min) = minutes/mile → multiply by 60 to get seconds/mile
      const mPerMinToSecPerMile = (v) => (1609.34 / v) * 60;  // returns seconds per mile

      // Zone velocity fractions (midpoint of Daniels' published ranges)
      const easyVel      = vVO2maxMperMin * 0.72;   // 65–79% → use 72%
      const marathonVel  = vVO2maxMperMin * 0.82;   // 80–84% → use 82%
      const tempoVel     = vVO2maxMperMin * 0.89;   // 86–92% → use 89%
      const intervalVel  = vVO2maxMperMin * 0.975;  // 95–100% → use 97.5%
      const repVel       = vVO2maxMperMin * 1.075;  // 105–110% → use 107.5%

      return {
        easy:      mPerMinToSecPerMile(easyVel),
        marathon:  mPerMinToSecPerMile(marathonVel),
        tempo:     mPerMinToSecPerMile(tempoVel),
        intervals: mPerMinToSecPerMile(intervalVel),
        hills:     mPerMinToSecPerMile(tempoVel * 0.97), // hills at slightly quicker than T effort
        long:      mPerMinToSecPerMile(easyVel * 0.97),  // long run: just a touch quicker than easy (Daniels)
        recovery:  mPerMinToSecPerMile(easyVel * 0.88),  // recovery: slower than easy
        race:      null  // filled in separately based on actual goal pace
      };
    }

    function calcPaces(raceType, goalTime, fitnessLevel, fitnessAssessment) {
      const raceDistMi = { '5k': 3.107, '10k': 6.214, 'half': 13.109, 'marathon': 26.219 }[raceType];
      const racePaceSec = (goalTime * 60) / raceDistMi; // sec/mile at goal pace

      // ── Step 1: Estimate VDOT from goal time ──────────────────────────────
      const VDOT = estimateVDOT(raceType, goalTime);

      // ── Step 2: Get VDOT-based zone paces ─────────────────────────────────
      const zonePaces = vdotToPaces(VDOT);

      // ── Step 3: Override with comfort pace if runner is currently slower ──
      // This keeps early training realistic. If their actual easy pace is
      // slower than the VDOT-derived E zone, we respect their current fitness.
      let easyPace = zonePaces.easy;
      let recoveryPace = zonePaces.recovery;

      if (fitnessAssessment) {
        const comfortSec = (fitnessAssessment.comfortPaceMin || 0) * 60 + (fitnessAssessment.comfortPaceSec || 0);
        if (comfortSec > 0 && comfortSec > easyPace) {
          // Runner is currently slower than their VDOT-projected easy pace.
          // Use a blend: start at comfort pace, trust VDOT as the ceiling.
          easyPace     = comfortSec;
          recoveryPace = comfortSec * 1.12; // recovery is ~10-12% slower than easy
        }
      }

      // For 5K/10K goal races: use interval pace for race day, not marathon pace
      const raceZonePace = (raceType === 'marathon') ? zonePaces.marathon :
                           (raceType === 'half')     ? (zonePaces.marathon + zonePaces.tempo) / 2 :
                           racePaceSec; // for 5K/10K, goal pace IS close to interval pace

      return {
        easy:      easyPace,
        marathon:  zonePaces.marathon,
        tempo:     zonePaces.tempo,
        intervals: zonePaces.intervals,
        hills:     zonePaces.hills,
        long:      Math.max(easyPace, zonePaces.long),  // long can't be faster than easy
        recovery:  recoveryPace,
        race:      racePaceSec,  // goal race pace — never adapted
        vdot:      Math.round(VDOT * 10) / 10  // expose for UI display
      };
    }

    function generatePlan(raceType, raceDate, goalTime, fitnessLevel, includeStrength = true, fitnessAssessment = null, schedulePrefs = null) {
      const rtConfig = RACE_TYPES[raceType];
      const volumeFactor = FITNESS_LEVELS[fitnessLevel]?.volumeFactor || 0.85;
      const maxWeeks = rtConfig.weeks;

      // Dynamic: use however many full weeks remain before race day, capped at program max
      const today = new Date(); today.setHours(0,0,0,0);
      const race  = new Date(raceDate); race.setHours(0,0,0,0);
      const daysLeft = Math.max(0, Math.floor((race - today) / 86400000));
      const weeksAvailable = Math.floor(daysLeft / 7);
      const totalWeeks = Math.max(2, Math.min(weeksAvailable, maxWeeks));

      // Scale the threshold week proportionally to the shortened plan
      const thresholdWeek = Math.round(rtConfig.threshold * (totalWeeks / maxWeeks));
      const weeks = [];

      for (let i = 0; i < totalWeeks; i++) {
        const phase = getPhase(i, totalWeeks, thresholdWeek);
        const mileage = weeklyMileage(raceType, i, totalWeeks, volumeFactor, fitnessAssessment);
        weeks.push({ weekNum: i + 1, phase, mileage });
      }

      const peakLongRunMiles  = calcPeakLongRunMiles(raceType, totalWeeks, volumeFactor, fitnessAssessment);
      const standardLongRun   = PEAK_LONG_RUN[raceType] || peakLongRunMiles;
      const isCompressedPlan  = totalWeeks < maxWeeks;
      return { raceType, raceDate, goalTime, fitnessLevel, includeStrength, fitnessAssessment, schedulePrefs, totalWeeks, weeks, peakLongRunMiles, standardLongRun, isCompressedPlan };
    }

    function getPhase(weekIdx, totalWeeks, thresholdWeek) {
      const taperStart = totalWeeks - 2;
      const raceWeek = totalWeeks - 1;
      if (weekIdx === raceWeek) return 'raceWeek';
      if (weekIdx >= taperStart) return 'taper';
      if (weekIdx >= thresholdWeek) return 'speed';
      if (weekIdx >= Math.floor(totalWeeks * 0.4)) return 'build';
      return 'base';
    }

    // ── Peak long run targets by race type (miles) ───────────────────────────
    const PEAK_LONG_RUN = { '5k': 9, '10k': 12, 'half': 13, 'marathon': 21 };

    // ── 10% Rule + 80/20 Intensity Distribution ──────────────────────────────
    // The 10% rule: never increase weekly mileage by more than 10% week-over-week.
    // 80/20 rule: ~80% of weekly volume at easy/recovery effort; ~20% hard.
    //
    // For COMPRESSED plans (fewer weeks than standard), the algorithm:
    //   1. Calculates the maximum weekly mileage reachable within the available weeks
    //   2. If the user's fitness assessment indicates they can handle a higher base,
    //      raises the starting mileage so they reach a better peak given the shorter time
    //   3. The long run is then derived as a % of weekly total, capped at race-appropriate peak
    function weeklyMileage(raceType, weekIdx, totalWeeks, volumeFactor, fitnessAssessment) {
      const peakMileage = { '5k': 30, '10k': 40, 'half': 50, 'marathon': 60 };
      const fullPeak = peakMileage[raceType] * volumeFactor;
      const taperStart = totalWeeks - 2;
      const raceWeek   = totalWeeks - 1;
      const trainingWeeks = taperStart; // weeks before taper

      // ── Step 1: Determine starting fitness ────────────────────────────────
      let currentMiles;
      if (fitnessAssessment && fitnessAssessment.currentWeeklyMiles > 0) {
        currentMiles = fitnessAssessment.currentWeeklyMiles;
      } else {
        currentMiles = fullPeak * 0.45;
      }

      // ── Step 2: Calculate what's actually reachable given the timeline ────
      // Effective growth capacity: account for cutback weeks reducing ~25% of gains
      const effectiveGrowthWeeks = Math.max(1, trainingWeeks - Math.floor(trainingWeeks / 3));
      const reachablePeak = currentMiles * Math.pow(1.10, effectiveGrowthWeeks);

      // ── Step 3: Raise starting mileage for compressed plans ───────────────
      // If the 10% rule means we can't reach at least 75% of the full peak,
      // the plan is meaningfully compressed. If the user's fitness supports it
      // (they've done long runs recently, or their comfort pace is strong),
      // raise the starting mileage so they use available fitness to reach further.
      let startMiles = currentMiles;
      const isCompressed = reachablePeak < fullPeak * 0.75;
      if (isCompressed) {
        // How high would we need to start to reach fullPeak in effectiveGrowthWeeks at 10%/wk?
        const neededStart = fullPeak / Math.pow(1.10, effectiveGrowthWeeks);
        // Only raise if the fitness assessment supports it (user has done longer runs)
        const longestRunIdx = fitnessAssessment?.longestRunIdx ?? 0;
        const fitnessBoost  = Math.min(longestRunIdx / 4, 1); // 0–1 scale from longestRunIdx
        // Blend: raise start partway toward neededStart based on demonstrated fitness
        startMiles = currentMiles + (neededStart - currentMiles) * fitnessBoost * 0.6;
        startMiles = Math.max(currentMiles, Math.min(startMiles, fullPeak * 0.65));
      }

      // ── Step 4: The effective peak is min(full peak, reachable from new start) ──
      const achievablePeak = Math.min(fullPeak, startMiles * Math.pow(1.10, effectiveGrowthWeeks));

      // ── Step 5: Taper and race weeks ──────────────────────────────────────
      if (weekIdx === raceWeek)  return Math.round(achievablePeak * 0.30);
      if (weekIdx >= taperStart) return Math.round(achievablePeak * 0.55);

      // ── Step 6: Build progressive weekly schedule (start → achievable peak) ──
      const schedule = [Math.round(startMiles)];
      for (let w = 1; w < trainingWeeks; w++) {
        const targetFrac  = w / Math.max(trainingWeeks - 1, 1);
        const targetMiles = startMiles + (achievablePeak - startMiles) * targetFrac;
        const maxIncrease = schedule[w - 1] * 1.10;
        const next = Math.min(targetMiles, maxIncrease);
        const isCutback = w > 0 && w % 3 === 2;
        schedule.push(isCutback ? Math.round(next * 0.82) : Math.round(next));
      }

      return schedule[Math.min(weekIdx, schedule.length - 1)] || Math.round(startMiles);
    }

    // Returns the peak long run distance (miles) achievable given totalWeeks and starting fitness.
    // Used by the plan header and workout card for the long run.
    function calcPeakLongRunMiles(raceType, totalWeeks, volumeFactor, fitnessAssessment) {
      const maxWeeks = RACE_TYPES[raceType]?.weeks || 12;
      // Get the peak weekly mileage for the last full-build week
      const buildWeekIdx = Math.max(0, totalWeeks - 3); // week just before taper
      const peakWeekMiles = weeklyMileage(raceType, buildWeekIdx, totalWeeks, volumeFactor, fitnessAssessment);
      // Long run is 35% of weekly volume, capped at the race-appropriate long run limit
      const longRunFromVolume = peakWeekMiles * 0.35;
      const raceCap = PEAK_LONG_RUN[raceType] || 13;
      // For compressed plans, also note how far below the standard peak we are
      const standardPeakLong = raceCap;
      return Math.min(Math.round(longRunFromVolume * 10) / 10, raceCap);
    }

    // ── Workout structure prescriptions ──────────────────────────────────────
    // Returns a structured breakdown of exactly what the runner should do:
    // sets, rep distance/duration, target pace, and explicit rest type + duration.
    // Attached to each workout object so the UI and log modal can both reference it.
    function getWorkoutStructure(type, phase, raceType, miles, paces) {
      if (!type || type === 'rest' || type === 'race' || type.startsWith('strength')) return null;

      const tp = paces || {};

      // ── INTERVALS ─────────────────────────────────────────────────────────
      if (type === 'intervals') {
        // Rep distance scales with race type; count scales with phase
        const repConfig = {
          '5k':       { miles: 0.25, label: '400m',   restDur: '75–90 seconds',  restType: 'easy jog' },
          '10k':      { miles: 0.50, label: '800m',   restDur: '2 minutes',      restType: 'easy jog' },
          'half':     { miles: 0.75, label: '1,200m', restDur: '2 minutes',      restType: 'easy jog' },
          'marathon': { miles: 1.00, label: '1 mile', restDur: '2–3 minutes',    restType: 'easy jog' },
        }[raceType] || { miles: 0.5, label: '800m', restDur: '2 minutes', restType: 'easy jog' };

        const repCounts = { base: 4, build: 5, speed: 6, taper: 4, raceWeek: 3 };
        // For 5K the volume cap is higher (shorter reps)
        const extraReps = raceType === '5k' ? 2 : 0;
        const sets = (repCounts[phase] || 5) + extraReps;
        const paceSec = tp.intervals || 0;

        return {
          kind: 'intervals',
          sets,
          repLabel: repConfig.label,
          repMiles: repConfig.miles,
          targetPaceSec: paceSec,
          restDuration: repConfig.restDur,
          restType: repConfig.restType,
          structure: [
            { icon: '🔥', text: `Warm-up: 10–15 min easy jog + 4×100m strides` },
            { icon: '⚡', text: `Main set: ${sets} × ${repConfig.label} at ${formatPace(paceSec)}/mi` },
            { icon: '🚶', text: `Rest: ${repConfig.restDur} ${repConfig.restType} between each rep` },
            { icon: '🌊', text: `Cool-down: 10–15 min easy jog` },
          ],
          logHint: `Log total distance including warm-up and cool-down. Target ${sets} hard reps.`
        };
      }

      // ── HILLS ─────────────────────────────────────────────────────────────
      if (type === 'hills') {
        const hillConfig = {
          base:     { sets: 5, repDur: '45 seconds', restDur: '~2 min' },
          build:    { sets: 6, repDur: '60 seconds', restDur: '~2 min' },
          speed:    { sets: 8, repDur: '90 seconds', restDur: '2–3 min' },
          taper:    { sets: 4, repDur: '60 seconds', restDur: '2 min'  },
          raceWeek: { sets: 3, repDur: '45 seconds', restDur: '2 min'  },
        }[phase] || { sets: 6, repDur: '60 seconds', restDur: '2 min' };

        const paceSec = tp.hills || tp.tempo || 0;
        return {
          kind: 'hills',
          sets: hillConfig.sets,
          repLabel: hillConfig.repDur + ' uphill',
          targetPaceSec: paceSec,
          restDuration: hillConfig.restDur,
          restType: 'walk or easy jog back to start',
          structure: [
            { icon: '🔥', text: `Warm-up: 8–10 min easy jog + 2 easy hill jogs` },
            { icon: '⛰️', text: `Main set: ${hillConfig.sets} × ${hillConfig.repDur} hard uphill at ${formatPace(paceSec)}/mi effort` },
            { icon: '🚶', text: `Rest: Walk or easy jog back to the bottom (${hillConfig.restDur}) — don't rush this` },
            { icon: '🌊', text: `Cool-down: 5–8 min easy jog on flat ground` },
          ],
          logHint: `Log total distance. Target ${hillConfig.sets} hard hill efforts — quality over speed.`
        };
      }

      // ── TEMPO ──────────────────────────────────────────────────────────────
      if (type === 'tempo') {
        const paceSec = tp.tempo || 0;
        // Phase and race type determine tempo structure
        const isBase  = phase === 'base';
        const mins    = { '5k': 20, '10k': 25, 'half': 28, 'marathon': 35 }[raceType] || 25;
        const adjMins = isBase ? Math.round(mins * 0.7) : mins;

        if (isBase) {
          // Split tempo for beginners — easier to maintain quality
          const halfMins = Math.round(adjMins / 2);
          return {
            kind: 'tempo',
            targetPaceSec: paceSec,
            structure: [
              { icon: '🔥', text: `Warm-up: 1.5 miles easy jog` },
              { icon: '🎯', text: `Segment 1: ${halfMins} min at tempo pace (${formatPace(paceSec)}/mi)` },
              { icon: '🚶', text: `Recovery: 2 min very easy jog between segments` },
              { icon: '🎯', text: `Segment 2: ${halfMins} min at tempo pace (${formatPace(paceSec)}/mi)` },
              { icon: '🌊', text: `Cool-down: 1 mile easy jog` },
            ],
            logHint: `2 × ${halfMins} min tempo segments. If pace slips, slow down — don't force it.`
          };
        } else {
          return {
            kind: 'tempo',
            targetPaceSec: paceSec,
            structure: [
              { icon: '🔥', text: `Warm-up: 1.5 miles easy jog` },
              { icon: '🎯', text: `Tempo: ${adjMins} min continuous at ${formatPace(paceSec)}/mi — "comfortably hard"` },
              { icon: '💡', text: `Feel: breathing hard but not gasping; you can say a few words but not a sentence` },
              { icon: '🌊', text: `Cool-down: 1 mile easy jog` },
            ],
            logHint: `${adjMins} min continuous tempo. Comfortably hard — not an all-out effort.`
          };
        }
      }

      // ── EASY ──────────────────────────────────────────────────────────────
      if (type === 'easy') {
        const paceSec = tp.easy || 0;
        return {
          kind: 'easy',
          targetPaceSec: paceSec,
          structure: [
            { icon: '🏃', text: `Run ${miles} miles at ${formatPace(paceSec)}/mi — easy, conversational pace` },
            { icon: '💬', text: `Feel: you should be able to hold a full conversation without gasping` },
            { icon: '📏', text: `Don't stress pace — if you feel good run a little faster; if tired, slow down` },
          ],
          logHint: null
        };
      }

      // ── LONG RUN ──────────────────────────────────────────────────────────
      if (type === 'long') {
        const paceSec = tp.long || tp.easy || 0;
        const fuelNote = miles >= 10 ? `Fuel every 45 min; hydrate every 20–30 min` : `Hydrate every 20–30 min`;
        return {
          kind: 'long',
          targetPaceSec: paceSec,
          structure: [
            { icon: '🚀', text: `Run ${miles} miles at ${formatPace(paceSec)}/mi — easy, aerobic effort` },
            { icon: '🐢', text: `Strategy: first third should feel almost too easy — speed up only in the final miles` },
            { icon: '💧', text: fuelNote },
            { icon: '💡', text: `The goal of the long run is time on feet, not pace — don't race it` },
          ],
          logHint: null
        };
      }

      // ── RECOVERY ──────────────────────────────────────────────────────────
      if (type === 'recovery') {
        const paceSec = tp.recovery || 0;
        return {
          kind: 'recovery',
          targetPaceSec: paceSec,
          structure: [
            { icon: '🌊', text: `Run ${miles} miles at ${formatPace(paceSec)}/mi — very easy, slower than your normal easy` },
            { icon: '💚', text: `Purpose: flush out yesterday's fatigue, not build fitness` },
            { icon: '🚶', text: `It's totally fine to walk — this run should leave you feeling better, not more tired` },
          ],
          logHint: null
        };
      }

      return null;
    }

    function buildWeekWorkouts(weekData, raceType, goalTime, fitnessLevel, includeStrength = true, fitnessAssessment = null, adaptationState = null, schedulePrefs = null) {
      const { weekNum, phase, mileage } = weekData;
      const basePaces    = calcPaces(raceType, goalTime, fitnessLevel, fitnessAssessment);
      const phaseScaling = computeAdaptation(weekNum, phase, raceType); // existing phase-based volume scalar

      // Pull adaptive multipliers (from logged workout history)
      const mileageMult   = adaptationState?.mileageMultiplier || 1.0;
      const paceOffsetSec = adaptationState?.paceOffsetSec     || 0;

      // Apply pace offset to training paces.
      // Race pace is never touched — only training zones.
      // Interval & hill paces absorb a smaller share (they should stay challenging).
      const paces = {
        easy:      basePaces.easy      + paceOffsetSec,
        tempo:     basePaces.tempo     + paceOffsetSec * 0.8,
        intervals: basePaces.intervals + paceOffsetSec * 0.4,
        hills:     basePaces.hills     + paceOffsetSec * 0.4,
        long:      basePaces.long      + paceOffsetSec,
        recovery:  basePaces.recovery  + paceOffsetSec,
        race:      basePaces.race   // never adapt the goal race pace
      };

      const dayTypes  = getWeekTemplate(phase, raceType, includeStrength, schedulePrefs);
      const dayWorkouts = [];

      for (let dayIdx = 0; dayIdx < 7; dayIdx++) {
        const typeKey  = dayTypes[dayIdx];
        const baseInfo = getWorkoutBaseInfo(typeKey, raceType);

        // Base miles → scale by phase scalar then by adaptive mileage multiplier
        let miles = mileage * baseInfo.volumeFrac;
        miles = adjustedPace(miles, phaseScaling);  // phase-based tweak
        miles = miles * mileageMult;                // user-performance-based tweak
        // Cap long run at race-appropriate distance (never assign a 14-mile long run for a half)
        if (typeKey === 'long') miles = Math.min(miles, PEAK_LONG_RUN[raceType] || miles);
        let pace = paces[typeKey] || 0;

        if (typeKey === 'strength_lower' || typeKey === 'strength_core' || typeKey === 'strength_plyo') {
          dayWorkouts.push({
            type: typeKey,
            description: `Runner strength — ${getStrengthDescription(typeKey)}`,
            miles: 0, pace: 0,
            routineKey: getStrengthKey(typeKey)
          });
        } else {
          const roundedMiles = Math.round(miles * 10) / 10;
          const structure = getWorkoutStructure(typeKey, phase, raceType, roundedMiles, paces);
          dayWorkouts.push({
            type: typeKey,
            description: baseInfo.description,
            miles: roundedMiles,
            pace,
            structure,
            isAdapted: mileageMult !== 1.0 || paceOffsetSec !== 0 // flag for UI
          });
        }
      }

      return dayWorkouts;
    }

    // Returns the ordered list of workout types to fill available training days (excluding long run).
    // Order matters: harder workouts are placed first so they land earlier in the week.
    function getPhaseWorkoutQueue(phase, raceType, daysAvailable, includeStrength) {
      // Strength slots: 0–1 depending on days available and toggle
      const canStrength = includeStrength && daysAvailable >= 4;
      const strengthSlot = canStrength
        ? (phase === 'speed' ? 'strength_plyo' : phase === 'build' ? 'strength_core' : 'strength_lower')
        : null;

      // Phase-specific hard + easy workout order (long run is placed separately)
      const queues = {
        raceWeek: ['intervals', 'easy', 'recovery', ...(strengthSlot ? [strengthSlot] : [])],
        taper:    ['intervals', 'easy', 'recovery', ...(strengthSlot ? [strengthSlot] : [])],
        speed:    ['intervals', 'tempo', 'easy', 'recovery', ...(strengthSlot ? [strengthSlot] : [])],
        build:    ['tempo', 'hills', 'easy', 'easy', ...(strengthSlot ? [strengthSlot] : [])],
        base:     ['tempo', 'easy', 'recovery', 'easy', ...(strengthSlot ? [strengthSlot] : [])],
      };
      return (queues[phase] || queues.base).slice(0, daysAvailable);
    }

    function getWeekTemplate(phase, raceType, includeStrength = true, schedulePrefs = null) {
      // ── Default (no schedule prefs) — legacy fixed template ────────────────
      if (!schedulePrefs) {
        if (!includeStrength) {
          if (phase === 'raceWeek') return ['rest', 'easy', 'intervals', 'recovery', 'long', 'easy', 'race'];
          if (phase === 'taper')    return ['rest', 'easy', 'intervals', 'recovery', 'long', 'easy', 'rest'];
          if (phase === 'speed')    return ['rest', 'easy', 'intervals', 'recovery', 'long', 'tempo', 'rest'];
          if (phase === 'build')    return ['rest', 'easy', 'tempo', 'hills', 'long', 'easy', 'rest'];
          return ['rest', 'easy', 'tempo', 'recovery', 'long', 'easy', 'rest'];
        }
        if (phase === 'raceWeek') return ['strength_lower', 'easy', 'intervals', 'recovery', 'long', 'easy', 'race'];
        if (phase === 'taper')    return ['rest', 'easy', 'intervals', 'recovery', 'long', 'easy', 'rest'];
        if (phase === 'speed')    return ['strength_plyo', 'easy', 'intervals', 'recovery', 'long', 'tempo', 'rest'];
        if (phase === 'build')    return ['strength_core', 'easy', 'tempo', 'hills', 'long', 'easy', 'rest'];
        return ['strength_lower', 'easy', 'tempo', 'recovery', 'long', 'easy', 'rest'];
      }

      // ── Dynamic template built around user's schedule ──────────────────────
      const { preferredDays = [1,3,5,6], longRunDay = 6 } = schedulePrefs;

      // Start with all rest
      const template = Array(7).fill('rest');

      // Determine the last day (day 6 = Saturday by default) — race day for raceWeek
      const raceDay = 6; // always Saturday in the template (plan view shows actual dates)

      // Place long run on preferred long run day
      // For raceWeek the long run day becomes a short shakeout, race is raceDay
      if (phase === 'raceWeek') {
        template[raceDay] = 'race';
        // Place a short easy run earlier in the week
        const easyDay = preferredDays.find(d => d !== raceDay && d !== longRunDay);
        if (easyDay !== undefined) template[easyDay] = 'easy';
        // Long run day gets a recovery/easy shakeout
        if (preferredDays.includes(longRunDay) && longRunDay !== raceDay) template[longRunDay] = 'recovery';
      } else {
        // Place long run
        if (preferredDays.includes(longRunDay)) template[longRunDay] = 'long';
        else template[preferredDays[preferredDays.length - 1] ?? 6] = 'long';

        // Remaining training days (excluding long run day and raceDay)
        const otherDays = preferredDays
          .filter(d => d !== longRunDay && d !== raceDay)
          .sort((a, b) => a - b);

        // Fill remaining days with phase-appropriate workout queue
        const daysAvailable = otherDays.length;
        const queue = getPhaseWorkoutQueue(phase, raceType, daysAvailable, includeStrength);

        otherDays.forEach((d, i) => {
          template[d] = queue[i] || 'easy';
        });
      }

      return template;
    }

    function getWorkoutBaseInfo(typeKey, raceType) {
      // ── 80/20 intensity distribution ──────────────────────────────────────
      // Weekly volume is split so ~80% falls on easy/long/recovery (low intensity)
      // and ~20% on tempo/intervals/hills (high intensity).
      //
      // In a typical 5-day running week the split looks like:
      //   Easy run:      ~18% of weekly volume
      //   Long run:      ~35% of weekly volume   (both easy effort)
      //   Recovery run:  ~10% of weekly volume
      //   Tempo run:     ~12% of weekly volume   ← hard
      //   Intervals:     ~10% of weekly volume   ← hard
      //   Hills:         ~10% of weekly volume   ← hard
      //
      // Easy + Long + Recovery = ~63%+ of the 5-running-day volume;
      // with rest/strength days the overall easy fraction across all 7 days
      // lands near 80% of total running miles.
      const info = {
        rest:      { description: 'Rest or cross-train',                volumeFrac: 0,    intensity: 'easy'  },
        easy:      { description: 'Easy run — conversational pace',     volumeFrac: 0.18, intensity: 'easy'  },
        tempo:     { description: 'Tempo run — comfortably hard',       volumeFrac: 0.12, intensity: 'hard'  },
        intervals: { description: 'Interval workout — high intensity',  volumeFrac: 0.10, intensity: 'hard'  },
        hills:     { description: 'Hill repeats — strength & power',    volumeFrac: 0.10, intensity: 'hard'  },
        long:      { description: 'Long run — easy, aerobic base',      volumeFrac: 0.35, intensity: 'easy'  },
        recovery:  { description: 'Recovery run — very easy pace',      volumeFrac: 0.10, intensity: 'easy'  },
        race:      { description: `${RACE_TYPES[raceType].label} race`, volumeFrac: 0,    intensity: 'race'  }
      };
      return info[typeKey] || { description: '', volumeFrac: 0, intensity: 'easy' };
    }

    function getStrengthDescription(typeKey) {
      if (typeKey === 'strength_lower') return 'glutes, hips, calves';
      if (typeKey === 'strength_core') return 'core stability, hips';
      return 'explosive power, economy';
    }

    function getStrengthKey(typeKey) {
      if (typeKey === 'strength_lower') return 'lower';
      if (typeKey === 'strength_core') return 'core';
      return 'plyo';
    }

    function computeAdaptation(weekNum, phase, raceType) {
      if (phase === 'base') return 0.95 + (weekNum % 2) * 0.02;
      if (phase === 'build') return 1.0;
      if (phase === 'speed') return 1.05;
      if (phase === 'taper') return 0.9;
      return 0.8;
    }

    function adjustedPace(miles, adaptation) {
      return miles * adaptation;
    }

    // ── Adaptive training engine ───────────────────────────────────────────────
    // Looks at recent logged workouts and returns multipliers for future weeks.
    // Returns:
    //   mileageMultiplier  – scale base mileage targets  (e.g. 1.15 = +15%)
    //   paceOffsetSec      – shift all training paces     (e.g. -20 = 20 sec/mi faster)
    //   sampleCount        – number of runs used
    //   summary            – human-readable description
    function computeAdaptationFromLogs(logs, plan) {
      const DEFAULT = { mileageMultiplier: 1.0, paceOffsetSec: 0, sampleCount: 0, summary: null };
      if (!plan || !plan.weekWorkouts || !logs || Object.keys(logs).length === 0) return DEFAULT;

      // Gather logged RUNNING workouts in chronological order
      const entries = Object.keys(logs)
        .map(key => {
          const [w, d] = key.split('-').map(Number);
          return { weekIdx: w, dayIdx: d, key };
        })
        .sort((a, b) => a.weekIdx !== b.weekIdx ? a.weekIdx - b.weekIdx : a.dayIdx - b.dayIdx);

      const samples = [];
      for (const { weekIdx, dayIdx, key } of entries) {
        const log     = logs[key];
        const week    = plan.weekWorkouts[weekIdx];
        if (!week) continue;
        const workout = week[dayIdx];
        if (!workout) continue;
        // Skip rest and strength — only running workouts count
        if (!workout.type || workout.type === 'rest' || workout.type.startsWith('strength')) continue;
        // Need at least miles logged
        if (!log.milesVal || log.milesVal <= 0) continue;
        if (!workout.miles || workout.miles <= 0) continue;
        samples.push({
          suggestedMiles: workout.miles,
          actualMiles:    log.milesVal,
          suggestedPace:  workout.pace   || 0,
          actualPace:     log.paceMin ? log.paceMin * 60 + (log.paceSec || 0) : 0,
          type:           workout.type
        });
      }

      if (samples.length < 2) return DEFAULT; // need at least 2 data points

      // Use the most recent 5 samples for the rolling window
      const recent = samples.slice(-5);

      // ── Mileage adaptation ──────────────────────────────────────────────────
      // Average ratio of actual to suggested miles
      const mileageRatios = recent.map(s => s.actualMiles / s.suggestedMiles);
      const avgRatio = mileageRatios.reduce((a, b) => a + b, 0) / mileageRatios.length;
      // Smooth: apply 65% of the observed deviation; cap at ±25%
      const rawMult  = 1.0 + (avgRatio - 1.0) * 0.65;
      const mileageMultiplier = Math.max(0.75, Math.min(1.25, rawMult));

      // ── Pace adaptation ─────────────────────────────────────────────────────
      // Average delta between actual and suggested pace (sec/mile)
      // Negative = runner is faster than plan; positive = slower
      const paceEntries = recent.filter(s => s.suggestedPace > 0 && s.actualPace > 0);
      let paceOffsetSec = 0;
      if (paceEntries.length >= 2) {
        const avgDelta = paceEntries.reduce((sum, s) => sum + (s.actualPace - s.suggestedPace), 0) / paceEntries.length;
        // Apply 55% of the delta; cap at ±45 sec/mile
        paceOffsetSec = Math.max(-45, Math.min(45, avgDelta * 0.55));
      }

      // ── Human-readable summary ─────────────────────────────────────────────
      const pctChange = Math.round((mileageMultiplier - 1) * 100);
      const paceAbs   = Math.abs(Math.round(paceOffsetSec));
      const paceDir   = paceOffsetSec < -5 ? `${paceAbs}s/mi faster` : paceOffsetSec > 5 ? `${paceAbs}s/mi slower` : null;
      let summary = null;
      if (Math.abs(pctChange) >= 3 || paceDir) {
        const parts = [];
        if (pctChange >= 3)  parts.push(`mileage bumped up ${pctChange}%`);
        if (pctChange <= -3) parts.push(`mileage eased back ${Math.abs(pctChange)}%`);
        if (paceDir)         parts.push(`paces adjusted ${paceDir}`);
        summary = parts.join(' · ');
      }

      return { mileageMultiplier, paceOffsetSec, sampleCount: recent.length, summary };
    }
    // ──────────────────────────────────────────────────────────────────────────

    // ============ UTILITY FUNCTIONS ============
    function formatTime(seconds) {
      if (!seconds || seconds < 0) return '0:00';
      const h = Math.floor(seconds / 3600);
      const m = Math.floor((seconds % 3600) / 60);
      const s = Math.floor(seconds % 60);
      if (h > 0) return `${h}:${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`;
      return `${m}:${String(s).padStart(2, '0')}`;
    }

    function formatPace(secondsPerMile) {
      if (!secondsPerMile || secondsPerMile <= 0) return '--:--';
      const min = Math.floor(secondsPerMile / 60);
      const sec = Math.floor(secondsPerMile % 60);
      return `${min}:${String(sec).padStart(2, '0')}`;
    }

    function addDays(date, days) {
      const d = new Date(date);
      d.setDate(d.getDate() + days);
      return d;
    }

    // Returns the Monday that training begins (raceDate minus totalWeeks worth of days)
    function getTrainingStartDate(raceDate, totalWeeks) {
      const d = new Date(raceDate);
      d.setDate(d.getDate() - totalWeeks * 7);
      return d;
    }

    // Week 0 Day 0 = first day of training; counts forward toward race date
    function getWorkoutDate(raceDate, totalWeeks, weekIdx, dayIdx) {
      const start = getTrainingStartDate(raceDate, totalWeeks);
      return addDays(start, weekIdx * 7 + dayIdx);
    }

    // Which training week are we in right now?
    function getCurrentWeekIdx(raceDate, totalWeeks) {
      const start = getTrainingStartDate(raceDate, totalWeeks);
      const today = new Date();
      start.setHours(0, 0, 0, 0);
      today.setHours(0, 0, 0, 0);
      const days = Math.floor((today - start) / 86400000);
      return Math.max(0, Math.min(Math.floor(days / 7), totalWeeks - 1));
    }

    function haversineDistance(lat1, lon1, lat2, lon2) {
      const R = 3959;
      const dLat = ((lat2 - lat1) * Math.PI) / 180;
      const dLon = ((lon2 - lon1) * Math.PI) / 180;
      const a = Math.sin(dLat / 2) ** 2 + Math.cos((lat1 * Math.PI) / 180) * Math.cos((lat2 * Math.PI) / 180) * Math.sin(dLon / 2) ** 2;
      const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
      return R * c;
    }

    // GPX file parser — returns { distance, duration, avgPace, avgHR, elevGain } or null
    function parseGPXFile(text) {
      try {
        const parser = new DOMParser();
        const doc    = parser.parseFromString(text, 'text/xml');
        const trkpts = Array.from(doc.querySelectorAll('trkpt'));
        if (trkpts.length < 2) return null;
        let totalMiles = 0, elevGain = 0, prevEle = null;
        const hrValues = [];
        for (let i = 1; i < trkpts.length; i++) {
          const p = trkpts[i - 1], c = trkpts[i];
          const la1 = parseFloat(p.getAttribute('lat')), lo1 = parseFloat(p.getAttribute('lon'));
          const la2 = parseFloat(c.getAttribute('lat')), lo2 = parseFloat(c.getAttribute('lon'));
          if (![la1,lo1,la2,lo2].some(isNaN)) totalMiles += haversineDistance(la1,lo1,la2,lo2);
          const hrEl = c.querySelector('hr'); if (hrEl) hrValues.push(parseInt(hrEl.textContent));
          const eleEl = c.querySelector('ele');
          if (eleEl) {
            const ft = parseFloat(eleEl.textContent) * 3.28084;
            if (prevEle !== null && ft > prevEle) elevGain += ft - prevEle;
            prevEle = ft;
          }
        }
        const times = trkpts.map(pt => { const t = pt.querySelector('time'); return t ? new Date(t.textContent) : null; }).filter(Boolean);
        const totalSec = times.length >= 2 ? (times[times.length - 1] - times[0]) / 1000 : 0;
        const avgPace  = totalMiles > 0.05 && totalSec > 0 ? totalSec / totalMiles : 0;
        const avgHR    = hrValues.length > 0 ? Math.round(hrValues.reduce((a,b) => a+b, 0) / hrValues.length) : null;
        return { distance: Math.round(totalMiles * 100) / 100, duration: totalSec, avgPace, avgHR, elevGain: Math.round(elevGain) };
      } catch(e) { return null; }
    }

    // ============ COMPONENTS ============

    // ── Voice guidance utility ────────────────────────────────────────────────
    // Uses the browser's built-in SpeechSynthesis API — no library needed.
    // Cancels any queued speech before speaking so announcements never pile up.
    function speak(text, enabled = true) {
      if (!enabled || !window.speechSynthesis) return;
      window.speechSynthesis.cancel();
      const utt = new SpeechSynthesisUtterance(text);
      utt.rate  = 0.95;   // slightly slower than default for clarity during exercise
      utt.pitch = 1.0;
      utt.volume = 1.0;
      window.speechSynthesis.speak(utt);
    }

    function speakPace(secondsPerMile) {
      const m = Math.floor(secondsPerMile / 60);
      const s = Math.round(secondsPerMile % 60);
      return s === 0 ? `${m} minutes per mile` : `${m} minutes ${s} seconds per mile`;
    }

    // GPS Tracker Component
    function GPSTracker({ workout, paceOffset, onComplete, onCancel }) {
      const [state, setState]               = useState('idle');
      const [coords, setCoords]             = useState([]);
      const [elapsedTime, setElapsedTime]   = useState(0);
      const [totalDistance, setTotalDistance] = useState(0);
      const [currentPace, setCurrentPace]   = useState(0);
      const [watchId, setWatchId]           = useState(null);
      const [voiceOn, setVoiceOn]           = useState(true);

      // Interval lap tracking (for interval/hills workouts)
      const [laps, setLaps]                 = useState([]);  // [{num, dist, time, pace}]
      const [lapStartDist, setLapStartDist] = useState(0);
      const [lapStartTime, setLapStartTime] = useState(0);

      // Last announced voice cue — stored in refs so GPS callback always sees fresh value
      const lastMileRef     = useRef(0);   // last whole-mile announced
      const elapsedRef      = useRef(0);   // mirror of elapsedTime for GPS callback
      const distanceRef     = useRef(0);   // mirror of totalDistance for callbacks
      const voiceRef        = useRef(true);
      const wakeLockRef     = useRef(null);
      const timerRef        = useRef(null);

      // Keep refs in sync with state
      useEffect(() => { elapsedRef.current  = elapsedTime;   }, [elapsedTime]);
      useEffect(() => { distanceRef.current = totalDistance; }, [totalDistance]);
      useEffect(() => { voiceRef.current    = voiceOn;       }, [voiceOn]);

      // Timer
      useEffect(() => {
        if (state === 'running') {
          timerRef.current = setInterval(() => setElapsedTime(t => t + 1), 1000);
        } else {
          if (timerRef.current) clearInterval(timerRef.current);
        }
        return () => { if (timerRef.current) clearInterval(timerRef.current); };
      }, [state]);

      // ── Mile marker announcements ─────────────────────────────────────────
      // Fires whenever totalDistance changes; announces each new whole mile.
      useEffect(() => {
        if (state !== 'running') return;
        const wholeMile = Math.floor(totalDistance);
        if (wholeMile > 0 && wholeMile > lastMileRef.current) {
          lastMileRef.current = wholeMile;
          const avgPaceSec = totalDistance > 0
            ? (elapsedRef.current / totalDistance)   // seconds per mile
            : 0;
          const paceStr = avgPaceSec > 0 ? `. Average pace: ${speakPace(avgPaceSec)}` : '';
          speak(`Mile ${wholeMile}${paceStr}`, voiceRef.current);
        }
      }, [totalDistance, state]);

      const startTracking = useCallback(() => {
        lastMileRef.current = 0;
        setState('running');
        setCoords([]);
        setElapsedTime(0);
        setTotalDistance(0);
        setCurrentPace(0);
        setLaps([]);
        setLapStartDist(0);
        setLapStartTime(0);

        try {
          navigator.wakeLock?.request('screen').then(lock => {
            wakeLockRef.current = lock;
          }).catch(() => {});
        } catch (e) {}

        // Small delay so the "Start Run" tap doesn't conflict with first speak
        setTimeout(() => speak('Run started. Good luck!', voiceRef.current), 600);

        const id = navigator.geolocation.watchPosition(
          (pos) => {
            const { latitude, longitude } = pos.coords;
            setCoords(prev => {
              const newCoords = [...prev, { lat: latitude, lng: longitude }];
              if (newCoords.length >= 2) {
                const prevCoord = newCoords[newCoords.length - 2];
                const dist = haversineDistance(prevCoord.lat, prevCoord.lng, latitude, longitude);
                setTotalDistance(d => {
                  const newDist = d + dist;
                  if (newCoords.length >= 5) {
                    const recentStart = newCoords[Math.max(0, newCoords.length - 6)];
                    const recentDist  = haversineDistance(recentStart.lat, recentStart.lng, latitude, longitude);
                    const recentTime  = elapsedRef.current > 0 ? elapsedRef.current : 1;
                    const pace        = (recentTime / 60) / Math.max(0.001, recentDist);
                    setCurrentPace(pace * 60);
                  }
                  return newDist;
                });
              }
              return newCoords;
            });
          },
          (err) => console.warn('GPS error:', err),
          { enableHighAccuracy: true }
        );
        setWatchId(id);
      }, []);

      const pauseTracking = () => {
        setState('paused');
        speak('Run paused.', voiceRef.current);
      };

      const resumeTracking = () => {
        setState('running');
        speak('Run resumed.', voiceRef.current);
      };

      // ── Interval lap button ───────────────────────────────────────────────
      // Tap once to mark the end of a hard interval (or start of the next one).
      const handleLap = () => {
        const lapDist = totalDistance - lapStartDist;
        const lapTime = elapsedTime - lapStartTime;
        const lapPaceSec = lapDist > 0 ? lapTime / lapDist : 0;
        const lapNum = laps.length + 1;

        const newLap = { num: lapNum, dist: lapDist, time: lapTime, pace: lapPaceSec };
        setLaps(prev => [...prev, newLap]);
        setLapStartDist(totalDistance);
        setLapStartTime(elapsedTime);

        const distStr = lapDist.toFixed(2);
        const timeStr = formatTime(lapTime);
        const paceStr = lapPaceSec > 0 ? `. Pace: ${speakPace(lapPaceSec)}` : '';
        speak(`Interval ${lapNum} complete. ${distStr} miles in ${timeStr}${paceStr}`, voiceRef.current);
      };

      const finishTracking = useCallback(() => {
        if (watchId !== null) navigator.geolocation.clearWatch(watchId);
        if (timerRef.current) clearInterval(timerRef.current);
        if (wakeLockRef.current) wakeLockRef.current.release().catch(() => {});
        setState('done');
        const avgPaceSec = totalDistance > 0 ? elapsedTime / totalDistance : 0;
        const paceStr = avgPaceSec > 0 ? `. Average pace: ${speakPace(avgPaceSec)}` : '';
        speak(`Run complete. ${totalDistance.toFixed(2)} miles${paceStr}`, voiceRef.current);
      }, [watchId, totalDistance, elapsedTime]);

      const handleSaveAndLog = () => {
        if (watchId !== null) navigator.geolocation.clearWatch(watchId);
        if (timerRef.current) clearInterval(timerRef.current);
        if (wakeLockRef.current) wakeLockRef.current.release().catch(() => {});
        const avgPace = totalDistance > 0 ? (elapsedTime / 60) / totalDistance : 0;
        onComplete({ distance: totalDistance, elapsed: elapsedTime, avgPace, coords });
      };

      const handleCancel = () => {
        if (watchId !== null) navigator.geolocation.clearWatch(watchId);
        if (timerRef.current) clearInterval(timerRef.current);
        if (wakeLockRef.current) wakeLockRef.current.release().catch(() => {});
        window.speechSynthesis?.cancel();
        onCancel();
      };

      const normalizeCoords = (coordList) => {
        if (coordList.length === 0) return [];
        let minLat = coordList[0].lat, maxLat = coordList[0].lat;
        let minLng = coordList[0].lng, maxLng = coordList[0].lng;
        coordList.forEach(c => {
          minLat = Math.min(minLat, c.lat); maxLat = Math.max(maxLat, c.lat);
          minLng = Math.min(minLng, c.lng); maxLng = Math.max(maxLng, c.lng);
        });
        const latRange = maxLat - minLat || 0.001;
        const lngRange = maxLng - minLng || 0.001;
        return coordList.map(c => ({
          x: ((c.lng - minLng) / lngRange) * 280,
          y: ((maxLat - c.lat) / latRange) * 160
        }));
      };

      const normalizedCoords = useMemo(() => normalizeCoords(coords), [coords]);
      const isIntervalWorkout = workout?.type === 'intervals' || workout?.type === 'hills';

      return (
        <div className="fixed inset-0 bg-black bg-opacity-90 z-60 flex items-center justify-center">
          <div className="w-full h-full max-w-2xl bg-slate-900 flex flex-col">
            {/* Header */}
            <div className="bg-slate-800 p-4 border-b border-orange-500">
              <div className="flex justify-between items-center">
                <h2 className="text-white text-lg font-bold">📍 GPS Track</h2>
                <div className="flex items-center gap-3">
                  {/* Voice toggle */}
                  {state !== 'idle' && state !== 'done' && (
                    <button
                      onClick={() => { setVoiceOn(v => !v); window.speechSynthesis?.cancel(); }}
                      className={`text-xl px-2 py-1 rounded transition-colors ${voiceOn ? 'text-orange-400' : 'text-gray-600'}`}
                      title={voiceOn ? 'Voice guidance on — tap to mute' : 'Voice guidance muted — tap to unmute'}
                    >
                      {voiceOn ? '🔊' : '🔇'}
                    </button>
                  )}
                  {state !== 'done' && (
                    <button onClick={handleCancel} className="text-gray-400 hover:text-white text-xl">✕</button>
                  )}
                </div>
              </div>
            </div>

            {/* Main content */}
            <div className="flex-1 overflow-y-auto p-6">
              {state === 'idle' && (() => {
                const [hotWeather, setHotWeather] = React.useState(false);
                // Hot weather adds ~12 sec/mile to all target paces
                const weatherAdj = hotWeather ? 12 : 0;
                return (
                  <div className="py-6 space-y-4">
                    <div className="text-center">
                      <div className="text-4xl mb-2">🎙️</div>
                      <p className="text-gray-300">Ready to start tracking your run?</p>
                    </div>

                    {/* Settings row */}
                    <div className="space-y-2">
                      <div className="flex items-center justify-between bg-slate-800 rounded-lg px-4 py-3">
                        <div>
                          <div className="text-white text-sm font-semibold">🔊 Voice guidance</div>
                          <div className="text-gray-500 text-xs">Mile splits{isIntervalWorkout ? ' + interval cues' : ''}</div>
                        </div>
                        <button onClick={() => setVoiceOn(v => !v)}
                          className={`px-3 py-1 rounded text-sm font-semibold transition-colors ${voiceOn ? 'bg-orange-500 text-white' : 'bg-slate-700 text-gray-400'}`}>
                          {voiceOn ? 'On' : 'Off'}
                        </button>
                      </div>
                      <div className="flex items-center justify-between bg-slate-800 rounded-lg px-4 py-3">
                        <div>
                          <div className="text-white text-sm font-semibold">🌡️ Hot weather mode</div>
                          <div className="text-gray-500 text-xs">Adds ~12 sec/mi to target paces</div>
                        </div>
                        <button onClick={() => setHotWeather(h => !h)}
                          className={`px-3 py-1 rounded text-sm font-semibold transition-colors ${hotWeather ? 'bg-red-500 text-white' : 'bg-slate-700 text-gray-400'}`}>
                          {hotWeather ? 'On' : 'Off'}
                        </button>
                      </div>
                    </div>

                    {/* Target pace reminder */}
                    {workout && workout.pace > 0 && (
                      <div className="bg-slate-800 rounded-lg p-3 text-sm text-center">
                        <div className="text-gray-400 text-xs mb-1">Target pace today</div>
                        <div className="text-white font-bold text-lg">
                          {formatPace(workout.pace + weatherAdj)}/mi
                          <span className="text-gray-600 text-xs font-normal ml-2">· {treadmillMph(workout.pace + weatherAdj)} mph</span>
                        </div>
                        {hotWeather && <div className="text-red-400 text-xs mt-1">+12 sec/mi heat adjustment applied</div>}
                      </div>
                    )}

                    <button onClick={startTracking} className="px-8 py-3 bg-orange-500 text-white rounded-lg font-semibold hover:bg-orange-600 w-full">
                      Start Run
                    </button>
                  </div>
                );
              })()}

              {(state === 'running' || state === 'paused') && (
                <div className="space-y-4">
                  {/* Stats */}
                  <div className="grid grid-cols-3 gap-3">
                    <div className="bg-slate-800 p-4 rounded-lg">
                      <div className="text-gray-400 text-sm mb-1">Time</div>
                      <div className="text-white text-3xl font-bold tabular-nums">{formatTime(elapsedTime)}</div>
                    </div>
                    <div className="bg-slate-800 p-4 rounded-lg">
                      <div className="text-gray-400 text-sm mb-1">Distance</div>
                      <div className="text-white text-3xl font-bold tabular-nums">{totalDistance.toFixed(2)}</div>
                      <div className="text-gray-500 text-xs">mi</div>
                    </div>
                    <div className="bg-slate-800 p-4 rounded-lg">
                      <div className="text-gray-400 text-sm mb-1">Pace</div>
                      <div className="text-white text-2xl font-bold tabular-nums">{formatPace(currentPace * 60)}</div>
                      <div className="text-gray-500 text-xs">/mi</div>
                    </div>
                  </div>

                  {/* Map */}
                  <div className="bg-slate-800 p-3 rounded-lg">
                    <svg width="100%" viewBox="0 0 300 180" className="border border-slate-700 rounded">
                      {normalizedCoords.length > 1 && (
                        <polyline points={normalizedCoords.map(c => `${c.x},${c.y}`).join(' ')} stroke="#fb923c" strokeWidth="2" fill="none" />
                      )}
                      {normalizedCoords.length > 0 && (
                        <>
                          <circle cx={normalizedCoords[0].x} cy={normalizedCoords[0].y} r="4" fill="#22c55e" />
                          <circle cx={normalizedCoords[normalizedCoords.length-1].x} cy={normalizedCoords[normalizedCoords.length-1].y} r="4" fill="#fb923c" />
                        </>
                      )}
                    </svg>
                  </div>

                  {/* Interval lap button — only for interval/hill workouts */}
                  {isIntervalWorkout && state === 'running' && (
                    <button
                      onClick={handleLap}
                      className="w-full py-4 rounded-xl font-bold text-white text-lg transition-transform active:scale-95"
                      style={{background: 'linear-gradient(135deg, #7c3aed, #4f46e5)'}}
                    >
                      ⚡ Lap — End Interval {laps.length + 1}
                    </button>
                  )}

                  {/* Lap history */}
                  {laps.length > 0 && (
                    <div className="bg-slate-800 rounded-lg p-3">
                      <div className="text-gray-400 text-xs font-semibold mb-2 uppercase tracking-wide">Intervals</div>
                      <div className="space-y-1">
                        {laps.map(lap => (
                          <div key={lap.num} className="flex justify-between items-center text-sm py-1 border-b border-slate-700 last:border-0">
                            <span className="text-purple-400 font-semibold">#{lap.num}</span>
                            <span className="text-white tabular-nums">{lap.dist.toFixed(2)} mi</span>
                            <span className="text-gray-300 tabular-nums">{formatTime(lap.time)}</span>
                            <span className="text-orange-400 tabular-nums">{formatPace(lap.pace)}/mi</span>
                          </div>
                        ))}
                      </div>
                    </div>
                  )}

                  {/* Controls */}
                  <div className="flex gap-3">
                    {state === 'running' && (
                      <>
                        <button onClick={pauseTracking} className="flex-1 px-4 py-3 bg-yellow-600 text-white rounded-lg font-semibold hover:bg-yellow-700">
                          Pause
                        </button>
                        <button onClick={finishTracking} className="flex-1 px-4 py-3 bg-red-600 text-white rounded-lg font-semibold hover:bg-red-700">
                          Finish
                        </button>
                      </>
                    )}
                    {state === 'paused' && (
                      <>
                        <button onClick={resumeTracking} className="flex-1 px-4 py-3 bg-green-600 text-white rounded-lg font-semibold hover:bg-green-700">
                          Resume
                        </button>
                        <button onClick={finishTracking} className="flex-1 px-4 py-3 bg-red-600 text-white rounded-lg font-semibold hover:bg-red-700">
                          Finish
                        </button>
                      </>
                    )}
                  </div>
                </div>
              )}

              {state === 'done' && (
                <div className="space-y-6">
                  <div className="text-center">
                    <div className="text-4xl mb-2">🎉</div>
                    <h3 className="text-white text-2xl font-bold">Run Complete!</h3>
                  </div>
                  <div className="grid grid-cols-2 gap-4">
                    <div className="bg-slate-800 p-4 rounded-lg text-center">
                      <div className="text-gray-400 text-sm mb-2">Total Time</div>
                      <div className="text-white text-2xl font-bold">{formatTime(elapsedTime)}</div>
                    </div>
                    <div className="bg-slate-800 p-4 rounded-lg text-center">
                      <div className="text-gray-400 text-sm mb-2">Total Distance</div>
                      <div className="text-white text-2xl font-bold">{totalDistance.toFixed(2)} mi</div>
                    </div>
                    <div className="bg-slate-800 p-4 rounded-lg text-center col-span-2">
                      <div className="text-gray-400 text-sm mb-2">Average Pace</div>
                      <div className="text-white text-2xl font-bold">{formatPace((elapsedTime / 60) / Math.max(0.001, totalDistance) * 60)}</div>
                    </div>
                  </div>
                  {/* Interval summary on done screen */}
                  {laps.length > 0 && (
                    <div className="bg-slate-800 rounded-lg p-4">
                      <div className="text-white font-semibold mb-3">⚡ Interval Summary</div>
                      <div className="space-y-1">
                        {laps.map(lap => (
                          <div key={lap.num} className="flex justify-between text-sm py-1 border-b border-slate-700 last:border-0">
                            <span className="text-purple-400 font-semibold">Interval {lap.num}</span>
                            <span className="text-white">{lap.dist.toFixed(2)} mi</span>
                            <span className="text-gray-300">{formatTime(lap.time)}</span>
                            <span className="text-orange-400">{formatPace(lap.pace)}/mi</span>
                          </div>
                        ))}
                      </div>
                    </div>
                  )}
                  <button onClick={handleSaveAndLog} className="w-full px-6 py-3 bg-green-600 text-white rounded-lg font-semibold hover:bg-green-700">
                    Save & Log Run
                  </button>
                  <button onClick={handleCancel} className="w-full px-6 py-3 bg-slate-700 text-white rounded-lg font-semibold hover:bg-slate-600">
                    Discard
                  </button>
                </div>
              )}
            </div>
          </div>
        </div>
      );
    }

    // Strength Detail Component
    function StrengthDetail({ typeKey }) {
      const routine = STRENGTH_ROUTINES[typeKey];
      if (!routine) return null;

      return (
        <div className="space-y-4 text-sm">
          <div className="bg-slate-700 p-3 rounded">
            <div className="text-gray-300 font-semibold mb-2">⏱️ {routine.duration}</div>
            <div className="text-gray-400 mb-2">{routine.focus}</div>
            <div className="text-orange-400 font-semibold mb-2">Warm-up:</div>
            <ul className="list-disc list-inside text-gray-400 space-y-1 mb-3">
              {routine.warmup.map((step, i) => <li key={i}>{step}</li>)}
            </ul>
            <div className="text-orange-400 font-semibold mb-2">Exercises:</div>
            <div className="space-y-2">
              {routine.exercises.map((ex, i) => (
                <div key={i} className="bg-slate-600 p-2 rounded">
                  <div className="font-semibold text-white">{ex.name}</div>
                  <div className="text-gray-400 text-xs">{ex.sets}×{ex.reps}</div>
                  <div className="text-gray-500 text-xs italic">{ex.cue}</div>
                </div>
              ))}
            </div>
            <div className="text-orange-400 font-semibold mt-3 mb-2">Cool-down:</div>
            <ul className="list-disc list-inside text-gray-400 space-y-1">
              {routine.cooldown.map((step, i) => <li key={i}>{step}</li>)}
            </ul>
          </div>
        </div>
      );
    }

    // Warmup & Cooldown Section
    function WarmupCooldownSection({ workoutType }) {
      const [open, setOpen] = useState(false);
      const warmup = WORKOUT_WARMUPS[workoutType];
      const cooldown = WORKOUT_COOLDOWNS[workoutType];

      if (!warmup || !cooldown) return null;

      return (
        <div className="border-t border-slate-700 pt-3">
          <button
            onClick={() => setOpen(!open)}
            className="text-orange-400 text-sm font-semibold flex items-center gap-2 hover:text-orange-300"
          >
            <span className={`transform transition-transform ${open ? 'rotate-90' : ''}`}>▸</span>
            Warm-up & Cool-down
          </button>
          {open && (
            <div className="mt-3 grid grid-cols-2 gap-4 text-xs">
              <div>
                <div className="font-semibold text-orange-400 mb-2">🔥 Warm-up ({warmup.time})</div>
                <ul className="space-y-1 text-gray-400">
                  {warmup.steps.map((step, i) => <li key={i}>• {step}</li>)}
                </ul>
              </div>
              <div>
                <div className="font-semibold text-blue-400 mb-2">❄️ Cool-down</div>
                <ul className="space-y-1 text-gray-400">
                  {cooldown.steps.map((step, i) => <li key={i}>• {step}</li>)}
                </ul>
              </div>
            </div>
          )}
        </div>
      );
    }

    // Missed Workouts Banner
    function MissedWorkoutsBanner({ plan, logs, onLogWorkout }) {
      const today = new Date();
      today.setHours(0, 0, 0, 0);

      const missed = useMemo(() => {
        if (!plan || !plan.weekWorkouts) return [];
        const result = [];
        plan.weeks.forEach((week, weekIdx) => {
          const weekWorkouts = plan.weekWorkouts[weekIdx];
          if (!weekWorkouts) return;
          weekWorkouts.forEach((workout, dayIdx) => {
            if (workout.type === 'rest' || workout.type.startsWith('strength')) return;
            const key = `${weekIdx}-${dayIdx}`;
            if (logs[key]) return;
            const workoutDate = getWorkoutDate(plan.raceDate, plan.totalWeeks, weekIdx, dayIdx);
            workoutDate.setHours(0, 0, 0, 0);
            if (workoutDate < today) {
              result.push({ weekIdx, dayIdx, workout, date: workoutDate, key });
            }
          });
        });
        return result.slice(0, 2);
      }, [plan, logs]);

      if (missed.length === 0) return null;

      return (
        <div className="bg-yellow-900 border border-yellow-600 rounded-lg p-4 space-y-3">
          <div className="text-yellow-200 font-semibold">⚠️ Missed Workouts</div>
          {missed.map(item => {
            const daysAgo = Math.floor((today - item.date) / (1000 * 60 * 60 * 24));
            const tooLate = item.workout.type === 'long' && daysAgo > 3;
            return (
              <div key={item.key} className="flex items-center justify-between bg-slate-800 p-3 rounded">
                <div>
                  <div className="text-white font-semibold">{WORKOUT_TYPES[item.workout.type].icon} {WORKOUT_TYPES[item.workout.type].label}</div>
                  <div className="text-yellow-200 text-sm">{item.date.toLocaleDateString()} ({daysAgo}d ago)</div>
                </div>
                {!tooLate && (
                  <button onClick={() => onLogWorkout(item.weekIdx, item.dayIdx)} className="px-3 py-1 bg-yellow-600 text-white rounded text-sm hover:bg-yellow-700">
                    Make it up
                  </button>
                )}
                {tooLate && (
                  <button className="px-3 py-1 bg-slate-600 text-gray-300 rounded text-sm cursor-not-allowed">
                    Too late
                  </button>
                )}
              </div>
            );
          })}
        </div>
      );
    }

    // Injury Warning Banner
    function InjuryWarningBanner({ injuries, onModifyPlan }) {
      const today = new Date();
      const recentInjuries = useMemo(() => {
        if (!injuries || injuries.length === 0) return [];
        const recent = injuries.filter(inj => {
          const injDate = new Date(inj.date);
          const daysDiff = Math.floor((today - injDate) / (1000 * 60 * 60 * 24));
          return daysDiff <= 3 && inj.severity >= 2;
        });
        const grouped = {};
        recent.forEach(inj => {
          if (!grouped[inj.bodyPart]) grouped[inj.bodyPart] = inj;
          else if (inj.severity > grouped[inj.bodyPart].severity) grouped[inj.bodyPart] = inj;
        });
        return Object.values(grouped);
      }, [injuries]);

      if (recentInjuries.length === 0) return null;

      const bodyPart = recentInjuries[0].bodyPart;
      return (
        <div className="bg-amber-900 border border-amber-600 rounded-lg p-4 flex items-center justify-between">
          <div className="text-amber-200">
            <div className="font-semibold">⚠️ {bodyPart} soreness detected</div>
            <div className="text-sm">Consider an easy run or rest today</div>
          </div>
          <button onClick={onModifyPlan} className="px-4 py-2 bg-amber-600 text-white rounded text-sm hover:bg-amber-700 whitespace-nowrap">
            Modify Plan
          </button>
        </div>
      );
    }

    // Workout Structure Panel — shows the step-by-step prescription for a workout
    function WorkoutStructurePanel({ structure, miles, compact = false }) {
      const [open, setOpen] = useState(false);
      if (!structure) return null;

      // For interval/hill workouts, show a prominent summary badge even when collapsed
      const isHard = structure.kind === 'intervals' || structure.kind === 'hills';

      return (
        <div className="mt-2">
          {/* Always-visible summary row */}
          <div className="flex items-center justify-between gap-2 flex-wrap">
            <div className="flex items-center gap-2 flex-wrap">
              {/* Miles + pace chip */}
              {miles > 0 && (
                <span className="text-sm font-semibold text-white">
                  {miles} mi
                  {structure.targetPaceSec > 0 && (
                    <>
                      <span className="text-gray-400 font-normal"> @ {formatPace(structure.targetPaceSec)}/mi</span>
                      {treadmillMph && (
                        <span className="text-gray-600 font-normal text-xs"> · {treadmillMph(structure.targetPaceSec)} mph</span>
                      )}
                    </>
                  )}
                </span>
              )}
              {/* Sets × reps badge for interval / hill workouts */}
              {isHard && structure.sets && (
                <span className="inline-flex items-center gap-1 px-2 py-0.5 rounded-full text-xs font-bold"
                  style={{background: structure.kind === 'intervals' ? 'rgba(239,68,68,0.18)' : 'rgba(251,146,60,0.18)',
                          color: structure.kind === 'intervals' ? '#fca5a5' : '#fdba74',
                          border: `1px solid ${structure.kind === 'intervals' ? 'rgba(239,68,68,0.3)' : 'rgba(251,146,60,0.3)'}`}}>
                  {structure.sets} × {structure.repLabel}
                </span>
              )}
              {/* Rest badge */}
              {isHard && structure.restDuration && (
                <span className="inline-flex items-center gap-1 px-2 py-0.5 rounded-full text-xs font-semibold bg-slate-700 text-gray-300 border border-slate-600">
                  🚶 {structure.restDuration} {structure.restType}
                </span>
              )}
            </div>
            {/* Expand toggle */}
            <button
              onClick={() => setOpen(o => !o)}
              className="text-xs text-orange-400 hover:text-orange-300 font-semibold whitespace-nowrap"
            >
              {open ? '▲ Hide plan' : '▼ Show plan'}
            </button>
          </div>

          {/* Expandable step-by-step breakdown */}
          {open && (
            <div className="mt-3 rounded-lg overflow-hidden border border-slate-600" style={{background:'rgba(15,23,42,0.6)'}}>
              <div className="px-3 py-2 border-b border-slate-700 flex items-center justify-between">
                <span className="text-xs font-bold text-gray-300 uppercase tracking-wide">Workout Plan</span>
                {structure.sets && isHard && (
                  <span className="text-xs text-gray-500">{structure.sets} hard efforts</span>
                )}
              </div>
              <div className="p-3 space-y-2">
                {structure.structure.map((step, i) => (
                  <div key={i} className="flex items-start gap-2 text-sm">
                    <span className="text-base leading-tight mt-0.5 shrink-0">{step.icon}</span>
                    <span className="text-gray-200 leading-snug">{step.text}</span>
                  </div>
                ))}
              </div>
              {structure.logHint && (
                <div className="px-3 py-2 border-t border-slate-700 text-xs text-gray-500 italic">
                  💡 {structure.logHint}
                </div>
              )}
            </div>
          )}
        </div>
      );
    }

    // Workout Card
    function WorkoutCard({ workout, dateStr, weekIdx, dayIdx, onLog, onSwap, logData, onGPSTrack }) {

      const isLogged = !!logData;

        <div className="bg-slate-800 rounded-lg p-4 border border-slate-700 hover:border-orange-500 transition">
          <div className="flex items-start justify-between mb-3">

              <div className="flex items-center gap-2 mb-2">
                <span className="text-2xl">{WORKOUT_TYPES[workout.type].icon}</span>
                <div>
                  <div className={`font-semibold ${WORKOUT_TYPES[workout.type].textColor}`}>
                    {WORKOUT_TYPES[workout.type].label}
                  </div>

                </div>
              </div>
              <div className="flex items-center gap-2 mb-2">
