    function App({ profile, onSwitchProfile }) {
      const profileId = profile.id;
      const CK  = key => pKey(profileId, key); // config key helper

      const [config, setConfig] = useState(() => {
        try {
          const saved = localStorage.getItem(CK('config'));
          return saved && saved !== 'null' ? JSON.parse(saved) : null;
        } catch {
          return null;
        }
      });

      const [plan, setPlan] = useState(() => {
        const tryBuildFromPlan = (p) => {
          if (!p || !p.weeks || !p.totalWeeks || !p.raceType || !p.raceDate) return null;
          const goalTime          = p.goalTime || 120;
          const fitnessLevel      = FITNESS_LEVELS[p.fitnessLevel] ? p.fitnessLevel : 'intermediate';
          const includeStrength   = p.includeStrength !== false;
          const fitnessAssessment = p.fitnessAssessment || null;
          const adaptationState   = p.adaptationState  || null;
          const schedulePrefs     = p.schedulePrefs     || null;
          const weeks = [];
          for (let i = 0; i < p.totalWeeks; i++) {
            weeks.push(buildWeekWorkouts(p.weeks[i], p.raceType, goalTime, fitnessLevel, includeStrength, fitnessAssessment, adaptationState, schedulePrefs));
          }
          return { ...p, goalTime, fitnessLevel, includeStrength, fitnessAssessment, adaptationState, schedulePrefs, weekWorkouts: weeks };
        };

        const tryBuildFromConfig = (c) => {
          if (!c || !c.raceType || !c.raceDate || !c.goalTime || !c.fitnessLevel) return null;
          const schedulePrefs = c.schedulePrefs || null;
          const newPlan = generatePlan(c.raceType, c.raceDate, c.goalTime, c.fitnessLevel, c.includeStrength !== false, c.fitnessAssessment || null, schedulePrefs);
          const weeks = [];
          for (let i = 0; i < newPlan.totalWeeks; i++) {
            weeks.push(buildWeekWorkouts(newPlan.weeks[i], newPlan.raceType, newPlan.goalTime, newPlan.fitnessLevel, newPlan.includeStrength, newPlan.fitnessAssessment, null, schedulePrefs));
          }
          return { ...newPlan, weekWorkouts: weeks };
        };

        try {
          // 1. Try loading saved plan
          const savedPlan = localStorage.getItem(CK('plan'));
          if (savedPlan && savedPlan !== 'null') {
            const p = JSON.parse(savedPlan);
            const result = tryBuildFromPlan(p);
            if (result) return result;
          }
          // 2. Fall back: regenerate plan from saved config
          const savedConfig = localStorage.getItem(CK('config'));
          if (savedConfig && savedConfig !== 'null') {
            const c = JSON.parse(savedConfig);
            const result = tryBuildFromConfig(c);
            if (result) return result;
          }
          return null;
        } catch {
          return null;
        }
      });

      const [logs, setLogs] = useState(() => {
        try {
          const saved = localStorage.getItem(CK('logs'));
          return saved && saved !== 'null' ? JSON.parse(saved) : {};
        } catch { return {}; }
      });

      const [substitutions, setSubstitutions] = useState(() => {
        try {
          const saved = localStorage.getItem(CK('subs'));
          return saved && saved !== 'null' ? JSON.parse(saved) : {};
        } catch { return {}; }
      });

      const [injuries, setInjuries] = useState(() => {
        try {
          const saved = localStorage.getItem(CK('injuries'));
          return saved && saved !== 'null' ? JSON.parse(saved) : [];
        } catch { return []; }
      });

      const [currentTab, setCurrentTab] = useState('dashboard');
      const [logModalOpen, setLogModalOpen] = useState(false);
      const [logModalData, setLogModalData] = useState(null);
      const [swapModalOpen, setSwapModalOpen] = useState(false);
      const [swapModalData, setSwapModalData] = useState(null);
      const [gpsOpen, setGpsOpen] = useState(false);
      const [gpsWorkoutCtx, setGpsWorkoutCtx] = useState(null);
      const [injuryModalOpen, setInjuryModalOpen] = useState(false);
      const [editPlanOpen, setEditPlanOpen] = useState(false);
      const [fbSetupOpen, setFbSetupOpen] = useState(false);
      const [authUser, setAuthUser] = useState(null);
      const [syncing, setSyncing] = useState(false);
      const [showSetup, setShowSetup] = useState(false);

      useEffect(() => { localStorage.setItem(CK('config'),   JSON.stringify(config));   }, [config]);
      useEffect(() => { localStorage.setItem(CK('plan'),     JSON.stringify(plan));     }, [plan]);
      useEffect(() => { localStorage.setItem(CK('logs'),     JSON.stringify(logs));     }, [logs]);
      useEffect(() => { localStorage.setItem(CK('subs'),     JSON.stringify(substitutions)); }, [substitutions]);
      useEffect(() => { localStorage.setItem(CK('injuries'), JSON.stringify(injuries)); }, [injuries]);

      // ── Auto-adapt future weeks when logs change ───────────────────────────
      useEffect(() => {
        if (!plan || !plan.weeks || Object.keys(logs).length === 0) return;

        const newAdaptation = computeAdaptationFromLogs(logs, plan);
        const prevAdaptation = plan.adaptationState || {};

        // Only rebuild if something changed meaningfully (avoids render loops)
        const mileageShift = Math.abs((newAdaptation.mileageMultiplier || 1) - (prevAdaptation.mileageMultiplier || 1));
        const paceShift    = Math.abs((newAdaptation.paceOffsetSec    || 0) - (prevAdaptation.paceOffsetSec    || 0));
        if (mileageShift < 0.01 && paceShift < 1.5) return;

        // Only rebuild current week onward — preserve logged past weeks as-is
        const currentWeekIdx = getCurrentWeekIdx(plan.raceDate, plan.totalWeeks);
        const newWeekWorkouts = plan.weekWorkouts.map((week, weekIdx) => {
          if (weekIdx < currentWeekIdx) return week; // past weeks untouched
          return buildWeekWorkouts(
            plan.weeks[weekIdx],
            plan.raceType,
            plan.goalTime,
            plan.fitnessLevel,
            plan.includeStrength,
            plan.fitnessAssessment,
            newAdaptation,
            plan.schedulePrefs || null
          );
        });

        setPlan(prev => ({ ...prev, weekWorkouts: newWeekWorkouts, adaptationState: newAdaptation }));
      }, [logs]);
      // ──────────────────────────────────────────────────────────────────────

      // ── Firebase Auth listener ──────────────────────────────────────────
      useEffect(() => {
        if (!FIREBASE_ENABLED || !firebaseAuth) return;
        // Handle redirect sign-in result (fired after page reloads from signInWithRedirect)
        firebaseAuth.getRedirectResult().catch(() => {});
        const unsub = firebaseAuth.onAuthStateChanged(async (user) => {
          setAuthUser(user);
          if (user) {
            try {
              setSyncing(true);
              // Always use a fixed 'primary' key for cloud sync so all devices
              // signed into the same Google account share one Firestore path.
              const profileRef = firebaseDb.collection('users').doc(user.uid)
                                           .collection('profiles').doc('primary');
              const legacyRef  = firebaseDb.collection('users').doc(user.uid);

              let d = null;
              const profileDoc = await profileRef.get();
              if (profileDoc.exists) {
                d = profileDoc.data();
              } else {
                // Try legacy flat doc (backwards-compatible)
                const legacyDoc = await legacyRef.get();
                if (legacyDoc.exists) {
                  d = legacyDoc.data();
                } else {
                  // New device — profile ID won't match. Scan all saved profiles
                  // and load the most recently synced one.
                  const allProfiles = await firebaseDb.collection('users').doc(user.uid)
                                                      .collection('profiles').get();
                  if (!allProfiles.empty) {
                    let latestData = null, latestTime = '';
                    allProfiles.forEach(doc => {
                      const data = doc.data();
                      if (data.config && (data.lastSynced || '') > latestTime) {
                        latestTime = data.lastSynced || '';
                        latestData = data;
                      }
                    });
                    if (latestData) d = latestData;
                  }
                }
              }

              if (d && d.config) {
                const c = d.config;
                setConfig(c);

                // Always preserve logs and injuries — these are never regenerated
                if (d.logs)     setLogs(d.logs);
                if (d.injuries) setInjuries(d.injuries);

                // Rebuild plan from saved data, or regenerate if schema changed
                const cloudSchemaVersion = d.schemaVersion || 0;
                const schemaMatch = cloudSchemaVersion === APP_SCHEMA_VERSION;

                if (schemaMatch && d.plan && d.plan.weeks && d.plan.totalWeeks) {
                  // Schema matches — rebuild weekWorkouts client-side (they're derived, not stored)
                  const sp   = c.schedulePrefs    || d.plan.schedulePrefs    || null;
                  const incS = c.includeStrength  !== false;
                  const fa   = c.fitnessAssessment || d.plan.fitnessAssessment || null;
                  const weeks = [];
                  for (let i = 0; i < d.plan.totalWeeks; i++) {
                    weeks.push(buildWeekWorkouts(
                      d.plan.weeks[i], d.plan.raceType,
                      d.plan.goalTime || c.goalTime || 120,
                      d.plan.fitnessLevel || c.fitnessLevel || 'intermediate',
                      incS, fa, null, sp
                    ));
                  }
                  setPlan({ ...d.plan, weekWorkouts: weeks });
                } else {
                  // Schema mismatch or no plan — regenerate from config so latest algorithm is used
                  // This is safe: config is the source of truth, plan is always derivable from it
                  if (c.raceType && c.raceDate && c.goalTime) {
                    setPlan(buildPlanFromConfig(c));
                  }
                }
              }
            } catch(e) { console.warn('Cloud sync load error:', e); }
            finally { setSyncing(false); }
          }
        });
        return unsub;
      }, []);

      // If user signed in but has no cloud data, move them to setup
      useEffect(() => {
        if (!syncing && authUser && !config) setShowSetup(true);
      }, [syncing, authUser, config]);

      // ── Cloud sync when data changes (debounced 1.5s) ────────────────────
      useEffect(() => {
        if (!FIREBASE_ENABLED || !firebaseDb || !authUser || !config) return;
        const timer = setTimeout(async () => {
          try {
            setSyncing(true);
            const profileRef = firebaseDb.collection('users').doc(authUser.uid)
                                         .collection('profiles').doc('primary');
            // Strip derived/large fields before saving (weekWorkouts are rebuilt client-side)
            // Must use destructuring — Firestore rejects undefined values
            const planToSave = plan ? (() => {
              const { weekWorkouts, ...rest } = plan;
              return { ...rest, adaptationState: plan.adaptationState || null };
            })() : null;
            await profileRef.set(
              {
                config,
                plan: planToSave,
                logs,
                injuries,
                schemaVersion: APP_SCHEMA_VERSION,
                lastSynced: new Date().toISOString(),
                appVersion: document.title  // e.g. "RaceReady - Race Training App"
              },
              { merge: true }   // merge: never wipe fields added by future app versions
            );
          } catch(e) { console.warn('Cloud sync save error:', e); }
          finally { setSyncing(false); }
        }, 1500);
        return () => clearTimeout(timer);
      }, [authUser, config, plan, logs, injuries]);

      const handleGoogleSignIn = () => {
        if (!firebaseAuth) return;
        // If running from file:// (local disk), popup won't work — show a helpful message
        if (window.location.protocol === 'file:') {
          alert(
            '⚠️  Google Sign-In requires the app to be served from a web address.\n\n' +
            'Quick fix — open Terminal and run:\n\n' +
            '  python3 -m http.server 8080\n\n' +
            'Then visit:  http://localhost:8080/race-trainer.html\n\n' +
            'Also add "localhost" to Firebase Console → Authentication → Settings → Authorized domains.'
          );
          return;
        }
        const provider = new firebase.auth.GoogleAuthProvider();
        // Try popup first; fall back to redirect if popup is blocked
        firebaseAuth.signInWithPopup(provider).catch((err) => {
          if (err.code === 'auth/popup-blocked' || err.code === 'auth/popup-closed-by-user') {
            firebaseAuth.signInWithRedirect(provider);
          }
        });
      };
      const handleGoogleSignOut = () => {
        if (firebaseAuth) firebaseAuth.signOut();
        setAuthUser(null);
      };
      // ───────────────────────────────────────────────────────────────────

      const buildPlanFromConfig = (cfg) => {
        const schedulePrefs = cfg.schedulePrefs || null;
        const newPlan = generatePlan(cfg.raceType, cfg.raceDate, cfg.goalTime, cfg.fitnessLevel, cfg.includeStrength !== false, cfg.fitnessAssessment || null, schedulePrefs);
        const weeks = [];
        for (let i = 0; i < newPlan.totalWeeks; i++) {
          weeks.push(buildWeekWorkouts(newPlan.weeks[i], newPlan.raceType, newPlan.goalTime, newPlan.fitnessLevel, newPlan.includeStrength, newPlan.fitnessAssessment, null, schedulePrefs));
        }
        return { ...newPlan, weekWorkouts: weeks };
      };

      const handleSetupComplete = (newConfig) => {
        setConfig(newConfig);
        setPlan(buildPlanFromConfig(newConfig));
        setLogs({});
      };

      const handleLogWorkout = (weekIdx, dayIdx) => {
        const workout = plan?.weekWorkouts?.[weekIdx]?.[dayIdx];
        if (!workout) return;
        setLogModalData({ weekIdx, dayIdx, workout, gpsResult: null });
        setLogModalOpen(true);
      };

      const handleLogWorkoutGPS = (weekIdx, dayIdx, gpsResult) => {
        const workout = plan?.weekWorkouts?.[weekIdx]?.[dayIdx];
        if (!workout) return;
        setLogModalData({ weekIdx, dayIdx, workout, gpsResult });
        setLogModalOpen(true);
      };

      const handleLogSave = (logData) => {
        const { weekIdx, dayIdx } = logModalData;
        const key = `${weekIdx}-${dayIdx}`;
        setLogs(prev => ({
          ...prev,
          [key]: logData
        }));
      };

      const handleSwapWorkout = (weekIdx, dayIdx) => {
        const currentType = plan?.weekWorkouts?.[weekIdx]?.[dayIdx]?.type;
        if (!currentType) return;
        setSwapModalData({ weekIdx, dayIdx, currentType });
        setSwapModalOpen(true);
      };

      const handleSubstitute = (weekIdx, dayIdx, newType) => {
        const key = `${weekIdx}-${dayIdx}`;
        setSubstitutions(prev => ({
          ...prev,
          [key]: newType
        }));

        const newWorkout = buildWeekWorkouts(plan.weeks[weekIdx], plan.raceType, plan.goalTime, plan.fitnessLevel, plan.includeStrength, plan.fitnessAssessment, null, plan.schedulePrefs || null)[dayIdx];
        const replacement = { ...newWorkout, type: newType };
        setPlan(prev => ({
          ...prev,
          weekWorkouts: prev.weekWorkouts.map((week, wIdx) =>
            wIdx === weekIdx ? week.map((w, dIdx) => (dIdx === dayIdx ? replacement : w)) : week
          )
        }));
      };

      const handleGPSTrack = (weekIdx, dayIdx) => {
        const workout = plan?.weekWorkouts?.[weekIdx]?.[dayIdx];
        if (!workout) return;
        setGpsWorkoutCtx({ weekIdx, dayIdx, workout });
        setGpsOpen(true);
      };

      const handleGPSComplete = (gpsResult) => {
        handleLogWorkoutGPS(gpsWorkoutCtx.weekIdx, gpsWorkoutCtx.dayIdx, gpsResult);
        setGpsOpen(false);
      };

      const handleGPSCancel = () => {
        setGpsOpen(false);
        setGpsWorkoutCtx(null);
      };

      const handleModifyPlan = () => {
        const today = new Date();
        const currentDayIdx = today.getDay();
        handleSwapWorkout(0, currentDayIdx);
      };

      const handleLogInjury = (injuryData) => {
        setInjuries(prev => [...prev, injuryData]);
      };

      const handleResetPlan = () => {
        ['plan','config','logs','subs','injuries'].forEach(k => localStorage.removeItem(CK(k)));
        setConfig(null); setPlan(null); setLogs({});
      };

      const handleEditPlanSave = (newConfig, keepLogs) => {
        setConfig(newConfig);
        setPlan(buildPlanFromConfig(newConfig));
        if (!keepLogs) setLogs({});
      };

      if (!config) {
        if (showSetup) {
          return (
            <>
              <SetupWizard onComplete={handleSetupComplete} initialConfig={null} />
              {fbSetupOpen && <FirebaseSetupModal isOpen={fbSetupOpen} onClose={() => setFbSetupOpen(false)} />}
            </>
          );
        }
        return (
          <>
            <LandingScreen
              onStartFresh={() => setShowSetup(true)}
              onSignIn={handleGoogleSignIn}
              onSetupFirebase={() => setFbSetupOpen(true)}
              syncing={syncing}
              firebaseEnabled={FIREBASE_ENABLED}
            />
            {fbSetupOpen && <FirebaseSetupModal isOpen={fbSetupOpen} onClose={() => setFbSetupOpen(false)} />}
          </>
        );
      }

      return (
        <div className="min-h-screen bg-slate-900 text-white pb-20">
          <div className="max-w-2xl mx-auto p-4">
            <div className="mb-8">
              <div className="flex items-center justify-between mb-1 gap-2 flex-wrap">
                <div className="flex items-center gap-3">
                  <h1 className="text-3xl font-bold">🏃 RaceReady</h1>
                  {/* Profile badge */}
                  <button onClick={onSwitchProfile} title="Switch profile"
                    className="flex items-center gap-1.5 px-2 py-1 rounded-full text-xs font-semibold text-white hover:opacity-80 transition"
                    style={{ backgroundColor: profile.color }}>
                    <span>{profile.name[0].toUpperCase()}</span>
                    <span className="hidden sm:inline">{profile.name}</span>
                  </button>
                </div>
                <div className="flex items-center gap-2">
                  <GoogleAuthBar user={authUser} onSignIn={handleGoogleSignIn} onSignOut={handleGoogleSignOut} syncing={syncing} onSetupSync={() => setFbSetupOpen(true)} />
                  <button onClick={() => setEditPlanOpen(true)}
                    className="flex items-center gap-1 px-3 py-1.5 bg-slate-700 text-gray-300 rounded-lg text-sm hover:bg-slate-600 hover:text-white transition">
                    ✏️ Edit Plan
                  </button>
                </div>
              </div>
              <div className="text-gray-400 text-sm">
                {RACE_TYPES[config.raceType].label} • {new Date(config.raceDate).toLocaleDateString()} • Goal: {config.goalTime} min
              </div>
            </div>

            {currentTab === 'dashboard' && <Dashboard plan={plan} logs={logs} injuries={injuries} onLogWorkout={handleLogWorkout} onSwapWorkout={handleSwapWorkout} onGPSTrack={handleGPSTrack} onModifyPlan={handleModifyPlan} onLogInjury={() => setInjuryModalOpen(true)} onResetPlan={handleResetPlan} adaptationState={plan?.adaptationState} />}
            {currentTab === 'plan' && <PlanView plan={plan} logs={logs} onLogWorkout={handleLogWorkout} onSwapWorkout={handleSwapWorkout} onGPSTrack={handleGPSTrack} onResetPlan={handleResetPlan} />}
            {currentTab === 'progress' && <ProgressView logs={logs} plan={plan} injuries={injuries} onLogInjury={() => setInjuryModalOpen(true)} />}
          </div>

          <NavBar currentTab={currentTab} onTabChange={setCurrentTab} />

          {logModalOpen && <WorkoutLogModal isOpen={logModalOpen} weekIdx={logModalData?.weekIdx} dayIdx={logModalData?.dayIdx} workout={logModalData?.workout} gpsResult={logModalData?.gpsResult} onClose={() => setLogModalOpen(false)} onSave={handleLogSave} onGPSTrack={handleGPSTrack} />}
          {swapModalOpen && <SubstituteModal isOpen={swapModalOpen} weekIdx={swapModalData?.weekIdx} dayIdx={swapModalData?.dayIdx} currentType={swapModalData?.currentType} onClose={() => setSwapModalOpen(false)} onSubstitute={handleSubstitute} />}
          {gpsOpen && gpsWorkoutCtx && <GPSTracker workout={gpsWorkoutCtx.workout} paceOffset={0} onComplete={handleGPSComplete} onCancel={handleGPSCancel} />}
          {injuryModalOpen && <InjuryLogModal isOpen={injuryModalOpen} onClose={() => setInjuryModalOpen(false)} onSave={handleLogInjury} />}
          {editPlanOpen && <EditPlanModal isOpen={editPlanOpen} config={config} onClose={() => setEditPlanOpen(false)} onSave={handleEditPlanSave} />}
          {fbSetupOpen && <FirebaseSetupModal isOpen={fbSetupOpen} onClose={() => setFbSetupOpen(false)} />}
        </div>
      );
    }

    // Root: manages which profile is active
    function RaceReadyRoot() {
      const [activeProfile, setActiveProfile] = useState(() => {
        try {
          const id = localStorage.getItem('rr_active_profile');
          if (!id) return null;
          const profiles = loadProfiles();
          return profiles.find(p => p.id === id) || null;
        } catch { return null; }
      });

      const handleSelectProfile = (profile) => {
        localStorage.setItem('rr_active_profile', profile.id);
        setActiveProfile(profile);
      };

      const handleSwitchProfile = () => {
        localStorage.removeItem('rr_active_profile');
        setActiveProfile(null);
      };

      if (!activeProfile) {
        return <ProfilePicker onSelect={handleSelectProfile} />;
      }
      return <App key={activeProfile.id} profile={activeProfile} onSwitchProfile={handleSwitchProfile} />;
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<RaceReadyRoot />);
  </script>
</body>
</html>
